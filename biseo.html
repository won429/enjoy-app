<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>엔조이 비서실장</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            color-scheme: dark light;
            --page: #000000;
            --surface: rgba(255, 255, 255, 0.055);
            --surface-strong: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.11);
            --text: #FFFFFF;
            --muted: #A1A1A6;
            --soft: rgba(255, 255, 255, 0.62);
            --user: #3182F6;
            --user-text: #FFFFFF;
            --composer: rgba(22, 22, 24, 0.9);
            --header: rgba(0, 0, 0, 0.88);
            --send-disabled: rgba(255, 255, 255, 0.14);
            --shadow: 0 18px 52px rgba(0, 0, 0, 0.36), 0 6px 16px rgba(0, 0, 0, 0.24);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --page: #F2F4F6;
                --surface: rgba(255, 255, 255, 0.86);
                --surface-strong: rgba(255, 255, 255, 0.96);
                --border: rgba(0, 0, 0, 0.07);
                --text: #141414;
                --muted: #6B7684;
                --soft: rgba(20, 20, 20, 0.64);
                --composer: rgba(255, 255, 255, 0.94);
                --header: rgba(242, 244, 246, 0.9);
                --send-disabled: rgba(0, 0, 0, 0.08);
                --shadow: 0 14px 36px rgba(0, 0, 0, 0.11), 0 3px 10px rgba(0, 0, 0, 0.08);
            }
        }

        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            background: var(--page);
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .enjoy-page {
            min-height: 100vh;
            min-height: 100svh;
            width: 100%;
            max-width: 28rem;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: var(--page);
            color: var(--text);
        }

        .chat-shell {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100svh;
            background: var(--page);
        }

        .chat-header {
            position: relative;
            z-index: 20;
            padding: max(13px, env(safe-area-inset-top)) 14px 11px;
            background: var(--header);
            -webkit-backdrop-filter: blur(18px) saturate(1.5);
            backdrop-filter: blur(18px) saturate(1.5);
            border-bottom: 1px solid var(--border);
        }

        .header-button {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            transition: transform .14s ease, background .14s ease;
        }
        .header-button:active { transform: scale(0.94); background: var(--surface-strong); }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            background: #3182F6;
            box-shadow: 0 8px 22px rgba(49, 130, 246, 0.36);
            flex: 0 0 auto;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #34C759;
            box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.16);
        }
        .status-dot.thinking {
            background: #FFB020;
            box-shadow: 0 0 0 3px rgba(255, 176, 32, 0.18);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 14px 124px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { display: none; }
        .messages { scrollbar-width: none; -ms-overflow-style: none; }

        .message-row {
            display: flex;
            gap: 9px;
            margin: 0 0 16px;
            animation: appear .22s ease both;
        }
        .message-row.user {
            justify-content: flex-end;
            margin-left: 48px;
        }
        .message-row.assistant { margin-right: 8px; }
        @keyframes appear {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 31px;
            height: 31px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3182F6;
            color: #FFFFFF;
            box-shadow: 0 7px 18px rgba(49, 130, 246, 0.26);
            flex: 0 0 auto;
            margin-top: 2px;
        }

        .bubble {
            max-width: min(100%, 320px);
            padding: 12px 14px;
            border-radius: 19px;
            font-size: 14.5px;
            line-height: 1.55;
            font-weight: 600;
            white-space: pre-wrap;
            word-break: keep-all;
            overflow-wrap: anywhere;
        }
        .assistant .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-top-left-radius: 7px;
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.11);
        }
        .user .bubble {
            background: var(--user);
            color: var(--user-text);
            border-top-right-radius: 7px;
            box-shadow: 0 9px 24px rgba(49, 130, 246, 0.28);
        }

        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 4px 0 18px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
        }
        .day-divider::before,
        .day-divider::after {
            content: "";
            height: 1px;
            background: var(--border);
            flex: 1;
        }

        .quick-prompts {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin: 4px 0 18px 40px;
        }
        .quick-prompts.hidden { display: none; }
        .quick-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 100%;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            color: var(--text);
            padding: 11px 12px;
            font-size: 12.5px;
            font-weight: 800;
            line-height: 1.25;
            text-align: left;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
            transition: transform .14s ease, background .14s ease;
        }
        .quick-chip i {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3182F6;
            flex: 0 0 auto;
        }
        .quick-chip:active { transform: scale(0.96); background: var(--surface-strong); }

        .typing {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            height: 18px;
        }
        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: var(--muted);
            animation: typing 1s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: .14s; }
        .typing span:nth-child(3) { animation-delay: .28s; }
        @keyframes typing {
            0%, 80%, 100% { opacity: .35; transform: translateY(0); }
            40% { opacity: 1; transform: translateY(-3px); }
        }

        .composer-wrap {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 30;
            padding: 14px 12px max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--page) 82%, transparent);
        }

        .composer {
            display: flex;
            align-items: flex-end;
            gap: 9px;
            padding: 8px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--composer);
            box-shadow: var(--shadow);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            backdrop-filter: blur(20px) saturate(1.5);
            transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
        }
        .composer:focus-within {
            border-color: rgba(49, 130, 246, 0.52);
            box-shadow: 0 18px 48px rgba(49, 130, 246, 0.16), var(--shadow);
        }

        .chat-input {
            flex: 1;
            min-height: 24px;
            max-height: 128px;
            resize: none;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            font-weight: 650;
            padding: 9px 4px 8px 9px;
        }
        .chat-input::placeholder { color: var(--muted); }

        .send-button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--user);
            color: #FFFFFF;
            flex: 0 0 auto;
            transition: transform .14s ease, opacity .14s ease;
        }
        .send-button:active { transform: scale(0.94); }
        .send-button:disabled {
            background: var(--send-disabled);
            color: var(--muted);
            opacity: 1;
            transform: none;
        }

        @media (max-width: 360px) {
            .quick-prompts { grid-template-columns: 1fr; }
            .bubble { max-width: min(100%, 286px); }
        }
    </style>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body>
    <div class="enjoy-page">
        <section class="chat-shell" aria-label="엔조이 비서실장 채팅">
            <header class="chat-header">
                <div class="flex items-center gap-3">
                    <button type="button" class="header-button" onclick="window.haptic(); location.href='index.html';" aria-label="뒤로가기">
                        <i class="fa-solid fa-chevron-left text-[15px]" aria-hidden="true"></i>
                    </button>
                    <div class="avatar" aria-hidden="true">
                        <i class="fa-solid fa-user-tie text-[16px]"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                        <h1 class="text-[17px] font-black tracking-tight truncate">엔조이 비서실장</h1>
                        <div class="mt-0.5 flex items-center gap-2 text-[11.5px] font-bold" style="color: var(--muted);">
                            <span id="status-dot" class="status-dot"></span>
                            <span id="status-text">대기 중</span>
                        </div>
                    </div>
                    <button type="button" class="header-button" onclick="resetChat()" aria-label="새 대화">
                        <i class="fa-solid fa-pen text-[14px]" aria-hidden="true"></i>
                    </button>
                </div>
            </header>

            <main id="messages" class="messages" aria-live="polite"></main>

            <form id="chat-form" class="composer-wrap">
                <div class="composer">
                    <textarea id="chat-input" class="chat-input" rows="1" placeholder="메시지 보내기"></textarea>
                    <button id="send-button" class="send-button" type="submit" aria-label="보내기" disabled>
                        <i class="fa-solid fa-arrow-up text-[15px]" aria-hidden="true"></i>
                    </button>
                </div>
            </form>
        </section>
    </div>

    <script>
        window.haptic = function () { if (navigator.vibrate) navigator.vibrate(10); };

        const messagesEl = document.getElementById('messages');
        const formEl = document.getElementById('chat-form');
        const inputEl = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const storageKey = 'enjoy-secretary-chat-v1';

        const starterMessages = [
            {
                role: 'assistant',
                text: '안녕하세요. 엔조이 비서실장입니다.\n일정 정리, 모임비 확인, 학교 공지 메모, 여행 계획처럼 귀찮은 일을 편하게 던져주세요.'
            }
        ];

        const quickPrompts = [
            { icon: 'fa-calendar-check', text: '오늘 일정 정리해줘' },
            { icon: 'fa-coins', text: '모임비 안내문 써줘' },
            { icon: 'fa-bell', text: '학교 공지 메모해줘' },
            { icon: 'fa-map-location-dot', text: '여행 계획 같이 짜줘' }
        ];

        let chatMessages = loadMessages();
        let isTyping = false;

        function loadMessages() {
            try {
                const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
                if (Array.isArray(saved) && saved.length) return saved.slice(0, 80);
            } catch (error) {}
            return starterMessages.slice();
        }

        function saveMessages() {
            try {
                localStorage.setItem(storageKey, JSON.stringify(chatMessages.slice(-80)));
            } catch (error) {}
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch];
            });
        }

        function renderChat() {
            messagesEl.innerHTML = renderDayDivider() + chatMessages.map(renderMessage).join('') + renderQuickPrompts();
            scrollToBottom();
        }

        function renderDayDivider() {
            return '<div class="day-divider">오늘</div>';
        }

        function renderMessage(message) {
            const role = message.role === 'user' ? 'user' : 'assistant';
            const avatar = role === 'assistant'
                ? '<div class="message-avatar"><i class="fa-solid fa-user-tie text-[12px]" aria-hidden="true"></i></div>'
                : '';
            return '<div class="message-row ' + role + '">' +
                avatar +
                '<div class="bubble">' + escapeHtml(message.text) + '</div>' +
            '</div>';
        }

        function renderQuickPrompts() {
            if (chatMessages.length > 1 || isTyping) return '';
            return '<div class="quick-prompts">' + quickPrompts.map(function (prompt, index) {
                return '<button type="button" class="quick-chip" data-prompt-index="' + index + '">' +
                    '<i class="fa-solid ' + prompt.icon + '" aria-hidden="true"></i>' +
                    '<span>' + escapeHtml(prompt.text) + '</span>' +
                '</button>';
            }).join('') + '</div>';
        }

        function renderTyping() {
            const row = document.createElement('div');
            row.className = 'message-row assistant';
            row.id = 'typing-row';
            row.innerHTML =
                '<div class="message-avatar"><i class="fa-solid fa-user-tie text-[12px]" aria-hidden="true"></i></div>' +
                '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
            messagesEl.appendChild(row);
            scrollToBottom();
        }

        function scrollToBottom() {
            requestAnimationFrame(function () {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            });
        }

        function resizeInput() {
            inputEl.style.height = 'auto';
            inputEl.style.height = Math.min(inputEl.scrollHeight, 128) + 'px';
            sendButton.disabled = !inputEl.value.trim() || isTyping;
        }

        function sendQuickPrompt(text) {
            inputEl.value = text;
            resizeInput();
            submitMessage();
        }

        function submitMessage() {
            const text = inputEl.value.trim();
            if (!text || isTyping) return;
            window.haptic();
            chatMessages.push({ role: 'user', text: text });
            inputEl.value = '';
            resizeInput();
            saveMessages();
            renderChat();
            isTyping = true;
            setAssistantThinking(true);
            sendButton.disabled = true;
            renderTyping();

            window.setTimeout(function () {
                const typingRow = document.getElementById('typing-row');
                if (typingRow) typingRow.remove();
                chatMessages.push({ role: 'assistant', text: createReply(text) });
                isTyping = false;
                setAssistantThinking(false);
                saveMessages();
                renderChat();
                resizeInput();
            }, Math.min(1100, 520 + text.length * 16));
        }

        function createReply(text) {
            const t = text.toLowerCase();
            if (hasAny(t, ['일정', '스케줄', '오늘', '내일', '약속'])) {
                return '좋아요. 일정은 이렇게 정리하면 깔끔해요.\n\n1. 꼭 해야 하는 일\n2. 시간이 정해진 약속\n3. 미뤄도 되는 일\n\n시간이랑 해야 할 일을 보내주면 제가 우선순위대로 다시 정리해드릴게요.';
            }
            if (hasAny(t, ['모임비', '회비', '돈', '납부', '정산'])) {
                return '모임비 관련이면 톤을 딱 맞춰드릴 수 있어요.\n\n예시 문구:\n이번 달 모임비 확인 부탁드려요. 납부하신 분은 따로 표시해둘게요. 아직 못 낸 분도 편할 때 알려주세요.';
            }
            if (hasAny(t, ['학교', '공지', '수업', '과제', '시험'])) {
                return '학교 관련 내용은 공지 제목, 마감일, 해야 할 일을 나눠서 보면 좋아요.\n\n공지 내용을 붙여주면 제가 핵심만 요약하고 체크리스트로 바꿔드릴게요.';
            }
            if (hasAny(t, ['여행', '숙소', '맛집', '코스', '계획'])) {
                return '여행 계획은 날짜, 지역, 예산, 이동수단만 있으면 바로 틀을 잡을 수 있어요.\n\n어디로 몇 명이 가는지 알려주면 일정표처럼 정리해드릴게요.';
            }
            if (hasAny(t, ['안녕', '하이', 'ㅎㅇ', '반가'])) {
                return '안녕하세요. 오늘도 비서실은 열려 있습니다.\n필요한 일 하나만 던져주세요. 제가 정리해서 돌려드릴게요.';
            }
            if (hasAny(t, ['고마', '감사', '땡큐'])) {
                return '언제든요. 이런 자잘한 정리는 제가 맡는 쪽이 마음 편하죠.';
            }
            return '좋아요. 제가 이해한 바로는 이걸 정리하거나 문장으로 다듬으면 될 것 같아요.\n\n조금 더 정확히 해드리려면 목적, 마감, 원하는 말투를 같이 보내주세요.';
        }

        function hasAny(text, words) {
            return words.some(function (word) { return text.indexOf(word) > -1; });
        }

        function resetChat() {
            window.haptic();
            chatMessages = starterMessages.slice();
            saveMessages();
            inputEl.value = '';
            isTyping = false;
            setAssistantThinking(false);
            renderChat();
            resizeInput();
            inputEl.focus();
        }

        function setAssistantThinking(active) {
            if (statusDot) statusDot.classList.toggle('thinking', !!active);
            if (statusText) statusText.textContent = active ? '답변 작성 중' : '대기 중';
        }

        formEl.addEventListener('submit', function (event) {
            event.preventDefault();
            submitMessage();
        });

        inputEl.addEventListener('input', resizeInput);
        inputEl.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                submitMessage();
            }
        });
        messagesEl.addEventListener('click', function (event) {
            const button = event.target.closest('[data-prompt-index]');
            if (!button) return;
            const prompt = quickPrompts[Number(button.dataset.promptIndex)];
            if (prompt) sendQuickPrompt(prompt.text);
        });

        setAssistantThinking(false);
        renderChat();
        resizeInput();
    </script>
</body>
</html>
