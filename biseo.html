<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>엔조이 비서실장</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            color-scheme: dark light;
            --visual-height: 100dvh;
            --visual-top: 0px;
            --page: #000000;
            --surface: rgba(255, 255, 255, 0.055);
            --surface-strong: rgba(255, 255, 255, 0.09);
            --border: rgba(255, 255, 255, 0.11);
            --text: #ffffff;
            --muted: #a1a1a6;
            --assistant: rgba(255, 255, 255, 0.075);
            --assistant-tail: rgba(255, 255, 255, 0.075);
            --user: #3182f6;
            --user-text: #ffffff;
            --blue: #3182f6;
            --composer: rgba(22, 22, 24, 0.9);
            --header: rgba(0, 0, 0, 0.88);
            --separator: var(--border);
            --send-disabled: rgba(255, 255, 255, 0.14);
            --sheet: rgba(26, 26, 28, 0.94);
            --shadow: 0 18px 52px rgba(0, 0, 0, 0.36), 0 6px 16px rgba(0, 0, 0, 0.24);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --page: #f2f4f6;
                --surface: rgba(255, 255, 255, 0.86);
                --surface-strong: rgba(255, 255, 255, 0.96);
                --border: rgba(0, 0, 0, 0.07);
                --text: #141414;
                --muted: #6b7684;
                --assistant: rgba(255, 255, 255, 0.96);
                --assistant-tail: rgba(255, 255, 255, 0.96);
                --composer: rgba(255, 255, 255, 0.94);
                --header: rgba(242, 244, 246, 0.9);
                --send-disabled: rgba(0, 0, 0, 0.08);
                --sheet: rgba(248, 248, 250, 0.96);
                --shadow: 0 14px 36px rgba(0, 0, 0, 0.11), 0 3px 10px rgba(0, 0, 0, 0.08);
            }
        }

        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--page);
        }
        body {
            position: fixed;
            inset: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        button, textarea { font: inherit; }
        button { border: 0; cursor: pointer; }

        .enjoy-page {
            position: fixed;
            top: var(--visual-top);
            left: 50%;
            width: 100%;
            max-width: 28rem;
            height: var(--visual-height);
            transform: translateX(-50%);
            overflow: hidden;
            background: var(--page);
            color: var(--text);
            box-shadow: 0 0 36px rgba(0, 0, 0, 0.08);
        }
        .chat-shell {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: var(--page);
        }

        .chat-header {
            position: relative;
            z-index: 20;
            flex: none;
            padding: max(13px, env(safe-area-inset-top)) 14px 11px;
            background: var(--header);
            border-bottom: 1px solid var(--separator);
            -webkit-backdrop-filter: blur(18px) saturate(1.5);
            backdrop-filter: blur(18px) saturate(1.5);
        }
        .chat-header-main {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr) 84px;
            align-items: center;
            gap: 8px;
        }
        .header-side {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-side.right { justify-content: flex-end; }
        .header-button {
            width: 36px;
            height: 36px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            transition: transform .14s ease, background-color .14s ease;
        }
        .header-button:active {
            transform: scale(.94);
            background: var(--surface-strong);
        }
        .header-profile {
            min-width: 0;
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr);
            column-gap: 10px;
            align-items: center;
            text-align: left;
        }
        .assistant-avatar {
            position: relative;
            grid-row: span 2;
            width: 38px;
            height: 38px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: linear-gradient(160deg, #dcecff, #9fc7ff);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .assistant-avatar img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            object-position: center bottom;
            transform: translateY(3px) scale(1.12);
        }
        .online-dot {
            position: absolute;
            right: -1px;
            bottom: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #34c759;
            border: 2px solid var(--page);
        }
        .online-dot.thinking { background: #ff9f0a; }
        .profile-name {
            width: 100%;
            font-size: 17px;
            line-height: 21px;
            font-weight: 900;
            letter-spacing: -0.02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-status {
            color: var(--muted);
            font-size: 11.5px;
            line-height: 15px;
            font-weight: 750;
        }
        .thread-title-bar {
            min-height: 18px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 7px 4px 0 52px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .messages {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding: 16px 14px 10px;
            background: var(--page);
            scroll-behavior: smooth;
        }
        .keyboard-adjusting .messages { scroll-behavior: auto; }
        .messages::-webkit-scrollbar { display: none; }
        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin: 4px 0 18px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
        }
        .day-divider::before,
        .day-divider::after {
            content: "";
            height: 1px;
            background: var(--border);
            flex: 1;
        }
        .day-divider span {
            padding: 0 2px;
            border-radius: 999px;
            background: transparent;
        }
        .message-row {
            position: relative;
            display: flex;
            align-items: flex-end;
            margin: 2px 0;
            animation: messageIn .2s ease both;
        }
        .message-row.group-start { margin-top: 9px; }
        .message-row.user { justify-content: flex-end; padding-left: 54px; }
        .message-row.assistant { justify-content: flex-start; padding-right: 54px; }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(5px) scale(.985); }
            to { opacity: 1; transform: none; }
        }
        .message-avatar {
            width: 26px;
            height: 26px;
            margin-right: 6px;
            border-radius: 50%;
            overflow: hidden;
            flex: none;
            background: #3182f6;
            visibility: hidden;
        }
        .message-row.group-end .message-avatar { visibility: visible; }
        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: translateY(2px) scale(1.13);
        }
        .bubble {
            position: relative;
            max-width: min(100%, 320px);
            padding: 8px 12px 9px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.42;
            font-weight: 520;
            letter-spacing: -0.012em;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }
        .assistant .bubble {
            background: var(--assistant);
            border: 1px solid var(--border);
            color: var(--text);
            box-shadow: 0 7px 22px rgba(0, 0, 0, 0.11);
        }
        .user .bubble {
            background: var(--user);
            color: var(--user-text);
            box-shadow: 0 9px 24px rgba(49, 130, 246, 0.28);
        }
        .assistant:not(.group-start) .bubble { border-top-left-radius: 7px; }
        .assistant:not(.group-end) .bubble { border-bottom-left-radius: 7px; }
        .user:not(.group-start) .bubble { border-top-right-radius: 7px; }
        .user:not(.group-end) .bubble { border-bottom-right-radius: 7px; }
        .message-row.group-end.user .bubble::before,
        .message-row.group-end.assistant .bubble::before,
        .message-row.group-end.user .bubble::after,
        .message-row.group-end.assistant .bubble::after {
            content: "";
            position: absolute;
            bottom: 0;
            height: 18px;
        }
        .message-row.group-end.user .bubble::before {
            right: -7px;
            width: 15px;
            background: var(--user);
            border-bottom-left-radius: 15px 13px;
        }
        .message-row.group-end.user .bubble::after {
            right: -11px;
            width: 11px;
            background: var(--page);
            border-bottom-left-radius: 11px;
        }
        .message-row.group-end.assistant .bubble::before {
            left: -7px;
            width: 15px;
            background: var(--assistant-tail);
            border-bottom-right-radius: 15px 13px;
        }
        .message-row.group-end.assistant .bubble::after {
            left: -11px;
            width: 11px;
            background: var(--page);
            border-bottom-right-radius: 11px;
        }

        .quick-prompts {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin: 4px 0 18px 32px;
        }
        .quick-chip {
            min-height: 42px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 11px 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 12.5px;
            font-weight: 800;
            text-align: left;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
            transition: transform .14s ease, background-color .14s ease;
        }
        .quick-chip i { color: var(--blue); }
        .quick-chip:active { transform: scale(.96); background: var(--surface-strong); }

        .typing {
            height: 15px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0 2px;
        }
        .typing span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
            animation: typing 1s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: .14s; }
        .typing span:nth-child(3) { animation-delay: .28s; }
        @keyframes typing {
            0%, 70%, 100% { transform: translateY(0); opacity: .42; }
            35% { transform: translateY(-3px); opacity: 1; }
        }

        .composer-wrap {
            position: relative;
            z-index: 30;
            flex: none;
            padding: 14px 12px max(12px, env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--page) 82%, transparent);
        }
        .composer {
            min-height: 44px;
            display: flex;
            align-items: flex-end;
            gap: 9px;
            padding: 4px 4px 4px 14px;
            border: 1px solid #c7c7cc;
            border-color: var(--border);
            border-radius: 24px;
            background: var(--composer);
            box-shadow: var(--shadow);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            backdrop-filter: blur(20px) saturate(1.5);
            transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
        }
        .composer:focus-within {
            border-color: rgba(49, 130, 246, 0.52);
            box-shadow: 0 18px 48px rgba(49, 130, 246, 0.16), var(--shadow);
        }
        .chat-input {
            display: block;
            flex: 1 1 auto;
            width: 100%;
            height: 34px;
            min-height: 34px;
            max-height: 112px;
            margin: 0;
            padding: 7px 0;
            resize: none;
            overflow-y: auto;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--text);
            font-size: 15.5px;
            line-height: 20px;
            font-weight: 500;
            letter-spacing: -0.01em;
            -webkit-appearance: none;
            appearance: none;
        }
        .chat-input::placeholder {
            color: var(--muted);
            opacity: 1;
        }
        .send-button {
            width: 34px;
            height: 34px;
            flex: 0 0 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            background: var(--user);
            color: #ffffff;
            font-size: 14px;
            transition: transform .13s ease, background-color .13s ease;
        }
        .send-button:active { transform: scale(.9); }
        .send-button:disabled {
            background: var(--send-disabled);
            color: var(--muted);
            transform: none;
        }

        .thread-drawer {
            position: absolute;
            inset: 0;
            z-index: 80;
            display: flex;
            align-items: flex-end;
            pointer-events: none;
            visibility: hidden;
        }
        .thread-drawer.open {
            pointer-events: auto;
            visibility: visible;
        }
        .thread-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: opacity .24s ease;
        }
        .thread-drawer.open .thread-backdrop { opacity: 1; }
        .thread-sheet {
            position: relative;
            width: 100%;
            max-height: min(76%, 620px);
            display: flex;
            flex-direction: column;
            padding: 8px 12px max(14px, env(safe-area-inset-bottom));
            border-radius: 24px 24px 0 0;
            background: var(--sheet);
            box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.16);
            transform: translateY(104%);
            transition: transform .34s cubic-bezier(.2, .85, .2, 1);
            -webkit-backdrop-filter: blur(28px) saturate(1.6);
            backdrop-filter: blur(28px) saturate(1.6);
        }
        .thread-drawer.open .thread-sheet { transform: translateY(0); }
        .sheet-grabber {
            width: 38px;
            height: 5px;
            margin: 0 auto 8px;
            border-radius: 999px;
            background: #c7c7cc;
        }
        .sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 4px 4px 11px;
        }
        .sheet-title {
            margin: 0;
            font-size: 22px;
            line-height: 1.15;
            font-weight: 850;
            letter-spacing: -0.03em;
        }
        .sheet-account {
            margin-top: 3px;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
        }
        .new-thread-button {
            min-height: 38px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 13px;
            border-radius: 19px;
            background: var(--blue);
            color: #ffffff;
            font-size: 12px;
            font-weight: 750;
        }
        .thread-list {
            min-height: 0;
            overflow-y: auto;
            padding: 2px 0;
            scrollbar-width: none;
        }
        .thread-list::-webkit-scrollbar { display: none; }
        .thread-item {
            width: 100%;
            display: grid;
            grid-template-columns: 40px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px 9px;
            border-radius: 16px;
            background: transparent;
            color: var(--text);
            text-align: left;
        }
        .thread-item + .thread-item { margin-top: 2px; }
        .thread-item.active { background: rgba(49, 130, 246, .16); }
        .thread-item:active { background: rgba(120, 120, 128, .13); }
        .thread-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: #dcecff;
        }
        .thread-avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: translateY(3px) scale(1.14);
        }
        .thread-copy { min-width: 0; }
        .thread-name {
            font-size: 14px;
            line-height: 18px;
            font-weight: 750;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .thread-preview {
            margin-top: 2px;
            color: var(--muted);
            font-size: 11.5px;
            line-height: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .thread-time {
            align-self: start;
            padding-top: 3px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 600;
        }
        .local-note {
            padding: 10px 8px 2px;
            color: var(--muted);
            font-size: 10px;
            line-height: 1.4;
            text-align: center;
        }

        @media (max-width: 360px) {
            .chat-header-main { grid-template-columns: 38px minmax(0, 1fr) 76px; }
            .header-button { width: 33px; height: 33px; }
            .assistant-avatar { width: 36px; height: 36px; }
            .message-row.user { padding-left: 42px; }
            .message-row.assistant { padding-right: 42px; }
            .bubble { font-size: 14.5px; }
            .quick-prompts { grid-template-columns: 1fr; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                scroll-behavior: auto !important;
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
        }
    </style>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body>
    <div class="enjoy-page" id="enjoy-page">
        <section class="chat-shell" aria-label="엔조이 비서실장 채팅">
            <header class="chat-header">
                <div class="chat-header-main">
                    <div class="header-side">
                        <button type="button" class="header-button" id="back-button" aria-label="메인으로 돌아가기">
                            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
                        </button>
                    </div>

                    <div class="header-profile">
                        <div class="assistant-avatar" aria-hidden="true">
                            <img src="dhkfodshf.png" alt="">
                            <span id="status-dot" class="online-dot"></span>
                        </div>
                        <div class="profile-name">엔조이 비서실장</div>
                        <div id="status-text" class="profile-status">온라인</div>
                    </div>

                    <div class="header-side right">
                        <button type="button" class="header-button" id="thread-list-button" aria-label="저장된 대화 목록">
                            <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="header-button" id="new-chat-button" aria-label="새 대화">
                            <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>
                <div id="active-thread-title" class="thread-title-bar">새로운 대화</div>
            </header>

            <main id="messages" class="messages" aria-live="polite"></main>

            <form id="chat-form" class="composer-wrap">
                <div class="composer">
                    <textarea id="chat-input" class="chat-input" rows="1" placeholder="메시지 보내기" aria-label="메시지 입력"></textarea>
                    <button id="send-button" class="send-button" type="submit" aria-label="보내기" disabled>
                        <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
                    </button>
                </div>
            </form>
        </section>

        <div id="thread-drawer" class="thread-drawer" aria-hidden="true">
            <button type="button" class="thread-backdrop" id="thread-backdrop" aria-label="대화 목록 닫기"></button>
            <section class="thread-sheet" role="dialog" aria-modal="true" aria-labelledby="thread-sheet-title">
                <div class="sheet-grabber" aria-hidden="true"></div>
                <div class="sheet-header">
                    <div>
                        <h2 id="thread-sheet-title" class="sheet-title">대화</h2>
                        <div id="sheet-account" class="sheet-account"></div>
                    </div>
                    <button type="button" class="new-thread-button" id="sheet-new-chat-button">
                        <i class="fa-solid fa-plus" aria-hidden="true"></i>
                        새 대화
                    </button>
                </div>
                <div id="thread-list" class="thread-list"></div>
                <div class="local-note">대화는 현재 기기의 이 계정 저장공간에만 보관됩니다.</div>
            </section>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        window.haptic = function () {
            if (navigator.vibrate) navigator.vibrate(10);
        };

        const ACCOUNT_KEY = 'enjoy_chat_account_v1';
        const ACCOUNT_LABEL_KEY = 'enjoy_chat_account_label_v1';
        const LEGACY_KEY = 'enjoy-secretary-chat-v1';
        const THREAD_KEY_PREFIX = 'enjoy-secretary-threads-v2:';
        const MAX_THREADS = 40;
        const MAX_MESSAGES = 120;

        const pageEl = document.getElementById('enjoy-page');
        const messagesEl = document.getElementById('messages');
        const formEl = document.getElementById('chat-form');
        const inputEl = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const activeTitleEl = document.getElementById('active-thread-title');
        const drawerEl = document.getElementById('thread-drawer');
        const threadListEl = document.getElementById('thread-list');
        const sheetAccountEl = document.getElementById('sheet-account');

        const accountId = readAccountId();
        const accountLabel = readAccountLabel();
        const storageKey = THREAD_KEY_PREFIX + accountId;

        const starterMessages = [
            {
                role: 'assistant',
                text: '안녕하세요. 엔조이 비서실장입니다.\n일정 정리, 모임비 확인, 학교 공지 메모, 여행 계획처럼 귀찮은 일을 편하게 던져주세요.',
                at: Date.now()
            }
        ];

        const quickPrompts = [
            { icon: 'fa-calendar-check', text: '오늘 일정 정리해줘' },
            { icon: 'fa-coins', text: '모임비 안내문 써줘' },
            { icon: 'fa-bell', text: '학교 공지 메모해줘' },
            { icon: 'fa-map-location-dot', text: '여행 계획 같이 짜줘' }
        ];

        let store = loadStore();
        let pendingReplies = new Set();
        let wasNearBottom = true;
        let viewportSettleTimer = null;

        function readAccountId() {
            try {
                const value = localStorage.getItem(ACCOUNT_KEY) || 'guest';
                return String(value).replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 160) || 'guest';
            } catch (error) {
                return 'guest';
            }
        }

        function readAccountLabel() {
            try {
                return localStorage.getItem(ACCOUNT_LABEL_KEY) || (accountId === 'guest' ? '게스트' : '엔조이 계정');
            } catch (error) {
                return accountId === 'guest' ? '게스트' : '엔조이 계정';
            }
        }

        function makeId() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
            return 'chat-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
        }

        function makeThread() {
            const now = Date.now();
            return {
                id: makeId(),
                title: '새로운 대화',
                createdAt: now,
                updatedAt: now,
                messages: starterMessages.map(function (message) {
                    return { role: message.role, text: message.text, at: now };
                })
            };
        }

        function normalizeMessage(message) {
            if (!message || typeof message.text !== 'string') return null;
            return {
                role: message.role === 'user' ? 'user' : 'assistant',
                text: message.text.slice(0, 12000),
                at: Number(message.at) || Date.now()
            };
        }

        function normalizeThread(thread) {
            if (!thread || !Array.isArray(thread.messages)) return null;
            const messages = thread.messages.map(normalizeMessage).filter(Boolean).slice(-MAX_MESSAGES);
            if (!messages.length) return null;
            return {
                id: String(thread.id || makeId()),
                title: String(thread.title || '새로운 대화').slice(0, 60),
                createdAt: Number(thread.createdAt) || Date.now(),
                updatedAt: Number(thread.updatedAt) || Date.now(),
                messages: messages
            };
        }

        function loadStore() {
            try {
                const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
                if (saved && Array.isArray(saved.threads)) {
                    const threads = saved.threads.map(normalizeThread).filter(Boolean).slice(0, MAX_THREADS);
                    if (threads.length) {
                        const activeExists = threads.some(function (thread) { return thread.id === saved.activeId; });
                        return { activeId: activeExists ? saved.activeId : threads[0].id, threads: threads };
                    }
                }
            } catch (error) {}

            if (accountId === 'guest') {
                try {
                    const legacy = JSON.parse(localStorage.getItem(LEGACY_KEY) || 'null');
                    if (Array.isArray(legacy) && legacy.length) {
                        const migrated = makeThread();
                        migrated.title = '이전 대화';
                        migrated.messages = legacy.map(normalizeMessage).filter(Boolean).slice(-MAX_MESSAGES);
                        if (!migrated.messages.length) migrated.messages = starterMessages.slice();
                        return { activeId: migrated.id, threads: [migrated] };
                    }
                } catch (error) {}
            }

            const first = makeThread();
            return { activeId: first.id, threads: [first] };
        }

        function saveStore() {
            store.threads = store.threads
                .sort(function (a, b) { return b.updatedAt - a.updatedAt; })
                .slice(0, MAX_THREADS);
            try {
                localStorage.setItem(storageKey, JSON.stringify(store));
            } catch (error) {
                store.threads.forEach(function (thread) {
                    thread.messages = thread.messages.slice(-60);
                });
                try { localStorage.setItem(storageKey, JSON.stringify(store)); } catch (ignored) {}
            }
        }

        function activeThread() {
            let thread = store.threads.find(function (item) { return item.id === store.activeId; });
            if (!thread) {
                thread = makeThread();
                store.threads.unshift(thread);
                store.activeId = thread.id;
            }
            return thread;
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value).replace(/[&<>"']/g, function (character) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[character];
            });
        }

        function renderChat(instant) {
            const thread = activeThread();
            const messages = thread.messages;
            let html = renderDayDivider();

            messages.forEach(function (message, index) {
                const previous = messages[index - 1];
                const next = messages[index + 1];
                html += renderMessage(
                    message,
                    !previous || previous.role !== message.role,
                    !next || next.role !== message.role
                );
            });

            if (pendingReplies.has(thread.id)) html += renderTyping();
            if (messages.length === 1 && !pendingReplies.has(thread.id)) html += renderQuickPrompts();

            messagesEl.innerHTML = html;
            activeTitleEl.textContent = thread.title;
            resizeInput();
            scrollToBottom(instant !== false);
        }

        function renderDayDivider() {
            const now = new Date();
            const label = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
            return '<div class="day-divider"><span>' + escapeHtml(label) + '</span></div>';
        }

        function renderMessage(message, isStart, isEnd) {
            const role = message.role === 'user' ? 'user' : 'assistant';
            const classes = ['message-row', role];
            if (isStart) classes.push('group-start');
            if (isEnd) classes.push('group-end');
            const avatar = role === 'assistant'
                ? '<div class="message-avatar" aria-hidden="true"><img src="dhkfodshf.png" alt=""></div>'
                : '';
            return '<div class="' + classes.join(' ') + '">' +
                avatar +
                '<div class="bubble">' + escapeHtml(message.text) + '</div>' +
            '</div>';
        }

        function renderTyping() {
            return '<div class="message-row assistant group-start group-end" id="typing-row">' +
                '<div class="message-avatar" aria-hidden="true"><img src="dhkfodshf.png" alt=""></div>' +
                '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>' +
            '</div>';
        }

        function renderQuickPrompts() {
            return '<div class="quick-prompts">' + quickPrompts.map(function (prompt, index) {
                return '<button type="button" class="quick-chip" data-prompt-index="' + index + '">' +
                    '<i class="fa-solid ' + prompt.icon + '" aria-hidden="true"></i>' +
                    '<span>' + escapeHtml(prompt.text) + '</span>' +
                '</button>';
            }).join('') + '</div>';
        }

        function scrollToBottom(instant) {
            requestAnimationFrame(function () {
                if (instant === false && typeof messagesEl.scrollTo === 'function') {
                    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
                } else {
                    messagesEl.scrollTop = messagesEl.scrollHeight;
                }
            });
        }

        function nearBottom() {
            return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 90;
        }

        function resizeInput() {
            inputEl.style.height = '34px';
            const nextHeight = Math.max(34, Math.min(inputEl.scrollHeight, 112));
            inputEl.style.height = nextHeight + 'px';
            sendButton.disabled = !inputEl.value.trim() || pendingReplies.has(activeThread().id);
        }

        function makeTitle(text) {
            const clean = text.replace(/\s+/g, ' ').trim();
            if (!clean) return '새로운 대화';
            return clean.length > 24 ? clean.slice(0, 24) + '…' : clean;
        }

        function sendQuickPrompt(text) {
            inputEl.value = text;
            resizeInput();
            submitMessage();
        }

        function submitMessage() {
            const text = inputEl.value.trim();
            const thread = activeThread();
            if (!text || pendingReplies.has(thread.id)) return;

            window.haptic();
            const now = Date.now();
            thread.messages.push({ role: 'user', text: text, at: now });
            thread.messages = thread.messages.slice(-MAX_MESSAGES);
            if (thread.title === '새로운 대화') thread.title = makeTitle(text);
            thread.updatedAt = now;

            inputEl.value = '';
            pendingReplies.add(thread.id);
            setAssistantThinking(true);
            saveStore();
            renderChat();
            renderThreadList();

            const threadId = thread.id;
            window.setTimeout(function () {
                const target = store.threads.find(function (item) { return item.id === threadId; });
                if (!target) return;
                target.messages.push({ role: 'assistant', text: createReply(text), at: Date.now() });
                target.messages = target.messages.slice(-MAX_MESSAGES);
                target.updatedAt = Date.now();
                pendingReplies.delete(threadId);
                saveStore();

                if (store.activeId === threadId) {
                    setAssistantThinking(false);
                    renderChat();
                }
                renderThreadList();
            }, Math.min(1100, 520 + text.length * 16));
        }

        function createReply(text) {
            const lower = text.toLowerCase();
            if (hasAny(lower, ['일정', '스케줄', '오늘', '내일', '약속'])) {
                return '좋아요. 일정은 이렇게 정리하면 깔끔해요.\n\n1. 꼭 해야 하는 일\n2. 시간이 정해진 약속\n3. 미뤄도 되는 일\n\n시간이랑 해야 할 일을 보내주면 제가 우선순위대로 다시 정리해드릴게요.';
            }
            if (hasAny(lower, ['모임비', '회비', '돈', '납부', '정산'])) {
                return '모임비 관련이면 톤을 딱 맞춰드릴 수 있어요.\n\n예시 문구:\n이번 달 모임비 확인 부탁드려요. 납부하신 분은 따로 표시해둘게요. 아직 못 낸 분도 편할 때 알려주세요.';
            }
            if (hasAny(lower, ['학교', '공지', '수업', '과제', '시험'])) {
                return '학교 관련 내용은 공지 제목, 마감일, 해야 할 일을 나눠서 보면 좋아요.\n\n공지 내용을 붙여주면 제가 핵심만 요약하고 체크리스트로 바꿔드릴게요.';
            }
            if (hasAny(lower, ['여행', '숙소', '맛집', '코스', '계획'])) {
                return '여행 계획은 날짜, 지역, 예산, 이동수단만 있으면 바로 틀을 잡을 수 있어요.\n\n어디로 몇 명이 가는지 알려주면 일정표처럼 정리해드릴게요.';
            }
            if (hasAny(lower, ['안녕', '하이', 'ㅎㅇ', '반가'])) {
                return '안녕하세요. 오늘도 비서실은 열려 있습니다.\n필요한 일 하나만 던져주세요. 제가 정리해서 돌려드릴게요.';
            }
            if (hasAny(lower, ['고마', '감사', '땡큐'])) {
                return '언제든요. 이런 자잘한 정리는 제가 맡는 쪽이 마음 편하죠.';
            }
            return '좋아요. 제가 이해한 바로는 이걸 정리하거나 문장으로 다듬으면 될 것 같아요.\n\n조금 더 정확히 해드리려면 목적, 마감, 원하는 말투를 같이 보내주세요.';
        }

        function hasAny(text, words) {
            return words.some(function (word) { return text.indexOf(word) > -1; });
        }

        function createNewThread(focusInput) {
            const current = activeThread();
            const hasUserMessage = current.messages.some(function (message) { return message.role === 'user'; });
            if (!hasUserMessage && current.title === '새로운 대화') {
                closeThreadDrawer();
                if (focusInput !== false) focusInput();
                return;
            }

            const thread = makeThread();
            store.threads.unshift(thread);
            store.activeId = thread.id;
            saveStore();
            setAssistantThinking(false);
            closeThreadDrawer();
            renderChat();
            renderThreadList();
            inputEl.value = '';
            resizeInput();
            if (focusInput !== false) focusInput();
        }

        function switchThread(threadId) {
            if (!store.threads.some(function (thread) { return thread.id === threadId; })) return;
            store.activeId = threadId;
            saveStore();
            setAssistantThinking(pendingReplies.has(threadId));
            inputEl.value = '';
            closeThreadDrawer();
            renderChat();
            renderThreadList();
        }

        function renderThreadList() {
            const sorted = store.threads.slice().sort(function (a, b) { return b.updatedAt - a.updatedAt; });
            threadListEl.innerHTML = sorted.map(function (thread) {
                const last = thread.messages[thread.messages.length - 1];
                const preview = last ? last.text.replace(/\s+/g, ' ') : '새로운 대화';
                return '<button type="button" class="thread-item' + (thread.id === store.activeId ? ' active' : '') + '" data-thread-id="' + escapeHtml(thread.id) + '">' +
                    '<span class="thread-avatar" aria-hidden="true"><img src="dhkfodshf.png" alt=""></span>' +
                    '<span class="thread-copy">' +
                        '<span class="thread-name">' + escapeHtml(thread.title) + '</span>' +
                        '<span class="thread-preview">' + escapeHtml(preview) + '</span>' +
                    '</span>' +
                    '<span class="thread-time">' + escapeHtml(formatThreadTime(thread.updatedAt)) + '</span>' +
                '</button>';
            }).join('');
        }

        function formatThreadTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            if (date.toDateString() === now.toDateString()) {
                return date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
            }
            return date.toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric' });
        }

        function openThreadDrawer() {
            window.haptic();
            renderThreadList();
            drawerEl.classList.add('open');
            drawerEl.setAttribute('aria-hidden', 'false');
        }

        function closeThreadDrawer() {
            drawerEl.classList.remove('open');
            drawerEl.setAttribute('aria-hidden', 'true');
        }

        function setAssistantThinking(active) {
            statusDot.classList.toggle('thinking', !!active);
            statusText.textContent = active ? '답변 작성 중…' : '온라인';
            resizeInput();
        }

        function focusInput() {
            try {
                inputEl.focus({ preventScroll: true });
            } catch (error) {
                inputEl.focus();
            }
            lockPageScroll();
        }

        function syncVisualViewport() {
            const viewport = window.visualViewport;
            const height = viewport ? viewport.height : window.innerHeight;
            document.documentElement.style.setProperty('--visual-height', Math.round(height) + 'px');
            document.documentElement.style.setProperty('--visual-top', '0px');
            lockPageScroll();
            if (wasNearBottom) scrollToBottom();
        }

        function lockPageScroll() {
            pageEl.scrollTop = 0;
            const scrollingElement = document.scrollingElement || document.documentElement;
            if (scrollingElement) scrollingElement.scrollTop = 0;
            if (window.scrollY) window.scrollTo(0, 0);
        }

        function handleViewportChange() {
            wasNearBottom = nearBottom();
            document.body.classList.add('keyboard-adjusting');
            window.clearTimeout(viewportSettleTimer);
            requestAnimationFrame(syncVisualViewport);
            viewportSettleTimer = window.setTimeout(function () {
                syncVisualViewport();
                document.body.classList.remove('keyboard-adjusting');
            }, 240);
        }

        formEl.addEventListener('submit', function (event) {
            event.preventDefault();
            submitMessage();
        });
        inputEl.addEventListener('input', resizeInput);
        inputEl.addEventListener('focus', function () {
            wasNearBottom = nearBottom();
            lockPageScroll();
            requestAnimationFrame(syncVisualViewport);
            window.setTimeout(syncVisualViewport, 90);
            window.setTimeout(syncVisualViewport, 280);
        });
        inputEl.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' && !event.shiftKey && !event.isComposing) {
                event.preventDefault();
                submitMessage();
            }
        });
        messagesEl.addEventListener('scroll', function () {
            wasNearBottom = nearBottom();
        }, { passive: true });
        messagesEl.addEventListener('click', function (event) {
            const button = event.target.closest('[data-prompt-index]');
            if (!button) return;
            const prompt = quickPrompts[Number(button.dataset.promptIndex)];
            if (prompt) sendQuickPrompt(prompt.text);
        });
        threadListEl.addEventListener('click', function (event) {
            const button = event.target.closest('[data-thread-id]');
            if (button) switchThread(button.dataset.threadId);
        });
        document.getElementById('back-button').addEventListener('click', function () {
            window.haptic();
            location.href = 'index.html';
        });
        document.getElementById('thread-list-button').addEventListener('click', openThreadDrawer);
        document.getElementById('new-chat-button').addEventListener('click', function () {
            window.haptic();
            createNewThread(true);
        });
        document.getElementById('sheet-new-chat-button').addEventListener('click', function () {
            window.haptic();
            createNewThread(true);
        });
        document.getElementById('thread-backdrop').addEventListener('click', closeThreadDrawer);

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', handleViewportChange, { passive: true });
            window.visualViewport.addEventListener('scroll', handleViewportChange, { passive: true });
        }
        window.addEventListener('resize', handleViewportChange, { passive: true });
        window.addEventListener('orientationchange', handleViewportChange, { passive: true });

        sheetAccountEl.textContent = accountLabel + ' · 로컬 저장';
        saveStore();
        setAssistantThinking(pendingReplies.has(store.activeId));
        syncVisualViewport();
        renderChat();
        renderThreadList();
        resizeInput();
    })();
    </script>
</body>
</html>
