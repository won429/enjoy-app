<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>엔조이 복불복</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        :root {
            color-scheme: dark;
            --bg: #000000;
            --card: #101114;
            --card-2: #17181c;
            --glass: rgba(255,255,255,.07);
            --glass-strong: rgba(255,255,255,.11);
            --line: rgba(255,255,255,.1);
            --line-strong: rgba(255,255,255,.18);
            --text: #f2f4f6;
            --sub: #8b95a1;
            --faint: rgba(255,255,255,.36);
            --blue: #3182f6;
            --red: #f04452;
            --green: #22c55e;
            --yellow: #ffd60a;
            --safe-top: max(14px, env(safe-area-inset-top));
            --safe-bottom: max(18px, env(safe-area-inset-bottom));
        }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            letter-spacing: 0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        body {
            height: 100dvh;
            overflow: hidden;
        }
        button {
            border: 0;
            padding: 0;
            color: inherit;
            background: none;
            font: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active { transform: scale(.96); }
        .app {
            width: min(100%, 480px);
            height: 100dvh;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        .screen {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .topbar {
            flex: 0 0 auto;
            padding: var(--safe-top) 18px 9px;
        }
        .top-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .top-left {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.86);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }
        .title-block { min-width: 0; }
        .title-block h1 {
            margin: 0;
            color: #fff;
            font-size: 21px;
            line-height: 1.1;
            font-weight: 850;
        }
        .title-block p {
            margin: 4px 0 0;
            color: var(--sub);
            font-size: 11.5px;
            line-height: 1.2;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .present-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 38px;
            padding: 5px 8px;
            border-radius: 999px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.08);
        }
        .present-count {
            color: rgba(255,255,255,.65);
            font-size: 10.5px;
            font-weight: 800;
            white-space: nowrap;
        }
        .present-avatars {
            display: flex;
            align-items: center;
        }
        .present-avatars .avatar {
            width: 26px;
            height: 26px;
            margin-left: -6px;
            border: 2px solid #0b0b0c;
        }
        .present-avatars .avatar:first-child { margin-left: 0; }
        .content {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 4px 18px 132px;
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .card {
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,.38);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            backdrop-filter: blur(12px) saturate(180%);
        }
        .stage {
            min-height: 438px;
            padding: 16px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 13px;
        }
        .mode-copy { min-width: 0; }
        .mode-copy h2 {
            margin: 0;
            color: #fff;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 900;
        }
        .mode-copy p {
            margin: 6px 0 0;
            color: var(--sub);
            font-size: 12px;
            line-height: 1.35;
            font-weight: 650;
        }
        .round-pill {
            flex: 0 0 auto;
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-radius: 999px;
            background: rgba(0,0,0,.26);
            border: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.72);
            font-size: 10.5px;
            font-weight: 850;
        }
        .round-pill.live { color: #fff; }
        .round-pill.live i { color: var(--green); }
        .game-area {
            min-height: 314px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty {
            width: 100%;
            min-height: 304px;
            display: grid;
            place-items: center;
            text-align: center;
            color: rgba(255,255,255,.48);
        }
        .empty i {
            width: 70px;
            height: 70px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: rgba(255,255,255,.08);
            color: #fff;
            font-size: 28px;
        }
        .empty strong {
            display: block;
            color: #fff;
            font-size: 18px;
            font-weight: 850;
        }
        .empty span {
            display: block;
            margin-top: 7px;
            color: var(--sub);
            font-size: 12px;
            font-weight: 650;
        }
        .action-bar {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .my-action {
            min-height: 52px;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-radius: 18px;
            background: #fff;
            color: #111;
            font-size: 15px;
            font-weight: 900;
            box-shadow: 0 8px 28px rgba(255,255,255,.12);
        }
        .my-action:disabled {
            opacity: .48;
            transform: none;
        }
        .sub-action {
            width: 52px;
            height: 52px;
            flex: 0 0 auto;
            border-radius: 18px;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.82);
        }
        .mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin: 13px 0;
        }
        .mode-tab {
            min-height: 68px;
            padding: 8px 4px;
            border-radius: 20px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.48);
            text-align: center;
        }
        .mode-tab.active {
            background: rgba(255,255,255,.14);
            color: #fff;
            border-color: rgba(255,255,255,.16);
        }
        .mode-tab i {
            display: block;
            margin: 0 auto 7px;
            font-size: 18px;
        }
        .mode-tab span {
            display: block;
            font-size: 10.5px;
            line-height: 1.15;
            font-weight: 850;
        }
        .control {
            padding: 14px;
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-head strong {
            color: #fff;
            font-size: 14px;
            font-weight: 850;
        }
        .section-head span {
            color: var(--sub);
            font-size: 11px;
            font-weight: 750;
        }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .member-chip {
            min-height: 47px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 16px;
            background: rgba(255,255,255,.055);
            border: 1px solid rgba(255,255,255,.07);
            color: rgba(255,255,255,.46);
            text-align: left;
        }
        .member-chip.active {
            background: rgba(255,255,255,.13);
            border-color: rgba(255,255,255,.15);
            color: #fff;
        }
        .avatar {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
            font-weight: 900;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 850;
        }
        .mini-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .mini-btn {
            min-height: 38px;
            flex: 1;
            border-radius: 14px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.72);
            font-size: 12px;
            font-weight: 850;
        }
        .count-row {
            margin-top: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .count-label {
            width: 86px;
            flex: 0 0 auto;
        }
        .count-label strong {
            display: block;
            color: #fff;
            font-size: 13px;
            font-weight: 850;
        }
        .count-label span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 650;
        }
        .stepper {
            flex: 1;
            min-height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px;
            border-radius: 16px;
            background: rgba(0,0,0,.24);
            border: 1px solid rgba(255,255,255,.08);
        }
        .stepper button {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: rgba(255,255,255,.1);
        }
        .stepper strong {
            font-size: 14px;
            font-weight: 900;
        }
        .new-round {
            width: 100%;
            min-height: 52px;
            margin-top: 12px;
            border-radius: 18px;
            background: #fff;
            color: #111;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-size: 15px;
            font-weight: 900;
        }
        .result-card {
            margin-top: 12px;
            padding: 13px 14px;
            display: flex;
            align-items: center;
            gap: 11px;
            border-radius: 18px;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.1);
        }
        .result-card.hidden { display: none; }
        .result-icon {
            width: 38px;
            height: 38px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255,255,255,.1);
            color: #fff;
        }
        .result-copy strong {
            display: block;
            color: #fff;
            font-size: 14px;
            font-weight: 900;
        }
        .result-copy span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 11.5px;
            font-weight: 650;
        }
        .status-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0,1fr));
            gap: 9px;
        }
        .play-card {
            min-height: 116px;
            padding: 10px 7px;
            border-radius: 20px;
            background: rgba(255,255,255,.065);
            border: 1px solid rgba(255,255,255,.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            text-align: center;
        }
        .play-card.done {
            background: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.15);
        }
        .play-card.win {
            background: rgba(240,68,82,.16);
            border-color: rgba(240,68,82,.32);
        }
        .play-symbol {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: #fff;
            color: #111;
            font-size: 19px;
            font-weight: 950;
        }
        .play-name {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #fff;
            font-size: 12px;
            font-weight: 850;
        }
        .play-result {
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
        }
        .play-card.win .play-result { color: #ff9ca5; }
        .ladder-wrap { width: 100%; }
        .ladder-labels {
            display: grid;
            gap: 5px;
        }
        .ladder-name, .ladder-out {
            min-width: 0;
            padding: 7px 3px;
            border-radius: 11px;
            background: rgba(255,255,255,.08);
            color: rgba(255,255,255,.68);
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 850;
        }
        .ladder-name.mine { background: rgba(255,255,255,.16); color: #fff; }
        .ladder-out.win { background: rgba(240,68,82,.16); color: #ff9ca5; }
        .ladder-svg {
            width: 100%;
            height: 242px;
            display: block;
            margin: 8px 0;
            overflow: visible;
        }
        .ladder-line {
            stroke: rgba(255,255,255,.24);
            stroke-width: 3;
            stroke-linecap: round;
        }
        .ladder-rung {
            stroke: rgba(255,255,255,.44);
            stroke-width: 5;
            stroke-linecap: round;
        }
        .ladder-path {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 920;
            stroke-dashoffset: 920;
            animation: path-in 1.1s ease-out forwards;
        }
        @keyframes path-in { to { stroke-dashoffset: 0; } }
        .wheel-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .wheel-shell {
            width: min(266px, 74vw);
            aspect-ratio: 1;
            position: relative;
            display: grid;
            place-items: center;
        }
        .wheel-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 999px;
            border: 8px solid rgba(255,255,255,.92);
            background: #111;
            box-shadow: 0 12px 34px rgba(0,0,0,.34);
        }
        .wheel-svg.spinning {
            animation: spin .55s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wheel-pointer {
            position: absolute;
            top: -1px;
            left: 50%;
            width: 22px;
            height: 22px;
            transform: translateX(-50%) rotate(45deg);
            background: #fff;
            border-radius: 4px;
            z-index: 2;
        }
        .wheel-center {
            position: absolute;
            width: 68px;
            height: 68px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #111;
            font-size: 12px;
            font-weight: 950;
            z-index: 3;
        }
        .wheel-note {
            min-height: 38px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            background: rgba(255,255,255,.09);
            border: 1px solid rgba(255,255,255,.1);
            color: rgba(255,255,255,.76);
            font-size: 12px;
            font-weight: 850;
        }
        .bottom-dock {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: var(--safe-bottom);
            display: flex;
            gap: 8px;
            padding: 8px;
            border-radius: 999px;
            background: rgba(12,12,14,.42);
            border: 1px solid rgba(255,255,255,.14);
            box-shadow: 0 18px 52px rgba(0,0,0,.45);
            -webkit-backdrop-filter: blur(24px) saturate(1.7);
            backdrop-filter: blur(24px) saturate(1.7);
        }
        .dock-btn {
            min-height: 48px;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 999px;
            color: rgba(255,255,255,.72);
            font-size: 12px;
            font-weight: 850;
        }
        .dock-btn.primary {
            background: #fff;
            color: #111;
        }
        .gate {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #000;
        }
        .gate.show { display: flex; }
        .gate-card {
            width: 100%;
            max-width: 340px;
            padding: 22px;
            border-radius: 26px;
            background: #1c1c1e;
            border: 1px solid rgba(255,255,255,.12);
            text-align: center;
            box-shadow: 0 24px 70px rgba(0,0,0,.46);
        }
        .gate-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            background: #fff;
            color: #111;
            font-size: 22px;
        }
        .gate-card h2 {
            margin: 0;
            color: #fff;
            font-size: 22px;
            line-height: 1.18;
            font-weight: 900;
        }
        .gate-card p {
            margin: 9px 0 18px;
            color: var(--sub);
            font-size: 13px;
            line-height: 1.42;
            font-weight: 650;
        }
        .gate-btn {
            width: 100%;
            min-height: 50px;
            border-radius: 17px;
            background: #fff;
            color: #111;
            font-size: 14px;
            font-weight: 900;
        }
        .toast {
            position: absolute;
            left: 50%;
            bottom: calc(var(--safe-bottom) + 76px);
            z-index: 40;
            max-width: calc(100% - 44px);
            padding: 11px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,.94);
            color: #111;
            box-shadow: 0 16px 40px rgba(0,0,0,.35);
            font-size: 12px;
            font-weight: 850;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 10px);
            transition: opacity .16s ease, transform .16s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
        .hidden { display: none !important; }
        @media (max-width: 380px) {
            .member-grid, .status-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
            .stage { padding: 14px; }
            .mode-copy h2 { font-size: 23px; }
            .present-wrap { padding-right: 7px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="screen">
            <header class="topbar">
                <div class="top-line">
                    <div class="top-left">
                        <button class="icon-btn" aria-label="메인으로" onclick="window.haptic(); location.href='index.html'">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div class="title-block">
                            <h1>복불복 게임</h1>
                            <p>엔조이 멤버끼리 각자 뽑는 실시간 게임</p>
                        </div>
                    </div>
                    <div class="present-wrap" aria-label="입장 멤버">
                        <div id="present-avatars" class="present-avatars"></div>
                        <div id="present-count" class="present-count">입장 0</div>
                    </div>
                </div>
            </header>

            <main class="content">
                <section class="stage card">
                    <div class="stage-head">
                        <div class="mode-copy">
                            <h2 id="mode-title">사다리타기</h2>
                            <p id="mode-desc">각자 자기 사다리를 타고 결과를 확인해요</p>
                        </div>
                        <div id="round-pill" class="round-pill">
                            <i class="fa-solid fa-circle"></i><span>대기</span>
                        </div>
                    </div>
                    <div id="game-area" class="game-area"></div>
                    <div id="result-card" class="result-card hidden"></div>
                    <div class="action-bar">
                        <button id="my-action" class="my-action" onclick="window.haptic(); window.EnjoyGame.playMine()">
                            <i class="fa-solid fa-hand-pointer"></i><span>내 차례</span>
                        </button>
                        <button class="sub-action" aria-label="새 판" onclick="window.haptic(); window.EnjoyGame.startRound()">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </section>

                <nav id="mode-tabs" class="mode-tabs" aria-label="게임 선택"></nav>

                <section class="control card">
                    <div class="section-head">

    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, getDoc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const MEMBERS = ['전시기', '성원제', '오스틴', '이진누', '류짱', '홍박사'];
        const MEMBER_META = {
            '전시기': { color: '#f04452', short: '전' },
            '성원제': { color: '#3182f6', short: '성' },
            '오스틴': { color: '#f59e0b', short: '오' },
            '이진누': { color: '#22c55e', short: '이' },
            '류짱': { color: '#a855f7', short: '류' },
            '홍박사': { color: '#06b6d4', short: '홍' }
        };
        const COLORS = ['#3182f6', '#f04452', '#ffd60a', '#22c55e', '#a855f7', '#06b6d4'];
        const MODES = {
            ladder: { title: '사다리타기', desc: '각자 자기 사다리를 타고 결과를 확인해요', icon: 'fa-bars-staggered', action: '내 사다리 타기' },
            lots: { title: '제비뽑기', desc: '멤버가 각자 자기 제비를 뽑아요', icon: 'fa-ticket', action: '내 제비 뽑기' },
            wheel: { title: '룰렛', desc: '각자 자기 룰렛을 돌려 결과를 열어요', icon: 'fa-circle-notch', action: '내 룰렛 돌리기' },
            dice: { title: '주사위 대결', desc: '각자 주사위를 굴리고 최고점이 이겨요', icon: 'fa-dice-six', action: '내 주사위 굴리기' }
        };
        const ROOM_ID = 'enjoy-main';
        const ACTIVE_MS = 75000;
        const DEFAULT_ROOM = {
            mode: 'ladder',
            participants: MEMBERS.slice(),
            penaltyCount: 1,
            round: null,
            presence: {},
            updatedAt: Date.now()
        };
        const firebaseConfig = {
            apiKey: "AIzaSyAVQ_WdMXKuU2CgTgvSHqLKuAVGPeeDuOQ",
            authDomain: "enjoy-meeting-account.firebaseapp.com",
            projectId: "enjoy-meeting-account",
            storageBucket: "enjoy-meeting-account.firebasestorage.app",
            messagingSenderId: "956113498506",
            appId: "1:956113498506:web:b520f2b77fdb3295cb9873"
        };

        const $ = (id) => document.getElementById(id);
        let app, auth, db, roomRef, roomUnsub, membersUnsub, beatTimer, tickTimer;
        let currentUser = null, profileName = '', room = Object.assign({}, DEFAULT_ROOM), memberDocs = {};

        window.haptic = function () {
            try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
        };

        function showToast(text) {
            const el = $('toast');
            el.textContent = text;
            el.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => el.classList.remove('show'), 1700);
        }

        function escapeHtml(v) {
            return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function getOrInitializeApp(config, name) {
            const found = getApps().find(item => item.name === name);
            return found || initializeApp(config, name);
        }

        function hashSeed(seed) {
            let h = 2166136261;
            const s = String(seed || Date.now());
            for (let i = 0; i < s.length; i++) {
                h ^= s.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        function rng(seed) {
            let a = hashSeed(seed) || 1;
            return function () {
                a |= 0;
                a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function shuffle(list, seed) {
            const out = list.slice();
            const rand = rng(seed);
            for (let i = out.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [out[i], out[j]] = [out[j], out[i]];
            }
            return out;
        }

        function clampPenalty(value, total) {
            const max = Math.max(1, Math.min(5, (total || MEMBERS.length) - 1));
            return Math.max(1, Math.min(max, Number(value) || 1));
        }

        function normalizeRoom(data) {
            const next = Object.assign({}, DEFAULT_ROOM, data || {});
            next.mode = MODES[next.mode] ? next.mode : 'ladder';
            next.participants = Array.isArray(next.participants) && next.participants.length
                ? next.participants.filter(name => MEMBERS.includes(name))
                : MEMBERS.slice();
            if (next.participants.length < 2) next.participants = MEMBERS.slice();
            next.penaltyCount = clampPenalty(next.penaltyCount, next.participants.length);
            next.presence = next.presence || {};
            return next;
        }

        function activePresence() {
            const now = Date.now();
            return Object.keys(room.presence || {})
                .map(uid => Object.assign({ uid }, room.presence[uid] || {}))
                .filter(v => now - (v.lastSeen || 0) < ACTIVE_MS && MEMBERS.includes(v.name));
        }

        function memberDocByName() {
            const by = {};
            Object.keys(memberDocs).forEach(uid => {
                const item = memberDocs[uid] || {};
                if (item.name) by[item.name] = item;
            });
            return by;
        }

        function avatar(name, size) {
            const doc = memberDocByName()[name] || {};
            const meta = MEMBER_META[name] || { color: '#6b7280', short: '?' };
            const dim = size ? 'width:' + size + 'px;height:' + size + 'px;' : '';
            if (doc.photoURL) return '<span class="avatar" style="' + dim + '"><img src="' + escapeHtml(doc.photoURL) + '" referrerpolicy="no-referrer" alt=""></span>';
            return '<span class="avatar" style="' + dim + 'background:' + meta.color + ';">' + meta.short + '</span>';
        }

        function hasActed(name) {
            return !!(room.round && room.round.actions && room.round.actions[name]);
        }

        function allActed(round) {
            if (!round) return false;
            const actions = round.actions || {};
            return (round.participants || []).every(name => !!actions[name]);
        }

        function resultOf(round, name) {
            return round && round.results ? round.results[name] : '';
        }

        function isWinner(round, name) {
            return !!(round && Array.isArray(round.winners) && round.winners.includes(name));
        }

        function buildWinners(seed, participants, count) {
            return shuffle(participants, seed + ':winners').slice(0, Math.max(1, Math.min(count, participants.length)));
        }

        function buildLadder(seed, participants, penaltyCount) {
            const n = participants.length;
            const levels = Math.max(7, n + 4);
            const rand = rng(seed + ':ladder');
            const rungs = [];
            for (let level = 0; level < levels; level++) {
                const occupied = {};
                const rungCount = n > 4 && rand() > .45 ? 2 : 1;
                for (let k = 0; k < rungCount; k++) {
                    const lane = Math.floor(rand() * Math.max(1, n - 1));
                    if (occupied[lane] || occupied[lane - 1] || occupied[lane + 1]) continue;
                    occupied[lane] = true;
                    rungs.push({ level, lane });
                }
            }
            const labels = [];
            for (let i = 0; i < n; i++) labels.push(i < penaltyCount ? '당첨' : '통과');
            const bottom = shuffle(labels, seed + ':labels');
            const results = {};
            participants.forEach((name, start) => {
                let lane = start;
                rungs.forEach(r => {
                    if (r.lane === lane) lane += 1;
                    else if (r.lane + 1 === lane) lane -= 1;
                });
                results[name] = bottom[lane];
            });
            return {
                ladder: { levels, rungs, labels: bottom },
                results,
                winners: participants.filter(name => results[name] === '당첨')
            };
        }

        function buildDice(seed, participants) {
            const rand = rng(seed + ':dice');
            const dice = participants.map(name => ({
                name,
                value: 1 + Math.floor(rand() * 6),
                tie: rand()
            }));
            const winner = dice.slice().sort((a, b) => (b.value - a.value) || (b.tie - a.tie))[0];
            const results = {};
            dice.forEach(item => { results[item.name] = item.value + '점'; });
            if (winner) results[winner.name] = winner.value + '점 1등';
            return { dice, results, winners: winner ? [winner.name] : [] };
        }

        function buildRound(mode, seed, participants, penaltyCount) {
            if (mode === 'ladder') return buildLadder(seed, participants, penaltyCount);
            if (mode === 'dice') return buildDice(seed, participants);
            const winners = buildWinners(seed, participants, penaltyCount);
            const results = {};
            participants.forEach(name => { results[name] = winners.includes(name) ? '당첨' : '통과'; });
            return { results, winners };
        }

        function renderPresence() {
            const active = activePresence();
            $('present-count').textContent = '입장 ' + active.length;
            $('present-avatars').innerHTML = active.slice(0, 4).map(v => avatar(v.name, 26)).join('');
        }

        function renderModeTabs() {
            $('mode-tabs').innerHTML = Object.keys(MODES).map(key => {
                const mode = MODES[key];
                return '<button class="mode-tab' + (room.mode === key ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.setMode(\'' + key + '\')">' +
                    '<i class="fa-solid ' + mode.icon + '"></i><span>' + mode.title + '</span></button>';
            }).join('');
        }

        function renderMemberControls() {
            const participants = room.participants || MEMBERS;
            $('member-count').textContent = participants.length + '명';
            $('penalty-count').textContent = clampPenalty(room.penaltyCount, participants.length) + '명';
            $('member-grid').innerHTML = MEMBERS.map(name => {
                const on = participants.includes(name);
                return '<button class="member-chip' + (on ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.toggleMember(\'' + name + '\')">' +
                    avatar(name) + '<span class="member-name">' + name + '</span></button>';
            }).join('');
        }

        function renderHeader() {
            const mode = MODES[room.mode] || MODES.ladder;
            $('mode-title').textContent = mode.title;
            $('mode-desc').textContent = mode.desc;
            const round = room.round;
            const pill = $('round-pill');
            if (!round) {
                pill.className = 'round-pill';
                pill.innerHTML = '<i class="fa-solid fa-circle"></i><span>대기</span>';
                return;
            }
            const done = allActed(round);
            pill.className = 'round-pill live';
            pill.innerHTML = '<i class="fa-solid ' + (done ? 'fa-check' : 'fa-circle') + '"></i><span>' + (done ? '완료' : '진행') + '</span>';
        }

        function renderActionButton() {
            const mode = MODES[(room.round && room.round.mode) || room.mode] || MODES.ladder;
            const btn = $('my-action');
            const label = btn.querySelector('span');
            const icon = btn.querySelector('i');
            icon.className = 'fa-solid ' + mode.icon;
            if (!room.round) {
                label.textContent = '새 판 먼저 만들기';
                btn.disabled = !profileName;
                return;
            }
            if (!profileName || !room.round.participants.includes(profileName)) {
                label.textContent = '참가 멤버가 아니에요';
                btn.disabled = true;
                return;
            }
            if (hasActed(profileName)) {
                label.textContent = '내 결과 확인 완료';
                btn.disabled = true;
                return;
            }
            label.textContent = mode.action;
            btn.disabled = false;
        }

        function renderGame() {
            const area = $('game-area');
            const round = room.round;
            if (!round) {
                const mode = MODES[room.mode] || MODES.ladder;
                area.innerHTML = '<div class="empty"><div><i class="fa-solid ' + mode.icon + '"></i><strong>새 판을 만들어주세요</strong><span>멤버가 들어오면 각자 자기 폰에서 참여해요</span></div></div>';
                renderResult(null);
                return;
            }
            if (round.mode === 'ladder') renderLadder(area, round);
            else if (round.mode === 'wheel') renderWheel(area, round);
            else if (round.mode === 'dice') renderDice(area, round);
            else renderSimpleCards(area, round, 'fa-ticket');
            renderResult(round);
        }

        function renderSimpleCards(area, round, fallbackIcon) {
            const actions = round.actions || {};
            area.innerHTML = '<div class="status-grid">' + round.participants.map(name => {
                const acted = !!actions[name];
                const win = acted && isWinner(round, name);
                const result = acted ? resultOf(round, name) : '아직 안 뽑음';
                const icon = acted ? (win ? 'fa-bolt' : 'fa-check') : fallbackIcon;
                return '<div class="play-card' + (acted ? ' done' : '') + (win ? ' win' : '') + '">' +
                    '<div class="play-symbol"><i class="fa-solid ' + icon + '"></i></div>' +
                    '<div class="play-name">' + name + '</div><div class="play-result">' + result + '</div></div>';
            }).join('') + '</div>';
        }

        function renderDice(area, round) {
            const actions = round.actions || {};
            const diceByName = {};
            (round.dice || []).forEach(item => { diceByName[item.name] = item; });
            area.innerHTML = '<div class="status-grid">' + round.participants.map(name => {
                const acted = !!actions[name];
                const win = acted && isWinner(round, name);
                const value = acted && diceByName[name] ? diceByName[name].value : '?';
                const result = acted ? resultOf(round, name) : '아직 안 굴림';
                return '<div class="play-card' + (acted ? ' done' : '') + (win ? ' win' : '') + '">' +
                    '<div class="play-symbol">' + value + '</div>' +
                    '<div class="play-name">' + name + '</div><div class="play-result">' + result + '</div></div>';
            }).join('') + '</div>';
        }

        function renderLadder(area, round) {
            const participants = round.participants || [];
            const n = participants.length;
            const ladder = round.ladder || { levels: 7, rungs: [], labels: [] };
            const width = 360, height = 236, top = 10, bottom = 222;
            const gap = n > 1 ? width / (n - 1) : width;
            const x = lane => n > 1 ? lane * gap : width / 2;
            const y = level => top + ((level + 1) / (ladder.levels + 1)) * (bottom - top);
            let svg = '';
            for (let i = 0; i < n; i++) svg += '<line class="ladder-line" x1="' + x(i) + '" y1="' + top + '" x2="' + x(i) + '" y2="' + bottom + '"></line>';
            (ladder.rungs || []).forEach(r => {
                svg += '<line class="ladder-rung" x1="' + x(r.lane) + '" y1="' + y(r.level) + '" x2="' + x(r.lane + 1) + '" y2="' + y(r.level) + '"></line>';
            });
            participants.forEach((name, idx) => {
                if (hasActed(name)) svg += '<path class="ladder-path" d="' + ladderPath(idx, ladder, x, y, top, bottom) + '" stroke="' + COLORS[idx % COLORS.length] + '"></path>';
            });
            const cols = 'grid-template-columns:repeat(' + n + ',minmax(0,1fr))';
            area.innerHTML = '<div class="ladder-wrap">' +
                '<div class="ladder-labels" style="' + cols + '">' + participants.map(name => '<div class="ladder-name' + (name === profileName ? ' mine' : '') + '">' + name + '</div>').join('') + '</div>' +
                '<svg class="ladder-svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">' + svg + '</svg>' +
                '<div class="ladder-labels" style="' + cols + '">' + participants.map(name => {
                    const acted = hasActed(name);
                    const win = acted && isWinner(round, name);
                    return '<div class="ladder-out' + (win ? ' win' : '') + '">' + (acted ? resultOf(round, name) : '?') + '</div>';
                }).join('') + '</div></div>';
        }

        function ladderPath(startLane, ladder, x, y, top, bottom) {
            let lane = startLane;
            let d = 'M ' + x(lane) + ' ' + top;
            (ladder.rungs || []).forEach(r => {
                const ry = y(r.level);
                if (r.lane === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane + 1) + ' ' + ry;
                    lane += 1;
                } else if (r.lane + 1 === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane - 1) + ' ' + ry;
                    lane -= 1;
                }
            });
            d += ' L ' + x(lane) + ' ' + bottom;
            return d;
        }

        function renderWheel(area, round) {
            const participants = round.participants || [];
            const n = Math.max(1, participants.length);
            const actions = round.actions || {};
            const recent = profileName && actions[profileName] && Date.now() - actions[profileName].at < 1400;
            const sectors = participants.map((name, i) => {
                const start = -90 + (360 / n) * i;
                const end = -90 + (360 / n) * (i + 1);
                return '<path d="' + sectorPath(100, 100, 92, start, end) + '" fill="' + COLORS[i % COLORS.length] + '" opacity="' + (hasActed(name) ? '.95' : '.52') + '"></path>';
            }).join('');
            area.innerHTML = '<div class="wheel-wrap"><div class="wheel-shell"><div class="wheel-pointer"></div>' +
                '<svg class="wheel-svg' + (recent ? ' spinning' : '') + '" viewBox="0 0 200 200" aria-hidden="true">' + sectors + '<circle cx="100" cy="100" r="28" fill="#ffffff"></circle></svg>' +
                '<div class="wheel-center">' + (profileName && hasActed(profileName) ? resultOf(round, profileName) : 'READY') + '</div></div>' +
                '<div class="wheel-note">' + actedText(round) + '</div></div>';
        }

        function sectorPath(cx, cy, r, startAngle, endAngle) {
            const start = polar(cx, cy, r, endAngle);
            const end = polar(cx, cy, r, startAngle);
            const large = endAngle - startAngle <= 180 ? 0 : 1;
            return ['M', cx, cy, 'L', start.x, start.y, 'A', r, r, 0, large, 0, end.x, end.y, 'Z'].join(' ');
        }

        function polar(cx, cy, r, angle) {
            const rad = angle * Math.PI / 180;
            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }

        function actedText(round) {
            const total = (round.participants || []).length;
            const count = Object.keys(round.actions || {}).length;
            return count + '/' + total + '명 참여';
        }

        function renderResult(round) {
            const card = $('result-card');
            if (!round) {
                card.classList.add('hidden');
                card.innerHTML = '';
                return;
            }
            const mineDone = profileName && hasActed(profileName);
            const allDone = allActed(round);
            if (!mineDone && !allDone) {
                card.classList.add('hidden');
                card.innerHTML = '';
                return;
            }
            const mine = mineDone ? resultOf(round, profileName) : '';
            const winners = (round.winners || []).filter(name => hasActed(name));
            const title = allDone ? ('완료: ' + ((round.winners || []).join(', ') || '결과 없음')) : ('내 결과: ' + mine);
            const sub = allDone ? '모든 멤버가 자기 차례를 끝냈어요' : (winners.length ? '현재 당첨: ' + winners.join(', ') : actedText(round));
            card.classList.remove('hidden');
            card.innerHTML = '<div class="result-icon"><i class="fa-solid fa-trophy"></i></div><div class="result-copy"><strong>' + title + '</strong><span>' + sub + '</span></div>';
        }

        function renderAll() {
            renderPresence();
            renderHeader();
            renderModeTabs();
            renderMemberControls();
            renderActionButton();
            renderGame();
            manageTicker();
        }

        function manageTicker() {
            const actions = room.round && room.round.actions ? Object.values(room.round.actions) : [];
            const need = actions.some(a => Date.now() - (a.at || 0) < 1600);
            if (need && !tickTimer) tickTimer = setInterval(renderAll, 240);
            if (!need && tickTimer) {
                clearInterval(tickTimer);
                tickTimer = null;
            }
        }

        async function writeRoom(patch) {
            if (!roomRef) return;
            try {
                await setDoc(roomRef, Object.assign({ updatedAt: Date.now() }, patch), { merge: true });
            } catch (e) {
                showToast('저장에 실패했어요');
                console.warn(e);
            }
        }

        async function heartbeat() {
            if (!roomRef || !currentUser || !profileName) return;
            const entry = {
                uid: currentUser.uid,
                name: profileName,
                email: currentUser.email || '',
                photoURL: currentUser.photoURL || '',
                lastSeen: Date.now()
            };
            try {
                await updateDoc(roomRef, {
                    ['presence.' + currentUser.uid]: entry,
                    updatedAt: Date.now()
                });
            } catch (e) {
                await writeRoom({ presence: { [currentUser.uid]: entry } });
            }
        }

        async function loadProfile(user) {
            profileName = '';
            if (!user) return;
            try {
                const snap = await getDoc(doc(db, 'members', user.uid));
                const data = snap.exists() ? (snap.data() || {}) : {};
                profileName = MEMBERS.includes(data.name) ? data.name : '';
            } catch (e) {
                profileName = '';
            }
        }

        function showGate(show) {
            $('gate').classList.toggle('show', !!show);
        }

        function subscribeMembers() {
            if (membersUnsub) membersUnsub();
            membersUnsub = onSnapshot(collection(db, 'members'), snap => {
                const next = {};
                snap.forEach(d => { next[d.id] = Object.assign({ uid: d.id }, d.data() || {}); });
                memberDocs = next;
                renderAll();
            });
        }

        async function subscribeRoom() {
            if (roomUnsub) roomUnsub();
            roomRef = doc(db, 'game_rooms', ROOM_ID);
            const first = await getDoc(roomRef);
            if (!first.exists()) await setDoc(roomRef, DEFAULT_ROOM, { merge: true });
            roomUnsub = onSnapshot(roomRef, snap => {
                room = normalizeRoom(snap.exists() ? snap.data() : {});
                renderAll();
            }, err => {
                showToast('실시간 연결을 확인해 주세요');
                console.warn(err);
            });
        }

        async function init() {
            app = getOrInitializeApp(firebaseConfig, 'meetingApp');
            auth = getAuth(app);
            db = getFirestore(app);
            try { await setPersistence(auth, browserLocalPersistence); } catch (e) {}
            onAuthStateChanged(auth, async user => {
                currentUser = user ? {
                    uid: user.uid,
                    email: user.email || '',
                    displayName: user.displayName || '',
                    photoURL: user.photoURL || ''
                } : null;
                if (!currentUser) {
                    showGate(true);
                    renderAll();
                    return;
                }
                await loadProfile(currentUser);
                if (!profileName) {
                    showGate(true);
                    renderAll();
                    return;
                }
                showGate(false);
                subscribeMembers();
                await subscribeRoom();
                await heartbeat();
                clearInterval(beatTimer);
                beatTimer = setInterval(heartbeat, 15000);
            });
            document.addEventListener('visibilitychange', () => { if (!document.hidden) heartbeat(); });
            window.addEventListener('focus', heartbeat);
        }

        window.EnjoyGame = {
            setMode: function (mode) {
                if (!MODES[mode]) return;
                room.mode = mode;
                room.round = null;
                renderAll();
                writeRoom({ mode, round: null });
            },
            toggleMember: function (name) {
                if (!MEMBERS.includes(name)) return;
                const current = (room.participants || MEMBERS).slice();
                let next = current.includes(name) ? current.filter(v => v !== name) : current.concat(name);
                if (next.length < 2) {
                    showToast('최소 2명은 필요해요');
                    next = current;
                }
                room.participants = next;
                room.penaltyCount = clampPenalty(room.penaltyCount, next.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: next, penaltyCount: room.penaltyCount, round: null });
            },
            selectAll: function () {
                room.participants = MEMBERS.slice();
                room.penaltyCount = clampPenalty(room.penaltyCount, room.participants.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: room.participants, penaltyCount: room.penaltyCount, round: null });
            },
            usePresentMembers: function () {
                const names = activePresence().map(v => v.name).filter((name, idx, arr) => MEMBERS.includes(name) && arr.indexOf(name) === idx);
                if (names.length < 2) {
                    showToast('입장 멤버가 2명 이상 필요해요');
                    return;
                }
                room.participants = names;
                room.penaltyCount = clampPenalty(room.penaltyCount, names.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: names, penaltyCount: room.penaltyCount, round: null });
            },
            adjustPenalty: function (delta) {
                const next = clampPenalty((room.penaltyCount || 1) + delta, (room.participants || MEMBERS).length);
                room.penaltyCount = next;
                room.round = null;
                renderAll();
                writeRoom({ penaltyCount: next, round: null });
            },
            startRound: async function () {
                if (!currentUser || !profileName) {
                    showGate(true);
                    return;
                }
                const participants = (room.participants || MEMBERS).filter(name => MEMBERS.includes(name));
                if (participants.length < 2) {
                    showToast('최소 2명이 필요해요');
                    return;
                }
                const mode = room.mode || 'ladder';
                const seed = Date.now() + ':' + currentUser.uid + ':' + Math.random().toString(36).slice(2);
                const penaltyCount = clampPenalty(room.penaltyCount, participants.length);
                const built = buildRound(mode, seed, participants, penaltyCount);
                const round = Object.assign({
                    id: 'rd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
                    mode,
                    seed,
                    participants,
                    penaltyCount,
                    actions: {},
                    startedAt: Date.now(),
                    startedBy: profileName,
                    startedByUid: currentUser.uid
                }, built);
                room.round = round;
                renderAll();
                await writeRoom({ mode, participants, penaltyCount, round });
            },
            playMine: async function () {
                if (!currentUser || !profileName) {
                    showGate(true);
                    return;
                }
                if (!room.round) {
                    await window.EnjoyGame.startRound();
                    return;
                }
                if (!room.round.participants.includes(profileName)) {
                    showToast('이번 판 참가자가 아니에요');
                    return;
                }
                if (hasActed(profileName)) {
                    showToast('이미 참여했어요');
                    return;
                }
                const action = {
                    uid: currentUser.uid,
                    name: profileName,
                    at: Date.now()
                };
                if (!room.round.actions) room.round.actions = {};
                room.round.actions[profileName] = action;
                renderAll();
                try {
                    await updateDoc(roomRef, {
                        ['round.actions.' + profileName]: action,
                        updatedAt: Date.now()
                    });
                } catch (e) {
                    showToast('참여 저장에 실패했어요');
                    console.warn(e);
                }
            }
        };

        renderAll();
        init();
    </script>
</body>
</html>
