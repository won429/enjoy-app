<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>엔조이 복불복</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: rgba(255,255,255,.07);
            --panel-strong: rgba(255,255,255,.12);
            --solid: #101114;
            --solid-2: #17181c;
            --line: rgba(255,255,255,.1);
            --line-strong: rgba(255,255,255,.2);
            --text: #f2f4f6;
            --sub: #8b95a1;
            --faint: rgba(255,255,255,.38);
            --button: #ffffff;
            --button-text: #111111;
            --danger: #f04452;
            --ok: #22c55e;
            --danger-soft: rgba(240,68,82,.18);
            --danger-border: rgba(240,68,82,.48);
            --ok-soft: rgba(34,197,94,.16);
            --ok-border: rgba(34,197,94,.46);
            --ladder-line: rgba(255,255,255,.26);
            --ladder-rung: rgba(255,255,255,.44);
            --safe-top: max(14px, env(safe-area-inset-top));
            --safe-bottom: max(18px, env(safe-area-inset-bottom));
        }
        @media (prefers-color-scheme: light) {
            :root {
                color-scheme: light;
                --bg: #f2f4f6;
                --panel: rgba(255,255,255,.86);
                --panel-strong: rgba(255,255,255,.96);
                --solid: #ffffff;
                --solid-2: #eef1f5;
                --line: rgba(0,0,0,.08);
                --line-strong: rgba(0,0,0,.16);
                --text: #141414;
                --sub: #6b7280;
                --faint: rgba(20,20,20,.42);
                --button: #141414;
                --button-text: #ffffff;
                --danger-soft: rgba(240,68,82,.14);
                --danger-border: rgba(240,68,82,.38);
                --ok-soft: rgba(34,197,94,.13);
                --ok-border: rgba(34,197,94,.36);
                --ladder-line: rgba(20,20,20,.22);
                --ladder-rung: rgba(20,20,20,.38);
            }
        }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            letter-spacing: 0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        body {
            height: 100dvh;
            overflow: hidden;
        }
        button {
            border: 0;
            padding: 0;
            background: none;
            color: inherit;
            font: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active { transform: scale(.96); }
        button:disabled {
            opacity: .46;
            transform: none;
        }
        .app {
            width: min(100%, 480px);
            height: 100dvh;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .topbar {
            padding: var(--safe-top) 18px 10px;
            flex: 0 0 auto;
        }
        .top-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .top-left {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }
        .title-block { min-width: 0; }
        .title-block h1 {
            margin: 0;
            font-size: 21px;
            line-height: 1.1;
            font-weight: 850;
        }
        .title-block p {
            margin: 4px 0 0;
            color: var(--sub);
            font-size: 11.5px;
            line-height: 1.2;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .present-btn {
            min-height: 38px;
            max-width: 130px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }
        .present-avatars {
            display: flex;
            align-items: center;
            min-width: 0;
        }
        .present-avatars .avatar {
            width: 26px;
            height: 26px;
            margin-left: -7px;
            border: 2px solid var(--bg);
        }
        .present-avatars .avatar:first-child { margin-left: 0; }
        .present-count {
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 850;
            white-space: nowrap;
        }
        .screen {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .content {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 4px 18px calc(var(--safe-bottom) + 18px);
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,.28);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            backdrop-filter: blur(12px) saturate(180%);
        }
        @media (prefers-color-scheme: light) {
            .card { box-shadow: 0 8px 24px rgba(15,23,42,.08); }
        }
        .stage {
            min-height: 468px;
            padding: 15px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .mode-copy { min-width: 0; }
        .mode-copy h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 900;
        }
        .mode-copy p {
            margin: 6px 0 0;
            color: var(--sub);
            font-size: 12px;
            line-height: 1.35;
            font-weight: 650;
        }
        .round-pill {
            min-height: 32px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-radius: 999px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 850;
        }
        .round-pill.live { color: var(--text); }
        .round-pill.live i { color: var(--ok); }
        .game-area {
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty {
            width: 100%;
            min-height: 324px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--sub);
        }
        .empty i {
            width: 70px;
            height: 70px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 28px;
        }
        .empty strong {
            display: block;
            color: var(--text);
            font-size: 18px;
            font-weight: 850;
        }
        .empty span {
            display: block;
            margin-top: 7px;
            font-size: 12px;
            font-weight: 650;
        }
        .result-card {
            min-height: 58px;
            margin-top: 12px;
            padding: 12px 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 18px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
        }
        .result-card.hidden { display: none; }
        .result-icon {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            background: var(--panel-strong);
            color: var(--text);
        }
        .result-copy { min-width: 0; }
        .result-copy strong {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 14px;
            font-weight: 900;
        }
        .result-copy span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 11.5px;
            font-weight: 650;
        }
        .stage-actions {
            display: flex;
            gap: 9px;
            margin-top: 12px;
        }
        .primary-action {
            min-height: 52px;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-radius: 18px;
            background: var(--button);
            color: var(--button-text);
            font-size: 15px;
            font-weight: 900;
        }
        .secondary-action {
            width: 52px;
            height: 52px;
            flex: 0 0 auto;
            border-radius: 18px;
            background: rgba(128,128,128,.12);
            border: 1px solid var(--line);
            color: var(--text);
        }
        .mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin: 13px 0;
        }
        .mode-tab {
            min-height: 68px;
            padding: 8px 4px;
            border-radius: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--sub);
            text-align: center;
        }
        .mode-tab.active {
            background: var(--panel-strong);
            color: var(--text);
            border-color: var(--line-strong);
        }
        .mode-tab i {
            display: block;
            margin: 0 auto 7px;
            font-size: 18px;
        }
        .mode-tab span {
            display: block;
            font-size: 10.5px;
            line-height: 1.15;
            font-weight: 850;
        }
        .control {
            padding: 14px;
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-head strong {
            font-size: 14px;
            font-weight: 850;
        }
        .section-head span {
            color: var(--sub);
            font-size: 11px;
            font-weight: 750;
        }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .member-chip {
            min-height: 47px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 16px;
            background: rgba(128,128,128,.08);
            border: 1px solid var(--line);
            color: var(--sub);
            text-align: left;
        }
        .member-chip.active {
            background: var(--panel-strong);
            color: var(--text);
            border-color: var(--line-strong);
        }
        .avatar {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
            font-weight: 900;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 850;
        }
        .mini-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .mini-btn {
            min-height: 38px;
            flex: 1;
            border-radius: 14px;
            background: rgba(128,128,128,.12);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 12px;
            font-weight: 850;
        }
        .count-row {
            margin-top: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .count-label {
            width: 86px;
            flex: 0 0 auto;
        }
        .count-label strong {
            display: block;
            font-size: 13px;
            font-weight: 850;
        }
        .count-label span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 650;
        }
        .stepper {
            min-height: 46px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px;
            border-radius: 16px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
        }
        .stepper button {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
        }
        .stepper strong {
            font-size: 14px;
            font-weight: 900;
        }
        .new-round {
            width: 100%;
            min-height: 52px;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-radius: 18px;
            background: var(--button);
            color: var(--button-text);
            font-size: 15px;
            font-weight: 900;
        }
        .ladder-wrap { width: 100%; }
        .ladder-top, .ladder-bottom {
            display: grid;
            gap: 5px;
        }
        .ladder-slot, .ladder-result {
            min-width: 0;
            min-height: 34px;
            padding: 6px 3px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-align: center;
            font-size: 10.5px;
            font-weight: 850;
        }
        .ladder-slot.open {
            color: var(--text);
            background: var(--panel-strong);
        }
        .ladder-slot.mine {
            outline: 2px solid var(--text);
            outline-offset: -2px;
        }
        .ladder-result.win {
            color: #fff;
            background: var(--danger);
            border-color: var(--danger);
        }
        @media (prefers-color-scheme: light) {
            .ladder-result.win { color: #fff; }
        }
        .ladder-svg {
            width: 100%;
            height: 248px;
            display: block;
            margin: 8px 0;
            overflow: visible;
        }
        .ladder-line {
            stroke: var(--ladder-line);
            stroke-width: 3;
            stroke-linecap: round;
        }
        .ladder-rung {
            stroke: var(--ladder-rung);
            stroke-width: 5;
            stroke-linecap: round;
        }
        .ladder-path {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .ladder-path.recent {
            stroke-dasharray: 920;
            stroke-dashoffset: 920;
            animation: path-in 1.3s cubic-bezier(.16,1,.3,1) forwards;
        }
        @keyframes path-in { to { stroke-dashoffset: 0; } }
        .lots-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .paper-card {
            min-height: 126px;
            padding: 11px 7px;
            border-radius: 20px;
            background: rgba(128,128,128,.09);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }
        .paper-card.open { background: var(--panel-strong); }
        .paper-card.win {
            background: var(--danger-soft);
            border-color: var(--danger-border);
        }
        .paper {
            width: 42px;
            height: 52px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--button);
            color: var(--button-text);
            font-size: 18px;
            font-weight: 950;
            box-shadow: 0 8px 18px rgba(0,0,0,.2);
        }
        .paper-card:not(.open) .paper {
            transform: rotate(-4deg);
        }
        .paper-card.recent .paper {
            animation: pick-paper .72s cubic-bezier(.2,1.4,.3,1);
        }
        @keyframes pick-paper {
            0% { transform: translateY(0) rotate(-4deg); }
            45% { transform: translateY(-18px) rotate(8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .game-name {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 850;
        }
        .game-result {
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
        }
        .paper-card.win .game-result { color: var(--danger); }
        .wheel-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .wheel-shell {
            width: min(286px, 76vw);
            aspect-ratio: 1;
            position: relative;
            display: grid;
            place-items: center;
        }
        .wheel-pointer {
            position: absolute;
            top: -4px;
            left: 50%;
            width: 22px;
            height: 22px;
            z-index: 3;
            transform: translateX(-50%) rotate(45deg);
            border-radius: 4px;
            background: var(--button);
        }
        .wheel-disc {
            width: 100%;
            height: 100%;
            border-radius: 999px;
            border: 8px solid var(--button);
            background: var(--solid);
            box-shadow: 0 12px 34px rgba(0,0,0,.28);
        }
        .wheel-text {
            fill: #fff;
            font-size: 8px;
            font-weight: 900;
            text-anchor: middle;
            dominant-baseline: middle;
            paint-order: stroke;
            stroke: rgba(0,0,0,.45);
            stroke-width: 2px;
        }
        .wheel-center {
            position: absolute;
            width: 66px;
            height: 66px;
            border-radius: 999px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--button);
            color: var(--button-text);
            font-size: 12px;
            font-weight: 950;
        }
        .wheel-note {
            min-height: 38px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            font-size: 12px;
            font-weight: 850;
        }
        .dice-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .dice-card {
            min-height: 126px;
            padding: 11px 7px;
            border-radius: 20px;
            background: rgba(128,128,128,.09);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }
        .dice-card.open { background: var(--panel-strong); }
        .dice-card.win {
            border-color: var(--ok-border);
            background: var(--ok-soft);
        }
        .die {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            padding: 8px;
            background: var(--button);
            color: var(--button-text);
            box-shadow: 0 8px 18px rgba(0,0,0,.22);
        }
        .die.rolling {
            animation: dice-roll .16s linear infinite;
        }
        @keyframes dice-roll {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(16deg); }
            100% { transform: translateY(0) rotate(-8deg); }
        }
        .pip {
            width: 7px;
            height: 7px;
            align-self: center;
            justify-self: center;
            border-radius: 999px;
            background: currentColor;
            opacity: 0;
        }
        .pip.on { opacity: 1; }
        .sheet {
            position: absolute;
            inset: 0;
            z-index: 40;
            display: none;
            align-items: flex-end;
            background: rgba(0,0,0,.54);
        }
        @media (prefers-color-scheme: light) {
            .sheet { background: rgba(0,0,0,.24); }
        }
        .sheet.show { display: flex; }
        .sheet-panel {
            width: 100%;
            max-height: 72dvh;
            padding: 12px 18px calc(var(--safe-bottom) + 12px);
            border-radius: 26px 26px 0 0;
            background: var(--solid);
            border: 1px solid var(--line);
            box-shadow: 0 -18px 54px rgba(0,0,0,.34);
        }
        .sheet-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .sheet-head strong {
            font-size: 17px;
            font-weight: 900;
        }
        .sheet-list {
            display: grid;
            gap: 8px;
        }
        .sheet-person {
            min-height: 52px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-radius: 18px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
        }
        .sheet-person .avatar {
            width: 36px;
            height: 36px;
            font-size: 14px;
        }
        .sheet-person strong {
            display: block;
            font-size: 14px;
            font-weight: 850;
        }
        .sheet-person span {
            display: block;
            margin-top: 2px;
            color: var(--sub);
            font-size: 11px;
            font-weight: 700;
        }
        .gate {

        @media (max-width: 380px) {

            .present-count { display: none; }
        }

</head>
<body>
    <div class="app">
        <div class="screen">
            <header class="topbar">
                <div class="top-line">
                    <div class="top-left">
                        <button class="icon-btn" aria-label="메인으로" onclick="window.haptic(); location.href='index.html'">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div class="title-block">
                            <h1>복불복 게임</h1>
                            <p>각자 직접 고르고 결과를 여는 실시간 게임</p>
                        </div>
                    </div>
                    <button class="present-btn" aria-label="입장 멤버 보기" onclick="window.haptic(); window.EnjoyGame.openPresenceSheet()">
                        <div id="present-avatars" class="present-avatars"></div>
                        <span id="present-count" class="present-count">입장 0</span>
                    </button>
                </div>
            </header>

            <main class="content">
                <section class="stage card">
                    <div class="stage-head">
                        <div class="mode-copy">
                            <h2 id="mode-title">사다리타기</h2>
                            <p id="mode-desc">자리를 직접 고르면 사다리가 내려갑니다</p>
                        </div>
                        <div id="round-pill" class="round-pill">
                            <i class="fa-solid fa-circle"></i><span>대기</span>
                        </div>
                    </div>
                    <div id="game-area" class="game-area"></div>
                    <div id="result-card" class="result-card hidden"></div>
                    <div class="stage-actions">
                        <button id="main-action" class="primary-action" onclick="window.haptic(); window.EnjoyGame.mainAction()">
                            <i class="fa-solid fa-rotate"></i><span>새 판 만들기</span>
                        </button>
                        <button class="secondary-action" aria-label="새 판" onclick="window.haptic(); window.EnjoyGame.startRound()">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </section>

                <nav id="mode-tabs" class="mode-tabs" aria-label="게임 선택"></nav>

                <section class="control card">
                    <div class="section-head">
                        <strong>참가 멤버</strong>
                        <span id="member-count">6명</span>
                    </div>
                    <div id="member-grid" class="member-grid"></div>
                    <div class="mini-row">
                        <button class="mini-btn" onclick="window.haptic(); window.EnjoyGame.usePresentMembers()">입장 멤버로 맞춤</button>
                        <button class="mini-btn" onclick="window.haptic(); window.EnjoyGame.selectAll()">전체 선택</button>
                    </div>
                    <div class="count-row">
                        <div class="count-label">
                            <strong>당첨 수</strong>
                            <span>룰렛·주사위 제외</span>
                        </div>
                        <div class="stepper">
                            <button aria-label="줄이기" onclick="window.haptic(); window.EnjoyGame.adjustPenalty(-1)"><i class="fa-solid fa-minus"></i></button>
                            <strong id="penalty-count">1명</strong>
                            <button aria-label="늘리기" onclick="window.haptic(); window.EnjoyGame.adjustPenalty(1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                    <button class="new-round" onclick="window.haptic(); window.EnjoyGame.startRound()">
                        <i class="fa-solid fa-rotate"></i><span>새 판 만들기</span>
                    </button>
                </section>
            </main>
        </div>

        <div id="presence-sheet" class="sheet" onclick="window.EnjoyGame.closePresenceSheet()">
            <div class="sheet-panel" onclick="event.stopPropagation()">
                <div class="sheet-head">
                    <strong>입장한 멤버</strong>
                    <button class="icon-btn" aria-label="닫기" onclick="window.haptic(); window.EnjoyGame.closePresenceSheet()">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div id="presence-list" class="sheet-list"></div>
            </div>
        </div>

        <div id="gate" class="gate">
            <div class="gate-card">
                <div class="gate-icon"><i class="fa-solid fa-lock"></i></div>
                <h2>메인에서 로그인 후 이용해주세요</h2>
                <p>엔조이 멤버 프로필이 연결된 계정으로 들어오면 게임에 바로 입장돼요.</p>
                <button class="gate-btn" onclick="window.haptic(); location.href='index.html'">메인으로 이동</button>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, getDoc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const MEMBERS = ['전시기', '성원제', '오스틴', '이진누', '류짱', '홍박사'];
        const MEMBER_META = {
            '전시기': { color: '#f04452', short: '전' },
            '성원제': { color: '#3182f6', short: '성' },
            '오스틴': { color: '#f59e0b', short: '오' },
            '이진누': { color: '#22c55e', short: '이' },
            '류짱': { color: '#a855f7', short: '류' },
            '홍박사': { color: '#06b6d4', short: '홍' }
        };
        const COLORS = ['#3182f6', '#f04452', '#f59e0b', '#22c55e', '#a855f7', '#06b6d4'];
        const MODES = {
            ladder: { title: '사다리타기', desc: '자리를 직접 고르면 사다리가 내려갑니다', icon: 'fa-bars-staggered' },
            lots: { title: '제비뽑기', desc: '접힌 제비 중 하나를 직접 뽑습니다', icon: 'fa-ticket' },
            wheel: { title: '룰렛', desc: '멤버 칸이 적힌 룰렛을 돌립니다', icon: 'fa-circle-notch' },
            dice: { title: '주사위 대결', desc: '각자 주사위를 던져 높은 사람이 이깁니다', icon: 'fa-dice-six' }
        };
        const ROOM_ID = 'enjoy-main';
        const ACTIVE_MS = 75000;
        const WHEEL_DURATION = 4200;
        const DICE_DURATION = 1200;
        const DEFAULT_ROOM = {
            mode: 'ladder',
            participants: MEMBERS.slice(),
            penaltyCount: 1,
            round: null,
            presence: {},
            updatedAt: Date.now()
        };
        const firebaseConfig = {
            apiKey: "AIzaSyAVQ_WdMXKuU2CgTgvSHqLKuAVGPeeDuOQ",
            authDomain: "enjoy-meeting-account.firebaseapp.com",
            projectId: "enjoy-meeting-account",
            storageBucket: "enjoy-meeting-account.firebasestorage.app",
            messagingSenderId: "956113498506",
            appId: "1:956113498506:web:b520f2b77fdb3295cb9873"
        };

        const $ = (id) => document.getElementById(id);
        let app, auth, db, roomRef, roomUnsub, membersUnsub, beatTimer, tickTimer;
        let currentUser = null, profileName = '', room = Object.assign({}, DEFAULT_ROOM), memberDocs = {};

        window.haptic = function () {
            try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
        };

        function showToast(text) {
            const el = $('toast');
            el.textContent = text;
            el.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => el.classList.remove('show'), 1700);
        }

        function getOrInitializeApp(config, name) {
            const found = getApps().find(item => item.name === name);
            return found || initializeApp(config, name);
        }

        function escapeHtml(v) {
            return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function hashSeed(seed) {
            let h = 2166136261;
            const s = String(seed || Date.now());
            for (let i = 0; i < s.length; i++) {
                h ^= s.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        function rng(seed) {
            let a = hashSeed(seed) || 1;
            return function () {
                a |= 0;
                a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function shuffle(list, seed) {
            const out = list.slice();
            const rand = rng(seed);
            for (let i = out.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [out[i], out[j]] = [out[j], out[i]];
            }
            return out;
        }

        function clampPenalty(value, total) {
            const max = Math.max(1, Math.min(5, (total || MEMBERS.length) - 1));
            return Math.max(1, Math.min(max, Number(value) || 1));
        }

        function normalizeRoom(data) {
            const next = Object.assign({}, DEFAULT_ROOM, data || {});
            next.mode = MODES[next.mode] ? next.mode : 'ladder';
            next.participants = Array.isArray(next.participants) && next.participants.length
                ? next.participants.filter(name => MEMBERS.includes(name))
                : MEMBERS.slice();
            if (next.participants.length < 2) next.participants = MEMBERS.slice();
            next.penaltyCount = clampPenalty(next.penaltyCount, next.participants.length);
            next.presence = next.presence || {};
            return next;
        }

        function activePresence() {
            const now = Date.now();
            return Object.keys(room.presence || {})
                .map(uid => Object.assign({ uid }, room.presence[uid] || {}))
                .filter(v => now - (v.lastSeen || 0) < ACTIVE_MS && MEMBERS.includes(v.name))
                .sort((a, b) => MEMBERS.indexOf(a.name) - MEMBERS.indexOf(b.name));
        }

        function memberDocByName() {
            const by = {};
            Object.keys(memberDocs).forEach(uid => {
                const item = memberDocs[uid] || {};
                if (item.name) by[item.name] = item;
            });
            return by;
        }

        function avatar(name, size) {
            const doc = memberDocByName()[name] || {};
            const meta = MEMBER_META[name] || { color: '#6b7280', short: '?' };
            const dim = size ? 'width:' + size + 'px;height:' + size + 'px;' : '';
            if (doc.photoURL) return '<span class="avatar" style="' + dim + '"><img src="' + escapeHtml(doc.photoURL) + '" referrerpolicy="no-referrer" alt=""></span>';
            return '<span class="avatar" style="' + dim + 'background:' + meta.color + ';">' + meta.short + '</span>';
        }

        function actions() {
            return (room.round && room.round.actions) || {};
        }

        function actionOf(name) {
            return actions()[name] || null;
        }

        function allActed(round) {
            if (!round) return false;
            const a = round.actions || {};
            return (round.participants || []).every(name => !!a[name]);
        }

        function currentMode() {
            return (room.round && room.round.mode) || room.mode || 'ladder';
        }

        function canPlay() {
            return !!(currentUser && profileName && room.round && room.round.participants.includes(profileName) && !actionOf(profileName));
        }

        function buildPrizeLabels(seed, total, count) {
            const labels = [];
            for (let i = 0; i < total; i++) labels.push(i < count ? '당첨' : '통과');
            return shuffle(labels, seed + ':prizes');
        }

        function buildLadder(seed, participants, penaltyCount) {
            const n = participants.length;
            const levels = Math.max(8, n + 5);
            const rand = rng(seed + ':ladder');
            const rungs = [];
            for (let level = 0; level < levels; level++) {
                const occupied = {};
                const tries = n > 4 && rand() > .45 ? 2 : 1;
                for (let k = 0; k < tries; k++) {
                    const lane = Math.floor(rand() * Math.max(1, n - 1));
                    if (occupied[lane] || occupied[lane - 1] || occupied[lane + 1]) continue;
                    occupied[lane] = true;
                    rungs.push({ level, lane });
                }
            }
            return { ladder: { levels, rungs, labels: buildPrizeLabels(seed, n, penaltyCount) } };
        }

        function buildLots(seed, participants, penaltyCount) {
            return { lotLabels: buildPrizeLabels(seed, participants.length, penaltyCount) };
        }

        function buildWheel(seed, participants) {
            const rand = rng(seed + ':wheel');
            const winnerIndex = Math.floor(rand() * participants.length);
            return {
                wheel: {
                    winnerIndex,
                    winner: participants[winnerIndex],
                    turns: 6 + Math.floor(rand() * 2),
                    offset: rand() * 20 - 10
                }
            };
        }

        function traceLadder(slot, ladder) {
            let lane = slot;
            (ladder.rungs || []).forEach(r => {
                if (r.lane === lane) lane += 1;
                else if (r.lane + 1 === lane) lane -= 1;
            });
            return lane;
        }

        function diceWinner(round) {
            const entries = Object.keys(round.actions || {}).map(name => Object.assign({ name }, round.actions[name]));
            if (entries.length !== (round.participants || []).length) return '';
            entries.sort((a, b) => (b.value - a.value) || ((b.tie || 0) - (a.tie || 0)));
            return entries[0] ? entries[0].name : '';
        }

        function roundWinnerNames(round) {
            if (!round) return [];
            if (round.mode === 'wheel') return isWheelDone(round) ? [round.wheel.winner] : [];
            if (round.mode === 'dice') {
                const win = diceWinner(round);
                return win ? [win] : [];
            }
            return Object.keys(round.actions || {}).filter(name => round.actions[name].result === '당첨');
        }

        function makeRound(mode, participants, penaltyCount, seed) {
            const base = {
                id: 'rd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
                mode,
                seed,
                participants,
                penaltyCount,
                actions: {},
                startedAt: Date.now(),
                startedBy: profileName,
                startedByUid: currentUser.uid
            };
            if (mode === 'ladder') return Object.assign(base, buildLadder(seed, participants, penaltyCount));
            if (mode === 'lots') return Object.assign(base, buildLots(seed, participants, penaltyCount));
            if (mode === 'wheel') return Object.assign(base, buildWheel(seed, participants));
            return base;
        }

        function renderPresence() {
            const active = activePresence();
            $('present-count').textContent = '입장 ' + active.length;
            $('present-avatars').innerHTML = active.slice(0, 4).map(v => avatar(v.name, 26)).join('');
            $('presence-list').innerHTML = active.length ? active.map(v => {
                const ago = Math.max(0, Math.floor((Date.now() - (v.lastSeen || 0)) / 1000));
                return '<div class="sheet-person">' + avatar(v.name, 36) + '<div><strong>' + v.name + '</strong><span>' + (ago < 10 ? '방금 입장' : ago + '초 전 활동') + '</span></div></div>';
            }).join('') : '<div class="sheet-person"><div class="avatar" style="background:#6b7280;">?</div><div><strong>아직 없음</strong><span>멤버가 들어오면 여기에 표시돼요</span></div></div>';
        }

        function renderHeader() {
            const mode = MODES[currentMode()] || MODES.ladder;
            $('mode-title').textContent = mode.title;
            $('mode-desc').textContent = mode.desc;
            const pill = $('round-pill');
            if (!room.round) {
                pill.className = 'round-pill';
                pill.innerHTML = '<i class="fa-solid fa-circle"></i><span>대기</span>';
                return;
            }
            const done = room.round.mode === 'wheel' ? isWheelDone(room.round) : allActed(room.round);
            pill.className = 'round-pill live';
            pill.innerHTML = '<i class="fa-solid ' + (done ? 'fa-check' : 'fa-circle') + '"></i><span>' + (done ? '완료' : '진행') + '</span>';
        }

        function renderModeTabs() {
            $('mode-tabs').innerHTML = Object.keys(MODES).map(key => {
                const mode = MODES[key];
                return '<button class="mode-tab' + (room.mode === key ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.setMode(\'' + key + '\')">' +
                    '<i class="fa-solid ' + mode.icon + '"></i><span>' + mode.title + '</span></button>';
            }).join('');
        }

        function renderMemberControls() {
            const participants = room.participants || MEMBERS;
            $('member-count').textContent = participants.length + '명';
            $('penalty-count').textContent = clampPenalty(room.penaltyCount, participants.length) + '명';
            $('member-grid').innerHTML = MEMBERS.map(name => {
                const on = participants.includes(name);
                return '<button class="member-chip' + (on ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.toggleMember(\'' + name + '\')">' +
                    avatar(name) + '<span class="member-name">' + name + '</span></button>';
            }).join('');
        }

        function renderMainAction() {
            const btn = $('main-action');
            const icon = btn.querySelector('i');
            const label = btn.querySelector('span');
            if (!room.round) {
                icon.className = 'fa-solid fa-rotate';
                label.textContent = '새 판 만들기';
                btn.disabled = !profileName;
                return;
            }
            if (room.round.mode === 'wheel') {
                icon.className = 'fa-solid fa-circle-notch';
                if (isWheelSpinning(room.round)) {
                    label.textContent = '룰렛 도는 중';
                    btn.disabled = true;
                } else if (isWheelDone(room.round)) {
                    label.textContent = '새 판 만들기';
                    btn.disabled = false;
                } else {
                    label.textContent = '룰렛 돌리기';
                    btn.disabled = false;
                }
                return;
            }
            if (!room.round.participants.includes(profileName)) {
                icon.className = 'fa-solid fa-ban';
                label.textContent = '참가 멤버가 아니에요';
                btn.disabled = true;
                return;
            }
            if (actionOf(profileName)) {
                icon.className = 'fa-solid fa-check';
                label.textContent = '내 결과 확인 완료';
                btn.disabled = true;
                return;
            }
            icon.className = 'fa-solid fa-hand-pointer';
            label.textContent = selectHint(room.round.mode);
            btn.disabled = true;
        }

        function selectHint(mode) {
            if (mode === 'ladder') return '위 자리 하나를 선택';
            if (mode === 'lots') return '제비 하나를 선택';
            if (mode === 'dice') return '내 카드 눌러 굴리기';
            return '선택';
        }

        function renderGame() {
            const area = $('game-area');
            if (!room.round) {
                const mode = MODES[room.mode] || MODES.ladder;
                area.innerHTML = '<div class="empty"><div><i class="fa-solid ' + mode.icon + '"></i><strong>새 판을 만들어주세요</strong><span>게임을 고른 뒤 멤버가 직접 참여해요</span></div></div>';
                renderResult(null);
                return;
            }
            if (room.round.mode === 'ladder') renderLadder(area, room.round);
            else if (room.round.mode === 'lots') renderLots(area, room.round);
            else if (room.round.mode === 'wheel') renderWheel(area, room.round);
            else renderDice(area, room.round);
            renderResult(room.round);
        }

        function renderLadder(area, round) {
            const participants = round.participants || [];
            const n = participants.length;
            const ladder = round.ladder || { levels: 8, rungs: [], labels: [] };
            const a = round.actions || {};
            const occupied = {};
            Object.keys(a).forEach(name => { if (typeof a[name].slot === 'number') occupied[a[name].slot] = name; });
            const width = 360, height = 248, top = 10, bottom = 234;
            const gap = n > 1 ? width / (n - 1) : width;
            const x = lane => n > 1 ? lane * gap : width / 2;
            const y = level => top + ((level + 1) / (ladder.levels + 1)) * (bottom - top);
            let svg = '';
            for (let i = 0; i < n; i++) svg += '<line class="ladder-line" x1="' + x(i) + '" y1="' + top + '" x2="' + x(i) + '" y2="' + bottom + '"></line>';
            (ladder.rungs || []).forEach(r => {
                svg += '<line class="ladder-rung" x1="' + x(r.lane) + '" y1="' + y(r.level) + '" x2="' + x(r.lane + 1) + '" y2="' + y(r.level) + '"></line>';
            });
            Object.keys(a).forEach(name => {
                const act = a[name];
                if (typeof act.slot !== 'number') return;
                const idx = participants.indexOf(name);
                const recent = Date.now() - (act.at || 0) < 1600;
                svg += '<path class="ladder-path' + (recent ? ' recent' : '') + '" d="' + ladderPath(act.slot, ladder, x, y, top, bottom) + '" stroke="' + COLORS[(idx < 0 ? act.slot : idx) % COLORS.length] + '"></path>';
            });
            const cols = 'grid-template-columns:repeat(' + n + ',minmax(0,1fr))';
            area.innerHTML = '<div class="ladder-wrap">' +
                '<div class="ladder-top" style="' + cols + '">' + Array.from({ length: n }).map((_, i) => {
                    const chosenBy = occupied[i];
                    const mine = chosenBy === profileName;
                    const disabled = !!chosenBy || !canPlay();
                    return '<button class="ladder-slot ' + (chosenBy ? '' : 'open') + (mine ? ' mine' : '') + '" ' + (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.chooseLadder(' + i + ')">' + (chosenBy || (i + 1 + '번')) + '</button>';
                }).join('') + '</div>' +
                '<svg class="ladder-svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">' + svg + '</svg>' +
                '<div class="ladder-bottom" style="' + cols + '">' + Array.from({ length: n }).map((_, lane) => {
                    const actionName = Object.keys(a).find(name => a[name].finalLane === lane);
                    const result = actionName ? a[actionName].result : '?';
                    return '<div class="ladder-result' + (result === '당첨' ? ' win' : '') + '">' + result + '</div>';
                }).join('') + '</div></div>';
        }

        function ladderPath(startLane, ladder, x, y, top, bottom) {
            let lane = startLane;
            let d = 'M ' + x(lane) + ' ' + top;
            (ladder.rungs || []).forEach(r => {
                const ry = y(r.level);
                if (r.lane === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane + 1) + ' ' + ry;
                    lane += 1;
                } else if (r.lane + 1 === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane - 1) + ' ' + ry;
                    lane -= 1;
                }
            });
            d += ' L ' + x(lane) + ' ' + bottom;
            return d;
        }

        function renderLots(area, round) {
            const participants = round.participants || [];
            const n = participants.length;
            const a = round.actions || {};
            const occupied = {};
            Object.keys(a).forEach(name => { if (typeof a[name].item === 'number') occupied[a[name].item] = name; });
            area.innerHTML = '<div class="lots-grid">' + Array.from({ length: n }).map((_, i) => {
                const chosenBy = occupied[i];
                const act = chosenBy ? a[chosenBy] : null;
                const result = act ? act.result : '제비 ' + (i + 1);
                const win = act && act.result === '당첨';
                const disabled = !!chosenBy || !canPlay();
                const recent = act && Date.now() - (act.at || 0) < 1000;
                return '<button class="paper-card' + (act ? ' open' : '') + (win ? ' win' : '') + (recent ? ' recent' : '') + '" ' + (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.chooseLot(' + i + ')">' +
                    '<div class="paper"><i class="fa-solid ' + (act ? (win ? 'fa-bolt' : 'fa-check') : 'fa-question') + '"></i></div>' +
                    '<div class="game-name">' + (chosenBy || '선택 가능') + '</div><div class="game-result">' + result + '</div></button>';
            }).join('') + '</div>';
        }

        function isWheelSpinning(round) {
            return !!(round && round.spin && Date.now() < (round.spin.endAt || 0));
        }

        function isWheelDone(round) {
            return !!(round && round.spin && Date.now() >= (round.spin.endAt || 0));
        }

        function renderWheel(area, round) {
            const participants = round.participants || [];
            const n = Math.max(1, participants.length);
            const spin = round.spin || null;
            const seg = 360 / n;
            let rotation = 0;
            if (spin) {
                const elapsed = Math.max(0, Date.now() - (spin.startedAt || 0));
                const duration = Math.max(1, (spin.endAt || 0) - (spin.startedAt || 0));
                const t = Math.min(1, elapsed / duration);
                const eased = 1 - Math.pow(1 - t, 3);
                rotation = (spin.totalRotation || 0) * eased;
            }
            const pieces = participants.map((name, i) => {
                const start = -90 + seg * i;
                const end = -90 + seg * (i + 1);
                const mid = (start + end) / 2;
                const textPos = polar(100, 100, 58, mid);
                return '<path d="' + sectorPath(100, 100, 93, start, end) + '" fill="' + COLORS[i % COLORS.length] + '"></path>' +
                    '<text class="wheel-text" x="' + textPos.x + '" y="' + textPos.y + '" transform="rotate(' + (mid + 90) + ' ' + textPos.x + ' ' + textPos.y + ')">' + name + '</text>';
            }).join('');
            const winnerText = isWheelDone(round) ? round.wheel.winner + ' 당첨' : (isWheelSpinning(round) ? '도는 중' : 'READY');
            area.innerHTML = '<div class="wheel-wrap"><div class="wheel-shell"><div class="wheel-pointer"></div>' +
                '<svg class="wheel-disc" viewBox="0 0 200 200" style="transform:rotate(' + rotation + 'deg)">' + pieces + '<circle cx="100" cy="100" r="26" fill="var(--button)"></circle></svg>' +
                '<div class="wheel-center">' + (isWheelDone(round) ? 'STOP' : 'SPIN') + '</div></div><div class="wheel-note">' + winnerText + '</div></div>';
        }

        function sectorPath(cx, cy, r, startAngle, endAngle) {
            const start = polar(cx, cy, r, endAngle);
            const end = polar(cx, cy, r, startAngle);
            const large = endAngle - startAngle <= 180 ? 0 : 1;
            return ['M', cx, cy, 'L', start.x, start.y, 'A', r, r, 0, large, 0, end.x, end.y, 'Z'].join(' ');
        }

        function polar(cx, cy, r, angle) {
            const rad = angle * Math.PI / 180;
            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }

        function renderDice(area, round) {
            const participants = round.participants || [];
            const a = round.actions || {};
            const winner = diceWinner(round);
            area.innerHTML = '<div class="dice-grid">' + participants.map(name => {
                const act = a[name];
                const rolling = act && Date.now() < (act.revealAt || 0);
                const visibleValue = rolling ? (1 + Math.floor(rng(name + Date.now())() * 6)) : (act ? act.value : 1);
                const disabled = !!act || !canPlay() || name !== profileName;
                const open = !!act && !rolling;
                const win = open && winner === name;
                return '<button class="dice-card' + (open ? ' open' : '') + (win ? ' win' : '') + '" ' + (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.rollDice()">' +
                    renderDie(visibleValue, rolling) + '<div class="game-name">' + name + '</div><div class="game-result">' + (rolling ? '굴리는 중' : (act ? act.value + '점' : (name === profileName ? '눌러서 굴리기' : '대기'))) + '</div></button>';
            }).join('') + '</div>';
        }

        function renderDie(value, rolling) {
            const map = {
                1: [4],
                2: [0, 8],
                3: [0, 4, 8],
                4: [0, 2, 6, 8],
                5: [0, 2, 4, 6, 8],
                6: [0, 2, 3, 5, 6, 8]
            };
            const on = map[value] || [];
            let html = '<div class="die' + (rolling ? ' rolling' : '') + '">';
            for (let i = 0; i < 9; i++) html += '<span class="pip' + (on.includes(i) ? ' on' : '') + '"></span>';
            return html + '</div>';
        }

        function renderResult(round) {
            const card = $('result-card');
            if (!round) {
                card.classList.add('hidden');
                card.innerHTML = '';
                return;
            }
            let title = '', sub = '';
            if (round.mode === 'wheel') {
                if (!isWheelDone(round)) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                title = round.wheel.winner + ' 당첨';
                sub = (round.spin && round.spin.startedBy ? round.spin.startedBy : '멤버') + '이 룰렛을 돌렸어요';
            } else if (round.mode === 'dice') {
                const mine = actionOf(profileName);
                const winner = diceWinner(round);
                if (!mine && !winner) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                title = winner ? winner + ' 승리' : '내 주사위 ' + mine.value + '점';
                sub = winner ? '모든 멤버가 주사위를 굴렸어요' : '다른 멤버를 기다리는 중';
            } else {
                const mine = actionOf(profileName);
                if (!mine && !allActed(round)) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                title = mine ? '내 결과: ' + mine.result : '결과 공개';
                sub = allActed(round) ? '모든 멤버가 선택을 끝냈어요' : '다른 멤버를 기다리는 중';
            }
            card.classList.remove('hidden');
            card.innerHTML = '<div class="result-icon"><i class="fa-solid fa-trophy"></i></div><div class="result-copy"><strong>' + title + '</strong><span>' + sub + '</span></div>';
        }

        function renderAll() {
            renderPresence();
            renderHeader();
            renderModeTabs();
            renderMemberControls();
            renderMainAction();
            renderGame();
            manageTicker();
        }

        function manageTicker() {
            let need = false;
            if (room.round && room.round.mode === 'wheel' && isWheelSpinning(room.round)) need = true;
            if (room.round && room.round.mode === 'dice') {
                need = Object.values(room.round.actions || {}).some(a => Date.now() < (a.revealAt || 0));
            }
            if (room.round && room.round.mode === 'ladder') {
                need = Object.values(room.round.actions || {}).some(a => Date.now() - (a.at || 0) < 1700);
            }
            if (need && !tickTimer) tickTimer = setInterval(renderAll, 80);
            if (!need && tickTimer) {
                clearInterval(tickTimer);
                tickTimer = null;
            }
        }

        async function writeRoom(patch) {
            if (!roomRef) return;
            try {
                await setDoc(roomRef, Object.assign({ updatedAt: Date.now() }, patch), { merge: true });
            } catch (e) {
                showToast('저장에 실패했어요');
                console.warn(e);
            }
        }

        async function heartbeat() {
            if (!roomRef || !currentUser || !profileName) return;
            const entry = {
                uid: currentUser.uid,
                name: profileName,
                email: currentUser.email || '',
                photoURL: currentUser.photoURL || '',
                lastSeen: Date.now()
            };
            try {
                await updateDoc(roomRef, {
                    ['presence.' + currentUser.uid]: entry,
                    updatedAt: Date.now()
                });
            } catch (e) {
                await writeRoom({ presence: { [currentUser.uid]: entry } });
            }
        }

        async function loadProfile(user) {
            profileName = '';
            if (!user) return;
            try {
                const snap = await getDoc(doc(db, 'members', user.uid));
                const data = snap.exists() ? (snap.data() || {}) : {};
                profileName = MEMBERS.includes(data.name) ? data.name : '';
            } catch (e) {
                profileName = '';
            }
        }

        function showGate(show) {
            $('gate').classList.toggle('show', !!show);
        }

        function subscribeMembers() {
            if (membersUnsub) membersUnsub();
            membersUnsub = onSnapshot(collection(db, 'members'), snap => {
                const next = {};
                snap.forEach(d => { next[d.id] = Object.assign({ uid: d.id }, d.data() || {}); });
                memberDocs = next;
                renderAll();
            });
        }

        async function subscribeRoom() {
            if (roomUnsub) roomUnsub();
            roomRef = doc(db, 'game_rooms', ROOM_ID);
            const first = await getDoc(roomRef);
            if (!first.exists()) await setDoc(roomRef, DEFAULT_ROOM, { merge: true });
            roomUnsub = onSnapshot(roomRef, snap => {
                room = normalizeRoom(snap.exists() ? snap.data() : {});
                renderAll();
            }, err => {
                showToast('실시간 연결을 확인해 주세요');
                console.warn(err);
            });
        }

        async function init() {
            app = getOrInitializeApp(firebaseConfig, 'meetingApp');
            auth = getAuth(app);
            db = getFirestore(app);
            try { await setPersistence(auth, browserLocalPersistence); } catch (e) {}
            onAuthStateChanged(auth, async user => {
                currentUser = user ? {
                    uid: user.uid,
                    email: user.email || '',
                    displayName: user.displayName || '',
                    photoURL: user.photoURL || ''
                } : null;
                if (!currentUser) {
                    showGate(true);
                    renderAll();
                    return;
                }
                await loadProfile(currentUser);
                if (!profileName) {
                    showGate(true);
                    renderAll();
                    return;
                }
                showGate(false);
                subscribeMembers();
                await subscribeRoom();
                await heartbeat();
                clearInterval(beatTimer);
                beatTimer = setInterval(heartbeat, 15000);
            });
            document.addEventListener('visibilitychange', () => { if (!document.hidden) heartbeat(); });
            window.addEventListener('focus', heartbeat);
        }

        window.EnjoyGame = {
            openPresenceSheet: function () {
                $('presence-sheet').classList.add('show');
                renderPresence();
            },
            closePresenceSheet: function () {
                $('presence-sheet').classList.remove('show');
            },
            setMode: function (mode) {
                if (!MODES[mode]) return;
                room.mode = mode;
                room.round = null;
                renderAll();
                writeRoom({ mode, round: null });
            },
            toggleMember: function (name) {
                if (!MEMBERS.includes(name)) return;
                const current = (room.participants || MEMBERS).slice();
                let next = current.includes(name) ? current.filter(v => v !== name) : current.concat(name);
                if (next.length < 2) {
                    showToast('최소 2명은 필요해요');
                    next = current;
                }
                room.participants = next;
                room.penaltyCount = clampPenalty(room.penaltyCount, next.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: next, penaltyCount: room.penaltyCount, round: null });
            },
            selectAll: function () {
                room.participants = MEMBERS.slice();
                room.penaltyCount = clampPenalty(room.penaltyCount, room.participants.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: room.participants, penaltyCount: room.penaltyCount, round: null });
            },
            usePresentMembers: function () {
                const names = activePresence().map(v => v.name).filter((name, idx, arr) => MEMBERS.includes(name) && arr.indexOf(name) === idx);
                if (names.length < 2) {
                    showToast('입장 멤버가 2명 이상 필요해요');
                    return;
                }
                room.participants = names;
                room.penaltyCount = clampPenalty(room.penaltyCount, names.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: names, penaltyCount: room.penaltyCount, round: null });
            },
            adjustPenalty: function (delta) {
                const next = clampPenalty((room.penaltyCount || 1) + delta, (room.participants || MEMBERS).length);
                room.penaltyCount = next;
                room.round = null;
                renderAll();
                writeRoom({ penaltyCount: next, round: null });
            },
            startRound: async function () {
                if (!currentUser || !profileName) {
                    showGate(true);
                    return;
                }
                const participants = (room.participants || MEMBERS).filter(name => MEMBERS.includes(name));
                if (participants.length < 2) {
                    showToast('최소 2명이 필요해요');
                    return;
                }
                const mode = room.mode || 'ladder';
                const seed = Date.now() + ':' + currentUser.uid + ':' + Math.random().toString(36).slice(2);
                const penaltyCount = clampPenalty(room.penaltyCount, participants.length);
                const round = makeRound(mode, participants, penaltyCount, seed);
                room.round = round;
                renderAll();
                await writeRoom({ mode, participants, penaltyCount, round });
            },
            mainAction: async function () {
                if (!room.round || (room.round.mode === 'wheel' && isWheelDone(room.round))) {
                    await window.EnjoyGame.startRound();
                    return;
                }
                if (room.round.mode === 'wheel') await window.EnjoyGame.spinWheel();
            },
            chooseLadder: async function (slot) {
                if (!canPlay() || room.round.mode !== 'ladder') return;
                const a = room.round.actions || {};
                if (Object.values(a).some(item => item.slot === slot)) return;
                const finalLane = traceLadder(slot, room.round.ladder);
                const result = (room.round.ladder.labels || [])[finalLane] || '통과';
                await window.EnjoyGame.saveAction({
                    slot,
                    finalLane,
                    result,
                    at: Date.now()
                });
            },
            chooseLot: async function (item) {
                if (!canPlay() || room.round.mode !== 'lots') return;
                const a = room.round.actions || {};
                if (Object.values(a).some(v => v.item === item)) return;
                const result = (room.round.lotLabels || [])[item] || '통과';
                await window.EnjoyGame.saveAction({
                    item,
                    result,
                    at: Date.now()
                });
            },
            spinWheel: async function () {
                if (!room.round || room.round.mode !== 'wheel' || isWheelSpinning(room.round) || isWheelDone(room.round)) return;
                const n = room.round.participants.length;
                const seg = 360 / n;
                const winnerIndex = room.round.wheel.winnerIndex;
                const target = 360 - (winnerIndex * seg + seg / 2) + (room.round.wheel.offset || 0);
                const startedAt = Date.now();
                const spin = {
                    startedAt,
                    endAt: startedAt + WHEEL_DURATION,
                    totalRotation: (room.round.wheel.turns * 360) + target,
                    startedBy: profileName,
                    startedByUid: currentUser.uid
                };
                room.round.spin = spin;
                renderAll();
                try {
                    await updateDoc(roomRef, { 'round.spin': spin, updatedAt: Date.now() });
                } catch (e) {
                    showToast('룰렛 저장에 실패했어요');
                }
            },
            rollDice: async function () {
                if (!canPlay() || room.round.mode !== 'dice') return;
                const rand = rng(room.round.seed + ':' + profileName + ':' + Date.now());
                const value = 1 + Math.floor(rand() * 6);
                await window.EnjoyGame.saveAction({
                    value,
                    tie: rand(),
                    at: Date.now(),
                    revealAt: Date.now() + DICE_DURATION
                });
            },
            saveAction: async function (action) {
                if (!room.round.actions) room.round.actions = {};
                room.round.actions[profileName] = Object.assign({
                    uid: currentUser.uid,
                    name: profileName
                }, action);
                renderAll();
                try {
                    await updateDoc(roomRef, {
                        ['round.actions.' + profileName]: room.round.actions[profileName],
                        updatedAt: Date.now()
                    });
                } catch (e) {
                    showToast('참여 저장에 실패했어요');
                    console.warn(e);
                }
            }
        };

        renderAll();
        init();
    </script>
</body>
</html>
