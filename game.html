<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>엔조이 복불복</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        :root {
            color-scheme: dark;
            --bg: #000000;
            --panel: rgba(255,255,255,.07);
            --panel-strong: rgba(255,255,255,.12);
            --solid: #101114;
            --solid-2: #17181c;
            --line: rgba(255,255,255,.1);
            --line-strong: rgba(255,255,255,.2);
            --text: #f2f4f6;
            --sub: #8b95a1;
            --faint: rgba(255,255,255,.38);
            --button: #ffffff;
            --button-text: #111111;
            --danger: #f04452;
            --ok: #22c55e;
            --danger-soft: rgba(240,68,82,.18);
            --danger-border: rgba(240,68,82,.48);
            --ok-soft: rgba(34,197,94,.16);
            --ok-border: rgba(34,197,94,.46);
            --ladder-line: rgba(255,255,255,.26);
            --ladder-rung: rgba(255,255,255,.44);
            --safe-top: max(14px, env(safe-area-inset-top));
            --safe-bottom: max(18px, env(safe-area-inset-bottom));
        }
        @media (prefers-color-scheme: light) {
            :root {
                color-scheme: light;
                --bg: #f2f4f6;
                --panel: rgba(255,255,255,.86);
                --panel-strong: rgba(255,255,255,.96);
                --solid: #ffffff;
                --solid-2: #eef1f5;
                --line: rgba(0,0,0,.08);
                --line-strong: rgba(0,0,0,.16);
                --text: #141414;
                --sub: #6b7280;
                --faint: rgba(20,20,20,.42);
                --button: #141414;
                --button-text: #ffffff;
                --danger-soft: rgba(240,68,82,.14);
                --danger-border: rgba(240,68,82,.38);
                --ok-soft: rgba(34,197,94,.13);
                --ok-border: rgba(34,197,94,.36);
                --ladder-line: rgba(20,20,20,.22);
                --ladder-rung: rgba(20,20,20,.38);
            }
        }
        html, body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            letter-spacing: 0;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        body {
            height: 100dvh;
            overflow: hidden;
        }
        button {
            border: 0;
            padding: 0;
            background: none;
            color: inherit;
            font: inherit;
            cursor: pointer;
            touch-action: manipulation;
        }
        button:active { transform: scale(.96); }
        button:disabled {
            opacity: .46;
            transform: none;
        }
        .app {
            width: min(100%, 480px);
            height: 100dvh;
            margin: 0 auto;
            background: var(--bg);
            position: relative;
            overflow: hidden;
        }
        .topbar {
            padding: var(--safe-top) 18px 10px;
            flex: 0 0 auto;
        }
        .top-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .top-left {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }
        .title-block { min-width: 0; }
        .title-block h1 {
            margin: 0;
            font-size: 21px;
            line-height: 1.1;
            font-weight: 850;
        }
        .title-block p {
            margin: 4px 0 0;
            color: var(--sub);
            font-size: 11.5px;
            line-height: 1.2;
            font-weight: 650;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .present-btn {
            min-height: 38px;
            max-width: 130px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 8px;
            border-radius: 999px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--text);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }
        .present-avatars {
            display: flex;
            align-items: center;
            min-width: 0;
        }
        .present-avatars .avatar {
            width: 26px;
            height: 26px;
            margin-left: -7px;
            border: 2px solid var(--bg);
        }
        .present-avatars .avatar:first-child { margin-left: 0; }
        .present-count {
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 850;
            white-space: nowrap;
        }
        .screen {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .content {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 4px 18px calc(var(--safe-bottom) + 18px);
            scrollbar-width: none;
        }
        .content::-webkit-scrollbar { display: none; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,.28);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            backdrop-filter: blur(12px) saturate(180%);
        }
        @media (prefers-color-scheme: light) {
            .card { box-shadow: 0 8px 24px rgba(15,23,42,.08); }
        }
        .stage {
            min-height: 468px;
            padding: 15px;
            overflow: hidden;
        }
        .stage-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        .mode-copy { min-width: 0; }
        .mode-copy h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.1;
            font-weight: 900;
        }
        .mode-copy p {
            margin: 6px 0 0;
            color: var(--sub);
            font-size: 12px;
            line-height: 1.35;
            font-weight: 650;
        }
        .round-pill {
            min-height: 32px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px;
            border-radius: 999px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 850;
        }
        .round-pill.live { color: var(--text); }
        .round-pill.live i { color: var(--ok); }
        .game-area {
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .empty {
            width: 100%;
            min-height: 324px;
            display: grid;
            place-items: center;
            text-align: center;
            color: var(--sub);
        }
        .empty i {
            width: 70px;
            height: 70px;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 28px;
        }
        .empty strong {
            display: block;
            color: var(--text);
            font-size: 18px;
            font-weight: 850;
        }
        .empty span {
            display: block;
            margin-top: 7px;
            font-size: 12px;
            font-weight: 650;
        }
        .result-card {
            min-height: 58px;
            margin-top: 12px;
            padding: 12px 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 18px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
        }
        .result-card.hidden { display: none; }
        .result-icon {
            width: 36px;
            height: 36px;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            background: var(--panel-strong);
            color: var(--text);
        }
        .result-copy { min-width: 0; }
        .result-copy strong {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 14px;
            font-weight: 900;
        }
        .result-copy span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 11.5px;
            font-weight: 650;
        }
        .stage-actions {
            display: flex;
            gap: 9px;
            margin-top: 12px;
        }
        .primary-action {
            min-height: 52px;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-radius: 18px;
            background: var(--button);
            color: var(--button-text);
            font-size: 15px;
            font-weight: 900;
        }
        .secondary-action {
            width: 52px;
            height: 52px;
            flex: 0 0 auto;
            border-radius: 18px;
            background: rgba(128,128,128,.12);
            border: 1px solid var(--line);
            color: var(--text);
        }
        .mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            margin: 13px 0;
        }
        .mode-tab {
            min-height: 68px;
            padding: 8px 4px;
            border-radius: 20px;
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--sub);
            text-align: center;
        }
        .mode-tab.active {
            background: var(--panel-strong);
            color: var(--text);
            border-color: var(--line-strong);
        }
        .mode-tab i {
            display: block;
            margin: 0 auto 7px;
            font-size: 18px;
        }
        .mode-tab span {
            display: block;
            font-size: 10.5px;
            line-height: 1.15;
            font-weight: 850;
        }
        .control {
            padding: 14px;
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .section-head strong {
            font-size: 14px;
            font-weight: 850;
        }
        .section-head span {
            color: var(--sub);
            font-size: 11px;
            font-weight: 750;
        }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .member-chip {
            min-height: 47px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 16px;
            background: rgba(128,128,128,.08);
            border: 1px solid var(--line);
            color: var(--sub);
            text-align: left;
        }
        .member-chip.active {
            background: var(--panel-strong);
            color: var(--text);
            border-color: var(--line-strong);
        }
        .avatar {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 999px;
            color: #fff;
            font-size: 12px;
            font-weight: 900;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .member-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 850;
        }
        .mini-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .mini-btn {
            min-height: 38px;
            flex: 1;
            border-radius: 14px;
            background: rgba(128,128,128,.12);
            border: 1px solid var(--line);
            color: var(--text);
            font-size: 12px;
            font-weight: 850;
        }
        .count-row {
            margin-top: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .count-label {
            width: 86px;
            flex: 0 0 auto;
        }
        .count-label strong {
            display: block;
            font-size: 13px;
            font-weight: 850;
        }
        .count-label span {
            display: block;
            margin-top: 3px;
            color: var(--sub);
            font-size: 10.5px;
            font-weight: 650;
        }
        .stepper {
            min-height: 46px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px;
            border-radius: 16px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
        }
        .stepper button {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: var(--panel-strong);
            border: 1px solid var(--line);
        }
        .stepper strong {
            font-size: 14px;
            font-weight: 900;
        }
        .new-round {
            width: 100%;
            min-height: 52px;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-radius: 18px;
            background: var(--button);
            color: var(--button-text);
            font-size: 15px;
            font-weight: 900;
        }
        .ladder-wrap { width: 100%; }
        .ladder-top, .ladder-bottom {
            display: grid;
            gap: 5px;
        }
        .ladder-slot, .ladder-result {
            min-width: 0;
            min-height: 34px;
            padding: 6px 3px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            text-align: center;
            font-size: 10.5px;
            font-weight: 850;
        }
        .ladder-slot.open {
            color: var(--text);
            background: var(--panel-strong);
        }
        .ladder-slot.mine {
            outline: 2px solid var(--text);
            outline-offset: -2px;
        }
        .ladder-result.win {
            color: #fff;
            background: var(--danger);
            border-color: var(--danger);
        }
        @media (prefers-color-scheme: light) {
            .ladder-result.win { color: #fff; }
        }
        .ladder-svg {
            width: 100%;
            height: 248px;
            display: block;
            margin: 8px 0;
            overflow: visible;
        }
        .ladder-line {
            stroke: var(--ladder-line);
            stroke-width: 3;
            stroke-linecap: round;
        }
        .ladder-rung {
            stroke: var(--ladder-rung);
            stroke-width: 5;
            stroke-linecap: round;
        }
        .ladder-path {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .ladder-path.recent {
            stroke-dasharray: 920;
            stroke-dashoffset: 920;
            animation: path-in 1.3s cubic-bezier(.16,1,.3,1) forwards;
        }
        @keyframes path-in { to { stroke-dashoffset: 0; } }
        .lots-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .paper-card {
            min-height: 126px;
            padding: 11px 7px;
            border-radius: 20px;
            background: rgba(128,128,128,.09);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }
        .paper-card.open { background: var(--panel-strong); }
        .paper-card.win {
            background: var(--danger-soft);
            border-color: var(--danger-border);
        }
        .paper {
            width: 42px;
            height: 52px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--button);
            color: var(--button-text);
            font-size: 18px;
            font-weight: 950;
            box-shadow: 0 8px 18px rgba(0,0,0,.2);
        }
        .paper-card:not(.open) .paper {
            transform: rotate(-4deg);
        }
        .paper-card.recent .paper {
            animation: pick-paper .72s cubic-bezier(.2,1.4,.3,1);
        }
        @keyframes pick-paper {
            0% { transform: translateY(0) rotate(-4deg); }
            45% { transform: translateY(-18px) rotate(8deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .game-name {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 850;
        }
        .game-result {
            color: var(--sub);
            font-size: 11px;
            font-weight: 800;
        }
        .paper-card.win .game-result { color: var(--danger); }
        .wheel-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .wheel-shell {
            width: min(286px, 76vw);
            aspect-ratio: 1;
            position: relative;
            display: grid;
            place-items: center;
        }
        .wheel-pointer {
            position: absolute;
            top: -2px;
            left: 50%;
            width: 24px;
            height: 24px;
            z-index: 4;
            transform: translateX(-50%) rotate(45deg);
            border-radius: 4px;
            background: var(--button);
            box-shadow: 0 4px 12px rgba(0,0,0,.28);
        }
        .wheel-engine {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: var(--solid);
            border: 8px solid var(--button);
            box-shadow: 0 12px 34px rgba(0,0,0,.28);
            overflow: hidden;
        }
        .wheel-engine canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .wheel-center {
            position: absolute;
            width: 66px;
            height: 66px;
            border-radius: 999px;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--button);
            color: var(--button-text);
            font-size: 12px;
            font-weight: 950;
        }
        .wheel-note {
            min-height: 38px;
            padding: 0 14px;
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            background: rgba(128,128,128,.1);
            border: 1px solid var(--line);
            color: var(--sub);
            font-size: 12px;
            font-weight: 850;
        }
        .dice-game {
            width: 100%;
            display: grid;
            gap: 12px;
        }
        .dice-arena {
            width: 100%;
            height: 218px;
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            background: var(--solid-2);
            border: 1px solid var(--line);
            isolation: isolate;
        }
        .dice-arena canvas {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 2;
        }
        .dice-arena-idle {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: grid;
            place-items: center;
            color: var(--faint);
            text-align: center;
        }
        .dice-arena-idle i {
            display: block;
            margin-bottom: 8px;
            font-size: 30px;
        }
        .dice-arena-idle span {
            display: block;
            font-size: 11px;
            font-weight: 800;
        }
        .dice-live {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 4;
            min-height: 30px;
            display: none;
            align-items: center;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--button);
            color: var(--button-text);
            box-shadow: 0 6px 18px rgba(0,0,0,.2);
            font-size: 11px;
            font-weight: 900;
        }
        .dice-live.show { display: inline-flex; }
        .dice-roster {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .dice-player {
            min-height: 58px;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 8px;
            border-radius: 15px;
            background: rgba(128,128,128,.09);
            border: 1px solid var(--line);
            text-align: left;
        }
        .dice-player.ready {
            background: var(--panel-strong);
            border-color: var(--line-strong);
        }
        .dice-player.done {
            background: var(--panel-strong);
        }
        .dice-player.win {
            background: var(--ok-soft);
            border-color: var(--ok-border);
        }
        .dice-player-copy {
            min-width: 0;
            flex: 1;
        }
        .dice-player-copy strong,
        .dice-player-copy span {
            display: block;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .dice-player-copy strong {
            font-size: 11.5px;
            font-weight: 900;
        }
        .dice-player-copy span {
            margin-top: 3px;
            color: var(--sub);
            font-size: 10px;
            font-weight: 750;
        }
        .dice-score {
            width: 25px;
            height: 25px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            border-radius: 8px;
            background: var(--button);
            color: var(--button-text);
            font-size: 12px;
            font-weight: 950;
        }
        .dice-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }
        .dice-card {
            min-height: 126px;
            padding: 11px 7px;

        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, getDoc, onSnapshot, runTransaction, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const MEMBERS = ['전시기', '성원제', '오스틴', '이진누', '류짱', '홍박사'];
        const MEMBER_META = {
            '전시기': { color: '#f04452', short: '전' },
            '성원제': { color: '#3182f6', short: '성' },
            '오스틴': { color: '#f59e0b', short: '오' },
            '이진누': { color: '#22c55e', short: '이' },
            '류짱': { color: '#a855f7', short: '류' },
            '홍박사': { color: '#06b6d4', short: '홍' }
        };
        const COLORS = ['#3182f6', '#f04452', '#f59e0b', '#22c55e', '#a855f7', '#06b6d4'];
        const MODES = {
            ladder: { title: '사다리타기', tab: '사다리', desc: '각자 출발 자리를 골라 결과까지 내려가요', icon: 'fa-bars-staggered' },
            lots: { title: '제비뽑기', tab: '제비', desc: '남아 있는 제비 중 하나를 직접 뽑아요', icon: 'fa-ticket' },
            wheel: { title: '돌림판', tab: '룰렛', desc: '멤버 이름이 적힌 돌림판으로 한 명을 정해요', icon: 'fa-circle-notch' },
            dice: { title: '주사위 대결', tab: '주사위', desc: '각자 던진 주사위 중 가장 높은 숫자가 이겨요', icon: 'fa-dice-six' }
        };
        const ROOM_ID = 'enjoy-main';
        const ACTIVE_MS = 75000;
        const WHEEL_DURATION = 4200;
        const DICE_DURATION = 5000;
        const DEFAULT_ROOM = {
            mode: 'ladder',
            participants: MEMBERS.slice(),
            penaltyCount: 1,
            round: null,
            presence: {},
            updatedAt: Date.now()
        };
        const firebaseConfig = {
            apiKey: "AIzaSyAVQ_WdMXKuU2CgTgvSHqLKuAVGPeeDuOQ",
            authDomain: "enjoy-meeting-account.firebaseapp.com",
            projectId: "enjoy-meeting-account",
            storageBucket: "enjoy-meeting-account.firebasestorage.app",
            messagingSenderId: "956113498506",
            appId: "1:956113498506:web:b520f2b77fdb3295cb9873"
        };

        const $ = (id) => document.getElementById(id);
        let app, auth, db, roomRef, roomUnsub, membersUnsub, beatTimer, tickTimer;
        let currentUser = null, profileName = '', room = Object.assign({}, DEFAULT_ROOM), memberDocs = {};
        let setupOpen = true;
        let wheelEngine = null, wheelEngineRoundId = '', wheelEngineSpinKey = '';
        let diceEngine = null, diceEngineRoundId = '', diceEngineReady = false, diceBusy = false, diceActiveName = '';
        let diceQueue = [], dicePlayed = new Set();

        window.haptic = function () {
            try { if (navigator.vibrate) navigator.vibrate(8); } catch (e) {}
        };

        function showToast(text) {
            const el = $('toast');
            el.textContent = text;
            el.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => el.classList.remove('show'), 1700);
        }

        function getOrInitializeApp(config, name) {
            const found = getApps().find(item => item.name === name);
            return found || initializeApp(config, name);
        }

        function escapeHtml(v) {
            return String(v == null ? '' : v).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function hashSeed(seed) {
            let h = 2166136261;
            const s = String(seed || Date.now());
            for (let i = 0; i < s.length; i++) {
                h ^= s.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        function rng(seed) {
            let a = hashSeed(seed) || 1;
            return function () {
                a |= 0;
                a = (a + 0x6D2B79F5) | 0;
                let t = Math.imul(a ^ (a >>> 15), 1 | a);
                t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }

        function shuffle(list, seed) {
            const out = list.slice();
            const rand = rng(seed);
            for (let i = out.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                [out[i], out[j]] = [out[j], out[i]];
            }
            return out;
        }

        function clampPenalty(value, total) {
            const max = Math.max(1, Math.min(5, (total || MEMBERS.length) - 1));
            return Math.max(1, Math.min(max, Number(value) || 1));
        }

        function normalizeRoom(data) {
            const next = Object.assign({}, DEFAULT_ROOM, data || {});
            next.mode = MODES[next.mode] ? next.mode : 'ladder';
            next.participants = Array.isArray(next.participants) && next.participants.length
                ? next.participants.filter(name => MEMBERS.includes(name))
                : MEMBERS.slice();
            if (next.participants.length < 2) next.participants = MEMBERS.slice();
            next.penaltyCount = clampPenalty(next.penaltyCount, next.participants.length);
            next.presence = next.presence || {};
            return next;
        }

        function activePresence() {
            const now = Date.now();
            return Object.keys(room.presence || {})
                .map(uid => Object.assign({ uid }, room.presence[uid] || {}))
                .filter(v => now - (v.lastSeen || 0) < ACTIVE_MS && MEMBERS.includes(v.name))
                .sort((a, b) => MEMBERS.indexOf(a.name) - MEMBERS.indexOf(b.name));
        }

        function memberDocByName() {
            const by = {};
            Object.keys(memberDocs).forEach(uid => {
                const item = memberDocs[uid] || {};
                if (item.name) by[item.name] = item;
            });
            return by;
        }

        function avatar(name, size) {
            const doc = memberDocByName()[name] || {};
            const meta = MEMBER_META[name] || { color: '#6b7280', short: '?' };
            const dim = size ? 'width:' + size + 'px;height:' + size + 'px;' : '';
            if (doc.photoURL) return '<span class="avatar" style="' + dim + '"><img src="' + escapeHtml(doc.photoURL) + '" referrerpolicy="no-referrer" alt=""></span>';
            return '<span class="avatar" style="' + dim + 'background:' + meta.color + ';">' + meta.short + '</span>';
        }

        function actions() {
            return (room.round && room.round.actions) || {};
        }

        function actionOf(name) {
            return actions()[name] || null;
        }

        function allActed(round) {
            if (!round) return false;
            const a = round.actions || {};
            return (round.participants || []).every(name => !!a[name]);
        }

        function allDiceRevealed(round) {
            if (!round || !allActed(round)) return false;
            return (round.participants || []).every(name => Date.now() >= ((round.actions[name] || {}).revealAt || 0));
        }

        function currentMode() {
            return (room.round && room.round.mode) || room.mode || 'ladder';
        }

        function canPlay() {
            return !!(currentUser && profileName && room.round && room.round.participants.includes(profileName) && !actionOf(profileName));
        }

        function buildPrizeLabels(seed, total, count) {
            const labels = [];
            for (let i = 0; i < total; i++) labels.push(i < count ? '당첨' : '통과');
            return shuffle(labels, seed + ':prizes');
        }

        function buildLadder(seed, participants, penaltyCount) {
            const n = participants.length;
            const levels = Math.max(8, n + 5);
            const rand = rng(seed + ':ladder');
            const rungs = [];
            for (let level = 0; level < levels; level++) {
                const occupied = {};
                const tries = n > 4 && rand() > .45 ? 2 : 1;
                for (let k = 0; k < tries; k++) {
                    const lane = Math.floor(rand() * Math.max(1, n - 1));
                    if (occupied[lane] || occupied[lane - 1] || occupied[lane + 1]) continue;
                    occupied[lane] = true;
                    rungs.push({ level, lane });
                }
            }
            return { ladder: { levels, rungs, labels: buildPrizeLabels(seed, n, penaltyCount) } };
        }

        function buildLots(seed, participants, penaltyCount) {
            return { lotLabels: buildPrizeLabels(seed, participants.length, penaltyCount) };
        }

        function buildWheel(seed, participants) {
            const rand = rng(seed + ':wheel');
            const winnerIndex = Math.floor(rand() * participants.length);
            return {
                wheel: {
                    winnerIndex,
                    winner: participants[winnerIndex],
                    turns: 6 + Math.floor(rand() * 2),
                    offset: rand() * 20 - 10
                }
            };
        }

        function traceLadder(slot, ladder) {
            let lane = slot;
            (ladder.rungs || []).forEach(r => {
                if (r.lane === lane) lane += 1;
                else if (r.lane + 1 === lane) lane -= 1;
            });
            return lane;
        }

        function diceWinner(round) {
            if (!allDiceRevealed(round)) return '';
            if (diceEngineRoundId === round.id && (diceBusy || diceQueue.length)) return '';
            const entries = Object.keys(round.actions || {}).map(name => Object.assign({ name }, round.actions[name]));
            entries.sort((a, b) => (b.value - a.value) || ((b.tie || 0) - (a.tie || 0)));
            return entries[0] ? entries[0].name : '';
        }

        function roundWinnerNames(round) {
            if (!round) return [];
            if (round.mode === 'wheel') return isWheelDone(round) ? [round.wheel.winner] : [];
            if (round.mode === 'dice') {
                const win = diceWinner(round);
                return win ? [win] : [];
            }
            return Object.keys(round.actions || {}).filter(name => round.actions[name].result === '당첨');
        }

        function makeRound(mode, participants, penaltyCount, seed) {
            const base = {
                id: 'rd_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
                mode,
                seed,
                participants,
                penaltyCount,
                actions: {},
                startedAt: Date.now(),
                startedBy: profileName,
                startedByUid: currentUser.uid
            };
            if (mode === 'ladder') return Object.assign(base, buildLadder(seed, participants, penaltyCount));
            if (mode === 'lots') return Object.assign(base, buildLots(seed, participants, penaltyCount));
            if (mode === 'wheel') return Object.assign(base, buildWheel(seed, participants));
            return base;
        }

        function renderPresence() {
            const active = activePresence();
            $('present-count').textContent = '입장 ' + active.length;
            $('present-avatars').innerHTML = active.slice(0, 4).map(v => avatar(v.name, 26)).join('');
            $('presence-list').innerHTML = active.length ? active.map(v => {
                const ago = Math.max(0, Math.floor((Date.now() - (v.lastSeen || 0)) / 1000));
                return '<div class="sheet-person">' + avatar(v.name, 36) + '<div><strong>' + v.name + '</strong><span>' + (ago < 10 ? '방금 입장' : ago + '초 전 활동') + '</span></div></div>';
            }).join('') : '<div class="sheet-person"><div class="avatar" style="background:#6b7280;">?</div><div><strong>아직 없음</strong><span>멤버가 들어오면 여기에 표시돼요</span></div></div>';
        }

        function renderHeader() {
            const mode = MODES[currentMode()] || MODES.ladder;
            $('mode-title').textContent = mode.title;
            $('mode-desc').textContent = mode.desc;
            const pill = $('round-pill');
            if (!room.round) {
                pill.className = 'round-pill';
                pill.innerHTML = '<i class="fa-solid fa-circle"></i><span>대기</span>';
                return;
            }
            let done = allActed(room.round);
            if (room.round.mode === 'wheel') done = isWheelDone(room.round);
            if (room.round.mode === 'dice') done = !!diceWinner(room.round);
            pill.className = 'round-pill live';
            pill.innerHTML = '<i class="fa-solid ' + (done ? 'fa-check' : 'fa-circle') + '"></i><span>' + (done ? '완료' : '진행') + '</span>';
        }

        function renderModeTabs() {
            $('mode-tabs').innerHTML = Object.keys(MODES).map(key => {
                const mode = MODES[key];
                return '<button class="mode-tab' + (room.mode === key ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.setMode(\'' + key + '\')">' +
                    '<i class="fa-solid ' + mode.icon + '"></i><span>' + mode.tab + '</span></button>';
            }).join('');
        }

        function renderMemberControls() {
            const participants = room.participants || MEMBERS;
            $('member-count').textContent = participants.length + '명';
            $('penalty-count').textContent = clampPenalty(room.penaltyCount, participants.length) + '명';
            $('member-grid').innerHTML = MEMBERS.map(name => {
                const on = participants.includes(name);
                return '<button class="member-chip' + (on ? ' active' : '') + '" onclick="window.haptic(); window.EnjoyGame.toggleMember(\'' + name + '\')">' +
                    avatar(name) + '<span class="member-name">' + name + '</span></button>';
            }).join('');
        }

        function renderMainAction() {
            const btn = $('main-action');
            const icon = btn.querySelector('i');
            const label = btn.querySelector('span');
            const secondary = document.querySelector('.secondary-action');
            btn.classList.remove('status-action');
            if (!room.round) {
                icon.className = 'fa-solid fa-play';
                label.textContent = '게임 시작';
                btn.disabled = !profileName;
                secondary.classList.add('hidden');
                return;
            }
            if (room.round.mode === 'wheel') {
                secondary.classList.add('hidden');
                icon.className = 'fa-solid fa-circle-notch';
                if (isWheelSpinning(room.round)) {
                    label.textContent = '돌림판 도는 중';
                    btn.disabled = true;
                } else if (isWheelDone(room.round)) {
                    icon.className = 'fa-solid fa-rotate-right';
                    label.textContent = '다시 하기';
                    btn.disabled = false;
                } else {
                    label.textContent = '돌림판 돌리기';
                    btn.disabled = false;
                }
                return;
            }
            const acted = Object.keys(room.round.actions || {}).length;
            const total = (room.round.participants || []).length;
            const complete = room.round.mode === 'dice' ? !!diceWinner(room.round) : allActed(room.round);
            if (complete) {
                secondary.classList.add('hidden');
                icon.className = 'fa-solid fa-rotate-right';
                label.textContent = '다시 하기';
                btn.disabled = false;
                return;
            }
            secondary.classList.remove('hidden');
            btn.classList.add('status-action');
            if (!room.round.participants.includes(profileName)) {
                icon.className = 'fa-solid fa-ban';
                label.textContent = '참가 멤버가 아니에요';
                btn.disabled = true;
                return;
            }
            if (actionOf(profileName)) {
                icon.className = 'fa-solid fa-clock';
                label.textContent = acted + ' / ' + total + '명 참여 완료';
                btn.disabled = true;
                return;
            }
            icon.className = 'fa-solid fa-hand-pointer';
            label.textContent = selectHint(room.round.mode);
            btn.disabled = true;
        }

        function selectHint(mode) {
            if (mode === 'ladder') return '위 자리 하나를 선택';
            if (mode === 'lots') return '제비 하나를 선택';
            if (mode === 'dice') return '내 카드 눌러 굴리기';
            return '선택';
        }

        function renderGame() {
            const area = $('game-area');
            if (!room.round) {
                disposeGameEngines();
                area.dataset.engine = '';
                area.dataset.roundId = '';
                area.dataset.mode = room.mode;
                const mode = MODES[room.mode] || MODES.ladder;
                area.innerHTML = '<div class="empty"><div><i class="fa-solid ' + mode.icon + '"></i><strong>' + mode.title + '</strong><span>설정을 확인하고 게임을 시작하세요</span></div></div>';
                renderResult(null);
                return;
            }
            area.dataset.mode = room.round.mode;
            if (room.round.mode === 'ladder') {
                disposeGameEngines();
                area.dataset.engine = '';
                renderLadder(area, room.round);
            } else if (room.round.mode === 'lots') {
                disposeGameEngines();
                area.dataset.engine = '';
                renderLots(area, room.round);
            }
            else if (room.round.mode === 'wheel') renderWheel(area, room.round);
            else renderDice(area, room.round);
            renderResult(room.round);
        }

        function disposeWheelEngine() {
            if (wheelEngine) {
                try { wheelEngine.stop(); } catch (e) {}
                try { wheelEngine.remove(); } catch (e) {}
            }
            wheelEngine = null;
            wheelEngineRoundId = '';
            wheelEngineSpinKey = '';
        }

        function disposeDiceEngine() {
            if (diceEngine) {
                try { diceEngine.clear(); } catch (e) {}
            }
            diceEngine = null;
            diceEngineRoundId = '';
            diceEngineReady = false;
            diceBusy = false;
            diceActiveName = '';
            diceQueue = [];
            dicePlayed = new Set();
        }

        function disposeGameEngines(keep) {
            if (keep !== 'wheel') disposeWheelEngine();
            if (keep !== 'dice') disposeDiceEngine();
        }

        function renderLadder(area, round) {
            const participants = round.participants || [];
            const n = participants.length;
            const ladder = round.ladder || { levels: 8, rungs: [], labels: [] };
            const a = round.actions || {};
            const occupied = {};
            Object.keys(a).forEach(name => { if (typeof a[name].slot === 'number') occupied[a[name].slot] = name; });
            const width = 600, height = 286, top = 8, bottom = 278, edge = 54;
            const gap = n > 1 ? (width - edge * 2) / (n - 1) : width;
            const x = lane => n > 1 ? edge + lane * gap : width / 2;
            const y = level => top + ((level + 1) / (ladder.levels + 1)) * (bottom - top);
            let svg = '';
            for (let i = 0; i < n; i++) svg += '<line class="ladder-line" x1="' + x(i) + '" y1="' + top + '" x2="' + x(i) + '" y2="' + bottom + '"></line>';
            (ladder.rungs || []).forEach(r => {
                svg += '<line class="ladder-rung" x1="' + x(r.lane) + '" y1="' + y(r.level) + '" x2="' + x(r.lane + 1) + '" y2="' + y(r.level) + '"></line>';
            });
            Object.keys(a).forEach(name => {
                const act = a[name];
                if (typeof act.slot !== 'number') return;
                const idx = participants.indexOf(name);
                const recent = Date.now() - (act.at || 0) < 1600;
                svg += '<path class="ladder-path' + (recent ? ' recent' : '') + '" d="' + ladderPath(act.slot, ladder, x, y, top, bottom) + '" stroke="' + COLORS[(idx < 0 ? act.slot : idx) % COLORS.length] + '"></path>';
            });
            area.innerHTML = '<div class="ladder-wrap">' +
                '<div class="ladder-label-layer">' + Array.from({ length: n }).map((_, i) => {
                    const chosenBy = occupied[i];
                    const mine = chosenBy === profileName;
                    const disabled = !!chosenBy || !canPlay();
                    return '<button class="ladder-slot ' + (chosenBy ? '' : 'open') + (mine ? ' mine' : '') + '" style="left:' + (x(i) / width * 100) + '%" ' +
                        (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.chooseLadder(' + i + ')">' + (chosenBy || (i + 1 + '번')) + '</button>';
                }).join('') + '</div>' +
                '<svg class="ladder-svg" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none">' + svg + '</svg>' +
                '<div class="ladder-label-layer">' + Array.from({ length: n }).map((_, lane) => {
                    const actionName = Object.keys(a).find(name => a[name].finalLane === lane);
                    const result = actionName ? a[actionName].result : '?';
                    return '<div class="ladder-result' + (result === '당첨' ? ' win' : (result === '통과' ? ' pass' : '')) + '" style="left:' + (x(lane) / width * 100) + '%">' + result + '</div>';
                }).join('') + '</div></div>';
        }

        function ladderPath(startLane, ladder, x, y, top, bottom) {
            let lane = startLane;
            let d = 'M ' + x(lane) + ' ' + top;
            (ladder.rungs || []).forEach(r => {
                const ry = y(r.level);
                if (r.lane === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane + 1) + ' ' + ry;
                    lane += 1;
                } else if (r.lane + 1 === lane) {
                    d += ' L ' + x(lane) + ' ' + ry + ' L ' + x(lane - 1) + ' ' + ry;
                    lane -= 1;
                }
            });
            d += ' L ' + x(lane) + ' ' + bottom;
            return d;
        }

        function renderLots(area, round) {
            const participants = round.participants || [];
            const n = participants.length;
            const a = round.actions || {};
            const occupied = {};
            Object.keys(a).forEach(name => { if (typeof a[name].item === 'number') occupied[a[name].item] = name; });
            area.innerHTML = '<div class="lots-wrap"><div class="lots-status">' + Object.keys(a).length + ' / ' + n + '명 뽑기 완료</div><div class="lots-grid">' + Array.from({ length: n }).map((_, i) => {
                const chosenBy = occupied[i];
                const act = chosenBy ? a[chosenBy] : null;
                const win = act && act.result === '당첨';
                const disabled = !!chosenBy || !canPlay();
                const recent = act && Date.now() - (act.at || 0) < 1300;
                return '<button class="paper-card' + (act ? ' open' : '') + (win ? ' win' : '') + (recent ? ' recent' : '') + '" style="--ticket-color:' + COLORS[i % COLORS.length] + '" ' +
                    (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.chooseLot(' + i + ')">' +
                    '<span class="ticket"><span class="ticket-face ticket-front"><i class="fa-solid fa-ticket"></i><strong>제비 ' + (i + 1) + '</strong></span>' +
                    '<span class="ticket-face ticket-back"><i class="fa-solid ' + (win ? 'fa-bolt' : 'fa-check') + '"></i><strong>' + (act ? act.result : '') + '</strong></span></span>' +
                    '<span class="ticket-owner">' + (chosenBy || '선택 가능') + '</span></button>';
            }).join('') + '</div></div>';
        }

        function isWheelSpinning(round) {
            return !!(round && round.spin && Date.now() < (round.spin.endAt || 0));
        }

        function isWheelDone(round) {
            return !!(round && round.spin && Date.now() >= (round.spin.endAt || 0));
        }

        function renderWheel(area, round) {
            const participants = round.participants || [];
            disposeGameEngines('wheel');
            if (area.dataset.engine !== 'wheel' || area.dataset.roundId !== round.id) {
                disposeWheelEngine();
                area.dataset.engine = 'wheel';
                area.dataset.roundId = round.id;
                area.innerHTML = '<div class="wheel-wrap"><div class="wheel-shell"><div class="wheel-pointer"></div>' +
                    '<div id="wheel-engine" class="wheel-engine"></div><div id="wheel-center" class="wheel-center">SPIN</div></div>' +
                    '<div id="wheel-note" class="wheel-note">룰렛을 돌려주세요</div></div>';
                initializeWheelEngine(round);
            }
            const center = $('wheel-center');
            const note = $('wheel-note');
            if (center) center.textContent = isWheelDone(round) ? 'STOP' : 'SPIN';
            if (note) note.textContent = isWheelDone(round)
                ? round.wheel.winner + ' 당첨'
                : (isWheelSpinning(round) ? '룰렛 도는 중' : participants.length + '명이 들어간 룰렛');
            syncWheelEngine(round);
        }

        function initializeWheelEngine(round) {
            const Wheel = window.spinWheel && window.spinWheel.Wheel;
            const container = $('wheel-engine');
            if (!Wheel || !container) {
                showToast('룰렛 엔진을 불러오지 못했어요');
                return;
            }
            wheelEngineRoundId = round.id;
            wheelEngine = new Wheel(container, {
                items: (round.participants || []).map((name, index) => ({
                    label: name,
                    value: name,
                    backgroundColor: COLORS[index % COLORS.length],
                    labelColor: '#ffffff'
                })),
                borderColor: 'rgba(255,255,255,.92)',
                borderWidth: 5,
                lineColor: 'rgba(255,255,255,.72)',
                lineWidth: 2,
                isInteractive: false,
                itemLabelAlign: 'right',
                itemLabelFont: 'Pretendard, sans-serif',
                itemLabelFontSizeMax: 34,
                itemLabelRadius: .82,
                itemLabelRadiusMax: .36,
                itemLabelStrokeColor: 'rgba(0,0,0,.34)',
                itemLabelStrokeWidth: 2,
                pointerAngle: 0,
                radius: .96,
                onCurrentIndexChange: function () {
                    if (isWheelSpinning(room.round)) {
                        try { if (navigator.vibrate) navigator.vibrate(3); } catch (e) {}
                    }
                },
                onRest: function () {
                    renderAll();
                }
            });
            syncWheelEngine(round);
        }

        function cubicOut(value) {
            return 1 - Math.pow(1 - value, 3);
        }

        function syncWheelEngine(round) {
            if (!wheelEngine || wheelEngineRoundId !== round.id) return;
            const spin = round.spin;
            if (!spin) {
                if (wheelEngineSpinKey) {
                    wheelEngine.stop();
                    wheelEngine.rotation = 0;
                    wheelEngineSpinKey = '';
                }
                return;
            }
            const key = round.id + ':' + spin.startedAt;
            if (wheelEngineSpinKey === key) return;
            wheelEngineSpinKey = key;
            const remaining = Math.max(0, (spin.endAt || 0) - Date.now());
            const progress = Math.max(0, Math.min(1, remaining / WHEEL_DURATION));
            const turns = remaining > 0 ? Math.max(2, Math.ceil((round.wheel.turns || 6) * progress)) : 0;
            wheelEngine.spinToItem(round.wheel.winnerIndex, remaining, true, turns, 1, cubicOut);
        }

        function renderDice(area, round) {
            disposeGameEngines('dice');
            if (area.dataset.engine !== 'dice' || area.dataset.roundId !== round.id) {
                disposeDiceEngine();
                area.dataset.engine = 'dice';
                area.dataset.roundId = round.id;
                area.innerHTML = '<div class="dice-game"><div id="dice-arena" class="dice-arena">' +
                    '<div class="dice-arena-idle"><div><i class="fa-solid fa-dice"></i><span>내 이름을 눌러 주사위를 던져요</span></div></div>' +
                    '<div id="dice-live" class="dice-live"></div></div><div id="dice-roster" class="dice-roster"></div></div>';
                initializeDiceEngine(round);
            }
            renderDiceRoster(round);
            syncDiceEngine(round);
        }

        function renderDiceRoster(round) {
            const roster = $('dice-roster');
            if (!roster) return;
            const participants = round.participants || [];
            const a = round.actions || {};
            const winner = diceWinner(round);
            roster.innerHTML = participants.map(name => {
                const act = a[name];
                const queued = diceQueue.some(item => item.name === name);
                const rolling = !!act && (Date.now() < (act.revealAt || 0) || diceActiveName === name || queued);
                const open = !!act && !rolling;
                const win = open && winner === name;
                const disabled = !!act || !canPlay() || name !== profileName;
                const state = open ? act.value + '점' : (rolling ? '굴리는 중' : (name === profileName ? '눌러서 던지기' : '대기'));
                return '<button class="dice-player' + (!act && name === profileName ? ' ready' : '') + (open ? ' done' : '') + (win ? ' win' : '') + '" ' +
                    (disabled ? 'disabled' : '') + ' onclick="window.haptic(); window.EnjoyGame.rollDice()">' +
                    avatar(name, 30) + '<span class="dice-player-copy"><strong>' + name + '</strong><span>' + state + '</span></span>' +
                    (open ? '<span class="dice-score">' + act.value + '</span>' : '') + '</button>';
            }).join('');
        }

        async function initializeDiceEngine(round) {
            const DiceBox = window['dice-box-threejs'];
            const arena = $('dice-arena');
            if (!DiceBox || !arena) {
                showToast('주사위 엔진을 불러오지 못했어요');
                return;
            }
            const targetRoundId = round.id;
            diceEngineRoundId = targetRoundId;
            const engine = new DiceBox('#dice-arena', {
                assetPath: './vendor/',
                sounds: false,
                shadows: true,
                theme_surface: 'default',
                theme_colorset: 'white',
                theme_texture: '',
                theme_material: 'plastic',
                gravity_multiplier: 110,
                light_intensity: .8,
                baseScale: 78,
                strength: 3.2,
                iterationLimit: 2200
            });
            diceEngine = engine;
            try {
                await engine.initialize();
                if (diceEngine !== engine || diceEngineRoundId !== targetRoundId) return;
                diceEngineReady = true;
                syncDiceEngine(room.round);
                playNextDice();
            } catch (e) {
                console.warn(e);
                if (diceEngine === engine) showToast('3D 주사위를 시작하지 못했어요');
            }
        }

        function syncDiceEngine(round) {
            if (!round || round.mode !== 'dice' || diceEngineRoundId !== round.id) return;
            Object.keys(round.actions || {})
                .map(name => ({ name, action: round.actions[name] }))
                .sort((a, b) => (a.action.at || 0) - (b.action.at || 0))
                .forEach(item => {
                    const key = round.id + ':' + item.name + ':' + (item.action.at || 0);
                    if (dicePlayed.has(key)) return;
                    dicePlayed.add(key);
                    if (Date.now() <= (item.action.revealAt || 0) + 900) {
                        diceQueue.push({
                            roundId: round.id,
                            key,
                            name: item.name,
                            value: item.action.value
                        });
                    }
                });
            playNextDice();
        }

        async function playNextDice() {
            if (!diceEngineReady || diceBusy || !diceEngine || !diceQueue.length) return;
            const item = diceQueue.shift();
            if (item.roundId !== diceEngineRoundId) {
                playNextDice();
                return;
            }
            diceBusy = true;
            diceActiveName = item.name;
            const live = $('dice-live');
            if (live) {
                live.textContent = item.name + ' 주사위';
                live.classList.add('show');
            }
            renderDiceRoster(room.round);
            try {
                await diceEngine.roll('1d6@' + item.value);
            } catch (e) {
                console.warn(e);
            }
            if (item.roundId !== diceEngineRoundId) return;
            diceBusy = false;
            diceActiveName = '';
            if (live) {
                live.textContent = item.name + ' ' + item.value + '점';
                setTimeout(() => {
                    if (!diceBusy && $('dice-live')) $('dice-live').classList.remove('show');
                }, 1000);
            }
            renderAll();
            playNextDice();
        }

        function renderResult(round) {
            const card = $('result-card');
            if (!round) {
                card.classList.add('hidden');
                card.innerHTML = '';
                return;
            }
            let title = '', sub = '';
            if (round.mode === 'wheel') {
                if (!isWheelDone(round)) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                title = round.wheel.winner + ' 당첨';
                sub = (round.spin && round.spin.startedBy ? round.spin.startedBy : '멤버') + '이 돌림판을 돌렸어요';
            } else if (round.mode === 'dice') {
                const winner = diceWinner(round);
                if (!winner) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                title = winner + ' 승리';
                sub = '모든 멤버가 주사위를 던졌어요';
            } else {
                if (!allActed(round)) {
                    card.classList.add('hidden');
                    card.innerHTML = '';
                    return;
                }
                const winners = roundWinnerNames(round);
                title = winners.length ? winners.join(', ') + ' 당첨' : '결과 공개';
                sub = '모든 멤버가 선택을 끝냈어요';
            }
            card.classList.remove('hidden');
            card.innerHTML = '<div class="result-icon"><i class="fa-solid fa-trophy"></i></div><div class="result-copy"><strong>' + title + '</strong><span>' + sub + '</span></div>';
        }

        function renderAll() {
            renderPresence();
            renderHeader();
            renderModeTabs();
            renderMemberControls();
            renderMainAction();
            renderGame();
            $('setup-panel').classList.toggle('collapsed', !setupOpen);
            manageTicker();
        }

        function manageTicker() {
            let need = false;
            if (room.round && room.round.mode === 'wheel' && isWheelSpinning(room.round)) need = true;
            if (room.round && room.round.mode === 'dice') {
                need = Object.values(room.round.actions || {}).some(a => Date.now() < (a.revealAt || 0));
            }
            if (need && !tickTimer) tickTimer = setInterval(renderAll, 80);
            if (!need && tickTimer) {
                clearInterval(tickTimer);
                tickTimer = null;
            }
        }

        async function writeRoom(patch) {
            if (!roomRef) return;
            try {
                await setDoc(roomRef, Object.assign({ updatedAt: Date.now() }, patch), { merge: true });
            } catch (e) {
                showToast('저장에 실패했어요');
                console.warn(e);
            }
        }

        async function heartbeat() {
            if (!roomRef || !currentUser || !profileName) return;
            const entry = {
                uid: currentUser.uid,
                name: profileName,
                email: currentUser.email || '',
                photoURL: currentUser.photoURL || '',
                lastSeen: Date.now()
            };
            try {
                await updateDoc(roomRef, {
                    ['presence.' + currentUser.uid]: entry,
                    updatedAt: Date.now()
                });
            } catch (e) {
                await writeRoom({ presence: { [currentUser.uid]: entry } });
            }
        }

        async function loadProfile(user) {
            profileName = '';
            if (!user) return;
            try {
                const snap = await getDoc(doc(db, 'members', user.uid));
                const data = snap.exists() ? (snap.data() || {}) : {};
                profileName = MEMBERS.includes(data.name) ? data.name : '';
            } catch (e) {
                profileName = '';
            }
        }

        function showGate(show) {
            $('gate').classList.toggle('show', !!show);
        }

        function subscribeMembers() {
            if (membersUnsub) membersUnsub();
            membersUnsub = onSnapshot(collection(db, 'members'), snap => {
                const next = {};
                snap.forEach(d => { next[d.id] = Object.assign({ uid: d.id }, d.data() || {}); });
                memberDocs = next;
                renderAll();
            });
        }

        async function subscribeRoom() {
            if (roomUnsub) roomUnsub();
            roomRef = doc(db, 'game_rooms', ROOM_ID);
            const first = await getDoc(roomRef);
            if (!first.exists()) await setDoc(roomRef, DEFAULT_ROOM, { merge: true });
            roomUnsub = onSnapshot(roomRef, snap => {
                const previousRoundId = room.round && room.round.id;
                room = normalizeRoom(snap.exists() ? snap.data() : {});
                const nextRoundId = room.round && room.round.id;
                if (nextRoundId && nextRoundId !== previousRoundId) setupOpen = false;
                if (!nextRoundId) setupOpen = true;
                renderAll();
            }, err => {
                showToast('실시간 연결을 확인해 주세요');
                console.warn(err);
            });
        }

        async function init() {
            app = getOrInitializeApp(firebaseConfig, 'meetingApp');
            auth = getAuth(app);
            db = getFirestore(app);
            try { await setPersistence(auth, browserLocalPersistence); } catch (e) {}
            onAuthStateChanged(auth, async user => {
                currentUser = user ? {
                    uid: user.uid,
                    email: user.email || '',
                    displayName: user.displayName || '',
                    photoURL: user.photoURL || ''
                } : null;
                if (!currentUser) {
                    showGate(true);
                    renderAll();
                    return;
                }
                await loadProfile(currentUser);
                if (!profileName) {
                    showGate(true);
                    renderAll();
                    return;
                }
                showGate(false);
                subscribeMembers();
                await subscribeRoom();
                await heartbeat();
                clearInterval(beatTimer);
                beatTimer = setInterval(heartbeat, 15000);
            });
            document.addEventListener('visibilitychange', () => { if (!document.hidden) heartbeat(); });
            window.addEventListener('focus', heartbeat);
        }

        window.EnjoyGame = {
            toggleSetup: function (force) {
                setupOpen = typeof force === 'boolean' ? force : !setupOpen;
                $('setup-panel').classList.toggle('collapsed', !setupOpen);
                if (setupOpen) {
                    setTimeout(() => $('setup-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 20);
                }
            },
            openPresenceSheet: function () {
                $('presence-sheet').classList.add('show');
                renderPresence();
            },
            closePresenceSheet: function () {
                $('presence-sheet').classList.remove('show');
            },
            setMode: function (mode) {
                if (!MODES[mode]) return;
                room.mode = mode;
                room.round = null;
                setupOpen = true;
                renderAll();
                writeRoom({ mode, round: null });
            },
            toggleMember: function (name) {
                if (!MEMBERS.includes(name)) return;
                const current = (room.participants || MEMBERS).slice();
                let next = current.includes(name) ? current.filter(v => v !== name) : current.concat(name);
                if (next.length < 2) {
                    showToast('최소 2명은 필요해요');
                    next = current;
                }
                room.participants = next;
                room.penaltyCount = clampPenalty(room.penaltyCount, next.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: next, penaltyCount: room.penaltyCount, round: null });
            },
            selectAll: function () {
                room.participants = MEMBERS.slice();
                room.penaltyCount = clampPenalty(room.penaltyCount, room.participants.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: room.participants, penaltyCount: room.penaltyCount, round: null });
            },
            usePresentMembers: function () {
                const names = activePresence().map(v => v.name).filter((name, idx, arr) => MEMBERS.includes(name) && arr.indexOf(name) === idx);
                if (names.length < 2) {
                    showToast('입장 멤버가 2명 이상 필요해요');
                    return;
                }
                room.participants = names;
                room.penaltyCount = clampPenalty(room.penaltyCount, names.length);
                room.round = null;
                renderAll();
                writeRoom({ participants: names, penaltyCount: room.penaltyCount, round: null });
            },
            adjustPenalty: function (delta) {
                const next = clampPenalty((room.penaltyCount || 1) + delta, (room.participants || MEMBERS).length);
                room.penaltyCount = next;
                room.round = null;
                renderAll();
                writeRoom({ penaltyCount: next, round: null });
            },
            startRound: async function () {
                if (!currentUser || !profileName) {
                    showGate(true);
                    return;
                }
                const participants = (room.participants || MEMBERS).filter(name => MEMBERS.includes(name));
                if (participants.length < 2) {
                    showToast('최소 2명이 필요해요');
                    return;
                }
                const mode = room.mode || 'ladder';
                const seed = Date.now() + ':' + currentUser.uid + ':' + Math.random().toString(36).slice(2);
                const penaltyCount = clampPenalty(room.penaltyCount, participants.length);
                const round = makeRound(mode, participants, penaltyCount, seed);
                room.round = round;
                setupOpen = false;
                renderAll();
                await writeRoom({ mode, participants, penaltyCount, round });
            },
            mainAction: async function () {
                const done = room.round && (
                    (room.round.mode === 'wheel' && isWheelDone(room.round)) ||
                    (room.round.mode === 'dice' && !!diceWinner(room.round)) ||
                    ((room.round.mode === 'ladder' || room.round.mode === 'lots') && allActed(room.round))
                );
                if (!room.round || done) {
                    await window.EnjoyGame.startRound();
                    return;
                }
                if (room.round.mode === 'wheel') await window.EnjoyGame.spinWheel();
            },
            chooseLadder: async function (slot) {
                if (!canPlay() || room.round.mode !== 'ladder') return;
                const a = room.round.actions || {};
                if (Object.values(a).some(item => item.slot === slot)) return;
                const finalLane = traceLadder(slot, room.round.ladder);
                const result = (room.round.ladder.labels || [])[finalLane] || '통과';
                await window.EnjoyGame.saveAction({
                    slot,
                    finalLane,
                    result,
                    at: Date.now()
                }, 'slot');
            },
            chooseLot: async function (item) {
                if (!canPlay() || room.round.mode !== 'lots') return;
                const a = room.round.actions || {};
                if (Object.values(a).some(v => v.item === item)) return;
                const result = (room.round.lotLabels || [])[item] || '통과';
                await window.EnjoyGame.saveAction({
                    item,
                    result,
                    at: Date.now()
                }, 'item');
            },
            spinWheel: async function () {
                if (!room.round || room.round.mode !== 'wheel' || isWheelSpinning(room.round) || isWheelDone(room.round)) return;
                const n = room.round.participants.length;
                const seg = 360 / n;
                const winnerIndex = room.round.wheel.winnerIndex;
                const target = 360 - (winnerIndex * seg + seg / 2) + (room.round.wheel.offset || 0);
                const startedAt = Date.now();
                const spin = {
                    startedAt,
                    endAt: startedAt + WHEEL_DURATION,
                    totalRotation: (room.round.wheel.turns * 360) + target,
                    startedBy: profileName,
                    startedByUid: currentUser.uid
                };
                try {
                    const roundId = room.round.id;
                    await runTransaction(db, async transaction => {
                        const snap = await transaction.get(roomRef);
                        const remote = snap.exists() ? snap.data() : {};
                        if (!remote.round || remote.round.id !== roundId || remote.round.spin) {
                            throw new Error('SPIN_TAKEN');
                        }
                        transaction.update(roomRef, { 'round.spin': spin, updatedAt: Date.now() });
                    });
                    if (room.round && room.round.id === roundId) {
                        room.round.spin = spin;
                        renderAll();
                    }
                } catch (e) {
                    if (e && e.message !== 'SPIN_TAKEN') showToast('룰렛 저장에 실패했어요');
                }
            },
            rollDice: async function () {
                if (!canPlay() || room.round.mode !== 'dice') return;
                const rand = rng(room.round.seed + ':' + profileName + ':' + Date.now());
                const value = 1 + Math.floor(rand() * 6);
                await window.EnjoyGame.saveAction({
                    value,
                    tie: rand(),
                    at: Date.now(),
                    revealAt: Date.now() + DICE_DURATION
                });
            },
            saveAction: async function (action, claimField) {
                if (!room.round || !currentUser || !profileName) return;
                const roundId = room.round.id;
                const saved = Object.assign({
                    uid: currentUser.uid,
                    name: profileName
                }, action);
                try {
                    await runTransaction(db, async transaction => {
                        const snap = await transaction.get(roomRef);
                        const remote = snap.exists() ? snap.data() : {};
                        const remoteRound = remote.round;
                        if (!remoteRound || remoteRound.id !== roundId) throw new Error('ROUND_CHANGED');
                        if (!(remoteRound.participants || []).includes(profileName)) throw new Error('NOT_PARTICIPANT');
                        const remoteActions = remoteRound.actions || {};
                        if (remoteActions[profileName]) throw new Error('ALREADY_ACTED');
                        if (claimField && Object.values(remoteActions).some(item => item[claimField] === action[claimField])) {
                            throw new Error('CHOICE_TAKEN');
                        }
                        transaction.update(roomRef, {
                            ['round.actions.' + profileName]: saved,
                            updatedAt: Date.now()
                        });
                    });
                    if (room.round && room.round.id === roundId) {
                        if (!room.round.actions) room.round.actions = {};
                        room.round.actions[profileName] = saved;
                        renderAll();
                    }
                } catch (e) {
                    if (e && e.message === 'CHOICE_TAKEN') showToast('방금 다른 멤버가 먼저 골랐어요');
                    else if (e && e.message === 'ALREADY_ACTED') showToast('이미 참여를 완료했어요');
                    else if (e && e.message === 'ROUND_CHANGED') showToast('새 판이 시작됐어요');
                    else {
                        showToast('참여 저장에 실패했어요');
                        console.warn(e);
                    }
                }
            }
        };

        renderAll();
        init();
    </script>
</body>
</html>
