<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="color-scheme" content="light dark">
    <meta name="referrer" content="no-referrer">
    <title>KBO 경기 정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
