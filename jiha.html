<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>대경선 지하철 현황 실시간 트래커</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 폰트 및 아이콘 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =======================================================
           디자인 시스템 리뉴얼 — 강한 글래스 + 단색 + 미니멀
           (그라데이션 미사용 / JS가 참조하는 ID·클래스는 모두 보존)
           ======================================================= */
        :root {
            --ink: #0B1220;          /* 강한 본문 텍스트 */
            --ink-soft: #5B6573;     /* 보조 텍스트 */
            --surface: #EBEFF5;      /* 앱 바깥 바탕 (단색) */
            --panel: #F6F8FC;        /* 앱 패널 바탕 (단색) */
            --glass: rgba(255,255,255,0.62);
            --glass-strong: rgba(255,255,255,0.78);
            --line: rgba(15,23,42,0.06);
            --line-2: rgba(15,23,42,0.10);
            --shadow-card: 0 10px 30px -10px rgba(15,23,42,0.18), 0 2px 6px rgba(15,23,42,0.06);
            --shadow-soft: 0 6px 18px -8px rgba(15,23,42,0.14);
        }

        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "sans-serif";
            overscroll-behavior-y: none;
            touch-action: pan-y;
            background-color: var(--surface);
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        /* 앱 패널: 흰색 → 부드러운 단색 패널 (JS가 노선색으로 미세 틴트) */
        #app { background-color: var(--panel); }

        /* 홈/스크롤 화면 바탕도 패널색으로 통일 */
        #home-screen, #scroll-container { background-color: var(--panel) !important; }

        /* 헤더 글래스 강화 */
        #home-screen > header,
        #main-header {
            background-color: rgba(246,248,252,0.72) !important;
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--line);
        }

        /* 유리 재질 공통 카드 */
        .toss-card {
            background: var(--glass-strong);
            backdrop-filter: blur(22px) saturate(190%);
            -webkit-backdrop-filter: blur(22px) saturate(190%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 26px;
            box-shadow: var(--shadow-card);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
        }

        /* 리스트/정보 카드: 반투명 글래스 타일 */
        .list-card {
            background: var(--glass);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 22px;
            box-shadow: var(--shadow-soft);
            transition: transform 0.12s ease, box-shadow 0.2s ease;
        }
        .list-card:active {
            transform: scale(0.975);
            box-shadow: 0 3px 10px -6px rgba(15,23,42,0.16);
        }

        /* 하단 네비게이션 인디케이터 */
        #nav-indicator { will-change: transform, width; }
        .nav-transition { transition: transform 0.34s cubic-bezier(0.2, 0.9, 0.2, 1), width 0.34s cubic-bezier(0.2, 0.9, 0.2, 1); }

        /* 하단 네비 글래스 강화 */
        #bottom-nav > div {
            background-color: rgba(255,255,255,0.7) !important;
            backdrop-filter: blur(22px) saturate(190%);
            -webkit-backdrop-filter: blur(22px) saturate(190%);
            border: 1px solid rgba(255,255,255,0.65) !important;
            box-shadow: 0 12px 34px -10px rgba(15,23,42,0.28) !important;
        }

        /* 커스텀 스크롤바 숨김 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .text-main { color: var(--ink); }
        .text-sub { color: var(--ink-soft); }
        .pt-safe { padding-top: max(20px, env(safe-area-inset-top)); }

        /* 모달 시트 글래스 처리 */
        #timetable-modal > div,
        #station-selector-modal > div {
            background-color: rgba(246,248,252,0.92) !important;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
        }

        /* 애니메이션 설정 */
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
        .animate-ping { animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes pulse { 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-25%) translateX(-50%); animation-timing-function: cubic-bezier(0.8,0,1,1); }
            50% { transform: none translateX(-50%); animation-timing-function: cubic-bezier(0,0,0.2,1); }
        }
        .animate-bounce { animation: bounce 1s infinite; }

        @keyframes slide-in-from-bottom { 0% { transform: translateY(100%); } 100% { transform: translateY(0); } }
        .animate-in { animation: slide-in-from-bottom 0.34s cubic-bezier(0.2,0.9,0.2,1) forwards; }

        /* 역명판: 더 단단하고 프리미엄한 단색 캡슐 */
        .station-plate-base {
            height: 40px;
            background-color: #0054A6;
            border-radius: 9999px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 18px;
            box-shadow: 0 14px 30px -10px rgba(0,84,166,0.45), inset 0 1px 0 rgba(255,255,255,0.18);
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .station-plate-pill {
            background-color: #ffffff;
            height: 56px;
            padding: 0 26px;
            border-radius: 9999px;
            border: 3px solid #0054A6;
            display: flex;
            align-items: center;
            gap: 9px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 24px -10px rgba(15,23,42,0.30), 0 0 0 4px rgba(255,255,255,0.7);
            transition: border-color 0.3s;
        }
        .metro-logo-circle {
            width: 28px;
            height: 28px;
            background-color: #0054A6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 900;
            box-shadow: 0 3px 8px -2px rgba(15,23,42,0.30);
            transition: background-color 0.3s;
        }

        /* 섹션 제목 앞 노선색 액센트 바 */
        .sect-title {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .sect-title::before {
            content: "";
            width: 4px;
            height: 17px;
            border-radius: 4px;
            background-color: var(--theme, #0054A6);
            transition: background-color 0.3s;
        }

        /* 홈 상단 노선색 히어로 밴드 (단색) */
        #hero-band {
            background-color: #0054A6;
            transition: background-color 0.3s;
        }

        /* 위치 버튼 펄스 */
        @keyframes loc-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .loc-loading i { animation: loc-pulse 0.7s ease-in-out infinite; }

        /* 정차역 점등 링 */
        @keyframes station-ring { 0% { transform: scale(0.6); opacity: 0.55; } 100% { transform: scale(2.2); opacity: 0; } }
        .station-ring { transform-box: fill-box; transform-origin: center; animation: station-ring 1.4s ease-out infinite; }

        /* 전동열차 잔상(모션 트레일) */
        @keyframes trail-fade { 0% { opacity: 0.45; } 100% { opacity: 0.12; } }
        .train-trail { animation: trail-fade 0.8s ease-in-out infinite alternate; }

        /* 수도권 지원 예정 팝업 */
        #capital-modal .capital-card {
            background: rgba(255,255,255,0.96);
            border: 1px solid rgba(255,255,255,0.82);
            box-shadow: 0 28px 70px -24px rgba(15,23,42,0.42), 0 8px 24px -12px rgba(37,99,235,0.28);
        }
        .capital-route-line {
            height: 5px;
            border-radius: 9999px;
            background-color: #2563EB;
            box-shadow: 0 8px 18px -8px rgba(37,99,235,0.75);
        }
        .capital-route-dot {
            width: 15px;
            height: 15px;
            border: 4px solid #2563EB;
            border-radius: 9999px;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(219,234,254,0.9);
        }
    </style>
</head>
<body class="w-full h-[100dvh] flex justify-center items-center overflow-hidden">

    <!-- 스마트폰 형태의 메인 래퍼 -->
    <div id="app" class="w-full h-full max-w-[430px] bg-white relative flex flex-col overflow-hidden sm:border-x border-black/5 sm:shadow-2xl">
        
        <!-- 1. 홈 화면 -->
        <main id="home-screen" class="hidden absolute inset-0 z-[25] bg-white flex-col overflow-y-auto hide-scrollbar pb-24">
            <header class="flex-none pt-safe bg-white/90 backdrop-blur-md z-40 sticky top-0">
                <div class="px-5 pt-1 pb-2 flex justify-between items-center">
                    <h2 class="sect-title text-[20px] font-extrabold text-[#0B1220] tracking-tight">대구권 대경선 지하철역</h2>
                    <div class="flex items-center gap-2">
                        <!-- 내 위치에서 가까운 역 찾기 -->
                        <button id="locate-btn" onclick="findNearestStation()" class="w-9 h-9 flex items-center justify-center bg-white/70 border border-white/60 shadow-sm backdrop-blur rounded-full text-gray-500 hover:text-[#0054A6] active:scale-95 transition-all" aria-label="현재 위치에서 가장 가까운 역 찾기">
                            <i id="locate-icon" class="fa-solid fa-location-crosshairs text-[15px]"></i>
                        </button>
                        <!-- 즐겨찾기 버튼 -->
                        <button id="favorite-toggle-btn" onclick="toggleFavorite()" class="relative w-9 h-9 flex items-center justify-center bg-white/70 border border-white/60 shadow-sm backdrop-blur rounded-full text-gray-400 hover:text-yellow-400 active:scale-95 transition-all" aria-label="현재 역 즐겨찾기 전환">
                            <i id="favorite-icon" class="fa-regular fa-star text-[15px]"></i>
                            <span id="favorite-count-badge" class="hidden absolute -right-1 -top-1 min-w-[17px] h-[17px] px-1 items-center justify-center rounded-full bg-amber-400 text-[9px] font-black text-white border-2 border-white shadow-sm">0</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="px-5 pt-3 space-y-6">
                <div>
                    <!-- 지역 선택 탭 -->
                    <div class="flex gap-1.5 overflow-x-auto hide-scrollbar mb-2 pb-1">
                        <button id="btn-region-seoul" onclick="showCapitalPopup()" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all" aria-haspopup="dialog" aria-controls="capital-modal">수도권</button>
                        <button id="btn-region-busan" onclick="switchRegion('busan')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">부산권</button>
                        <button id="btn-region-daegu" onclick="switchRegion('daegu')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-[#0054A6] text-white shadow-[0_2px_8px_rgba(0,84,166,0.3)] shrink-0 border border-[#0054A6] transition-all">대구권</button>
                        <button id="btn-region-daejeon" onclick="switchRegion('daejeon')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">대전</button>
                        <button id="btn-region-gwangju" onclick="switchRegion('gwangju')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">광주</button>
                    </div>

                    <!-- 노선 선택 탭 -->
                    <div id="line-tabs-daegu" class="flex gap-1.5 overflow-x-auto hide-scrollbar mb-4 pb-1">
                        <button id="btn-line-daegyeong" onclick="switchLine('daegyeong')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-[#0054A6] text-white shadow-[0_2px_8px_rgba(0,84,166,0.3)] shrink-0 border border-[#0054A6] transition-all">대경선</button>
                        <button id="btn-line-1" onclick="switchLine('line1')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">1호선</button>
                        <button id="btn-line-2" onclick="switchLine('line2')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">2호선</button>
                        <button id="btn-line-3" onclick="switchLine('line3')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">3호선</button>
                    </div>
                    <div id="line-tabs-daejeon" class="hidden gap-1.5 overflow-x-auto hide-scrollbar mb-4 pb-1">
                        <button id="btn-line-daejeon1" onclick="switchLine('daejeon_line1')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-[#007448] text-white shadow-[0_2px_8px_rgba(0,116,72,0.3)] shrink-0 border border-[#007448] transition-all">1호선</button>
                    </div>
                    <div id="line-tabs-busan" class="hidden gap-1.5 overflow-x-auto hide-scrollbar mb-4 pb-1">
                        <button id="btn-line-busan1" onclick="switchLine('busan_line1')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-[#F06A00] text-white shadow-[0_2px_8px_rgba(240,106,0,0.3)] shrink-0 border border-[#F06A00] transition-all">1호선</button>
                        <button id="btn-line-busan2" onclick="switchLine('busan_line2')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">2호선</button>
                        <button id="btn-line-busan3" onclick="switchLine('busan_line3')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">3호선</button>
                        <button id="btn-line-busan4" onclick="switchLine('busan_line4')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">4호선</button>
                        <button id="btn-line-bglrt" onclick="switchLine('busan_bglrt')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">부산김해</button>
                        <button id="btn-line-donghae" onclick="switchLine('busan_donghae')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-500 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">동해선</button>
                        <button onclick="showPreparingPopup('양산선')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-gray-100 text-gray-400 shrink-0 border border-black/5 cursor-pointer hover:bg-gray-200 transition-all">양산선</button>
                    </div>
                    <div id="line-tabs-gwangju" class="hidden gap-1.5 overflow-x-auto hide-scrollbar mb-4 pb-1">
                        <button id="btn-line-gwangju1" onclick="switchLine('gwangju_line1')" class="px-3 py-1 rounded-full text-[11px] font-bold bg-[#009088] text-white shadow-[0_2px_8px_rgba(0,144,136,0.3)] shrink-0 border border-[#009088] transition-all">1호선</button>
                    </div>

                    <!-- 여러 역 즐겨찾기 바로가기 -->
                    <div id="favorite-shortcuts-container" class="hidden mb-4 rounded-[18px] border border-amber-100 bg-amber-50/80 p-3 shadow-sm">
                        <div class="mb-2 flex items-center justify-between px-0.5">
                            <div class="flex items-center gap-1.5 text-[11px] font-extrabold text-amber-800">
                                <i class="fa-solid fa-star text-[10px] text-amber-400"></i> 즐겨찾기
                            </div>
                            <span class="text-[9px] font-semibold text-amber-700/70">마지막 선택 역이 위치 실패 시 기본값</span>
                        </div>
                        <div id="favorite-shortcuts" class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-0.5"></div>
                    </div>

                    <!-- 코레일 스타일 역명판 -->
                    <div onclick="openStationSelector()" class="relative w-full flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
                        <div class="station-plate-base w-full">
                            <div class="flex-1 text-left pl-2 pr-8 sm:pr-12 overflow-hidden">
                                <div id="home-prev-station-container" class="opacity-0 transition-opacity">
                                    <span id="home-prev-station" class="text-white text-[14px] font-bold tracking-tight block truncate"></span>
                                </div>
                            </div>
                            <div class="flex-1 text-right pr-2 pl-8 sm:pl-12 overflow-hidden">
                                <div id="home-next-station-container" class="opacity-100 transition-opacity">
                                    <span id="home-next-station" class="text-white text-[14px] font-bold tracking-tight block truncate">사곡 &gt;</span>
                                </div>
                            </div>
                        </div>
                        <div class="station-plate-pill">
                            <div class="metro-logo-circle shrink-0">대</div>
                            <span id="home-station-name" class="text-lg font-black text-black whitespace-nowrap">구미</span>
                        </div>
                    </div>

                    <!-- 환승 정보 섹션 -->
                    <div id="home-transfer-container" class="hidden mt-4 flex-col gap-1.5 px-1">
                        <span class="text-[12px] font-bold text-gray-500">환승 정보</span>
                        <div id="home-transfer-list" class="flex flex-wrap gap-2 items-center"></div>
                    </div>
                </div>

                <!-- 도착 정보 섹션 -->
                <div class="flex flex-col gap-3.5">
                    <div class="flex justify-between items-end mb-1 px-1">
                        <h3 class="sect-title text-[19px] font-extrabold text-[#0B1220] tracking-tight">도착 정보</h3>
                        <div class="flex items-center gap-2">
                            <span id="data-status-home" class="hidden text-[10px] font-bold text-amber-700 bg-amber-50 px-2 py-1 rounded-full border border-amber-200">시간표 없음</span>
                            <span id="home-current-time" class="text-xs font-bold text-gray-600 bg-white/70 border border-white/60 backdrop-blur px-2.5 py-1 rounded-full shadow-sm">오후 5:35</span>
                            <button onclick="renderHomeArrivalInfo()" class="w-7 h-7 flex items-center justify-center bg-white/70 border border-white/60 shadow-sm backdrop-blur rounded-full text-gray-500 hover:text-black active:scale-95 transition-all"><i class="fa-solid fa-rotate-right text-[11px]"></i></button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2.5">
                        <div class="list-card p-3.5 flex flex-col min-h-[110px] relative overflow-hidden text-center">
                            <span id="home-up-dir-label" class="text-[12px] font-bold text-gray-500 mb-2.5">구미 방면</span>
                            <div id="home-up-info" class="flex-1 flex flex-col justify-center items-center gap-1.5"></div>
                        </div>
                        <div class="list-card p-3.5 flex flex-col min-h-[110px] relative overflow-hidden text-center">
                            <span id="home-down-dir-label" class="text-[12px] font-bold text-gray-500 mb-2.5">경산 방면</span>
                            <div id="home-down-info" class="flex-1 flex flex-col justify-center gap-1.5"></div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2.5 mt-2">
                        <button onclick="openHomeTimetable('all')" class="list-card py-3.5 flex items-center justify-center gap-1.5 active:scale-[0.98] transition-all">
                            <i id="btn-icon-1" class="fa-regular fa-clock text-[#0054A6] text-[15px]"></i>
                            <span class="text-[12px] font-bold text-[#111827]">전체 시간표 <i class="fa-solid fa-chevron-down text-[8px] ml-0.5 text-gray-400"></i></span>
                        </button>
                        <button onclick="openHomeTimetable('firstLast')" class="list-card py-3.5 flex items-center justify-center gap-1.5 active:scale-[0.98] transition-all">
                            <i id="btn-icon-2" class="fa-solid fa-train-tram text-[#0054A6] text-[15px]"></i>
                            <span class="text-[12px] font-bold text-[#111827]">첫차·막차 <i class="fa-solid fa-chevron-down text-[8px] ml-0.5 text-gray-400"></i></span>
                        </button>
                    </div>
                </div>

        const getDayType = (dateObj) => {
            const day = dateObj.getDay();
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const ymd = `${yyyy}-${mm}-${dd}`;
            if (KOR_HOLIDAYS.includes(ymd)) return 'holiday';
            if (day === 0) return 'holiday';
            if (day === 6) return 'saturday';
            return 'weekday';
        };

        const timeToSeconds = (timeStr) => {
            if (!timeStr) return 0;
            let parts = timeStr.split(':').map(Number);
            let h = parts[0] || 0, m = parts[1] || 0, s = parts[2] || 0;
            if (h < 4) h += 24; 
            return h * 3600 + m * 60 + s;
        };

        const secondsToTime = (totalSeconds) => {
            const h = Math.floor(totalSeconds / 3600) % 24; 
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = Math.floor(totalSeconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        const formatAmPm = (sec) => {
            let h = Math.floor(sec / 3600) % 24;
            let m = Math.floor((sec % 3600) / 60);
            const ampm = h >= 12 ? '오후' : '오전';
            h = h % 12 || 12;
            return `${ampm} ${h}:${m.toString().padStart(2, '0')}`;

                script.dataset.timetableLine = lineId;
                script.onload = () => {
                    const source = window[config.globalName] || null;
                    if (!source) stationTimetableLoadPromises.delete(lineId);
                    resolve(source);
                };
                script.onerror = () => {
                    stationTimetableLoadPromises.delete(lineId);
                    script.remove();
                    resolve(null);
                };
                document.head.appendChild(script);
            });

            stationTimetableLoadPromises.set(lineId, loadPromise);
            return loadPromise;
        };

        const parseStationTimetable = (source, cacheNamespace, dayType, direction) => {
            if (!source || !Array.isArray(source.stations) || !source.calendars?.[dayType]) return [];
            if (direction !== 'up' && direction !== 'down') return [];

            const cacheKey = `${cacheNamespace}:${dayType}:${direction}`;
            if (stationTimetableCache.has(cacheKey)) return stationTimetableCache.get(cacheKey);

            const aliases = STATION_TIMETABLE_ALIASES[cacheNamespace] || {};
            const normalizeStationName = (name) => aliases[name] || name;
            const stationOrder = source.stations.map(station => normalizeStationName(station.name));
            const stationIndex = new Map(stationOrder.map((name, index) => [name, index]));
            const pairKey = (first, second) => {
                const firstIndex = stationIndex.get(first);
                const secondIndex = stationIndex.get(second);
                if (firstIndex === undefined || secondIndex === undefined) return '';
                return firstIndex < secondIndex ? `${first}|${second}` : `${second}|${first}`;
            };

            // 원본 API가 종착역 도착 행을 방향 배열에서 생략하므로,
            // 양방향의 실제 인접역 운행시간 중앙값을 종착 시각 보완에 사용한다.
            const segmentSamples = new Map();
            ['up', 'down'].forEach(sampleDirection => {
                const sampleTrains = new Map();
                source.stations.forEach(station => {
                    const rows = station.timetable?.[dayType]?.[sampleDirection] || [];
                    rows.forEach(row => {
                        const time = row.departureTime || row.time || row.arrivalTime;
                        if (!row.trainNo || !time) return;
                        if (!sampleTrains.has(row.trainNo)) sampleTrains.set(row.trainNo, []);
                        sampleTrains.get(row.trainNo).push({ name: normalizeStationName(station.name), sec: timeToSeconds(time) });
                    });
                });

                sampleTrains.forEach(schedule => {
                    schedule.sort((a, b) => a.sec - b.sec);
                    for (let index = 1; index < schedule.length; index++) {
                        const previous = schedule[index - 1];
                        const current = schedule[index];
                        if (Math.abs(stationIndex.get(previous.name) - stationIndex.get(current.name)) !== 1) continue;
                        const duration = current.sec - previous.sec;
                        if (duration <= 0 || duration > 3600) continue;
                        const key = pairKey(previous.name, current.name);
                        if (!segmentSamples.has(key)) segmentSamples.set(key, []);
                        segmentSamples.get(key).push(duration);
                    }
                });
            });

            const segmentDurations = new Map();
            segmentSamples.forEach((samples, key) => {
                samples.sort((a, b) => a - b);
                segmentDurations.set(key, samples[Math.floor(samples.length / 2)]);
            });

            const groupedTrains = new Map();
            source.stations.forEach(station => {
                const stationName = normalizeStationName(station.name);
                const stationMeta = STATIONS[stationName];
                if (!stationMeta) return;
                const rows = station.timetable?.[dayType]?.[direction] || [];
                rows.forEach(row => {
                    const time = row.departureTime || row.time || row.arrivalTime;
                    if (!row.trainNo || !time) return;
                    const groupKey = `${row.trainNo}:${row.startStationId || row.startStation}:${row.destinationId || row.destination}`;
                    if (!groupedTrains.has(groupKey)) {
                        groupedTrains.set(groupKey, {
                            id: String(row.trainNo),
                            startStation: normalizeStationName(row.startStation),
                            destination: normalizeStationName(row.destination),
                            schedule: []
                        });
                    }
                    const train = groupedTrains.get(groupKey);
                    if (!train.schedule.some(stop => stop.name === stationName)) {
                        train.schedule.push({
                            name: stationName,
                            time,
                            sec: timeToSeconds(time),
                            progress: stationMeta.progress
                        });
                    }
                });
            });

            const trains = Array.from(groupedTrains.values()).map(train => {
                train.schedule.sort((a, b) => a.sec - b.sec);

                const addEndpoint = (stationName, isStart) => {
                    if (!stationName || !STATIONS[stationName] || train.schedule.some(stop => stop.name === stationName)) return;
                    const edgeStop = isStart ? train.schedule[0] : train.schedule[train.schedule.length - 1];
                    if (!edgeStop || Math.abs(stationIndex.get(edgeStop.name) - stationIndex.get(stationName)) !== 1) return;
                    const duration = segmentDurations.get(pairKey(edgeStop.name, stationName)) || 600;
                    const sec = edgeStop.sec + (isStart ? -duration : duration);
                    train.schedule.push({
                        name: stationName,
                        time: secondsToTime(sec),
                        sec,
                        progress: STATIONS[stationName].progress,
                        estimatedTerminalTime: true
                    });
                };

                addEndpoint(train.startStation, true);
                addEndpoint(train.destination, false);
                train.schedule.sort((a, b) => a.sec - b.sec);
                return { id: train.id, schedule: train.schedule };
            }).filter(train => train.schedule.length >= 2)
              .sort((a, b) => a.schedule[0].sec - b.schedule[0].sec);

            stationTimetableCache.set(cacheKey, trains);
            return trains;
        };

        const safeFetch = async (urls) => {
            if (!Array.isArray(urls)) urls = [urls];
            for (let url of urls) {
                try {
                    const response = await fetch(url);
                    if (response.ok) {
                        const buffer = await response.arrayBuffer();
                        let text = new TextDecoder('utf-8').decode(buffer);
                        if (text.includes('\uFFFD')) {
                            text = new TextDecoder('euc-kr').decode(buffer);
                        }
                        if (!text.trim().startsWith('<')) {
                            return text;
                        }
                    }
                } catch (err) { }
            }
            return "";
        };

        const parseCsv = (csvStr, expectedDir, targetDayType) => {
            if (!csvStr) return [];
            const lines = csvStr.trim().split(/\r?\n/);
            if (lines.length === 0) return [];
            
            const splitCsvRow = (rowStr) => {
                let row = [];
                let inQuotes = false;
                let val = "";
                for(let i=0; i<rowStr.length; i++) {
                    let char = rowStr[i];
                    if(char === '"') {
                        inQuotes = !inQuotes;
                    } else if(char === ',' && !inQuotes) {
                        row.push(val.trim());
                        val = "";
                    } else {
                        val += char;
                    }
                }
                row.push(val.trim());
                return row.map(v => v.replace(/^"|"$/g, '').trim());
            };

            const headers = splitCsvRow(lines[0]);

            // 대구 2호선 포맷 감지
            if (headers.length >= 3 && headers[0].includes('요일별') && headers[1].includes('역명') && headers[2].includes('구분')) {
                const trains = [];
                let dayFilter = [];
                if (targetDayType === 'weekday') dayFilter = ['평일'];
                else if (targetDayType === 'saturday') dayFilter = ['토요일'];
                else if (targetDayType === 'holiday') dayFilter = ['일요일', '휴일', '명절'];
                
                const trainIds = headers.slice(3);
                const trainsMap = {};
                trainIds.forEach(id => { if (id) trainsMap[id] = { id: id.trim(), scheduleMap: {} }; });

                for (let i = 1; i < lines.length; i++) {
                    const row = splitCsvRow(lines[i]);
                    if (row.length <= 2) continue;
                    
                    const dayStr = row[0] || '';
                    let stName = row[1] ? row[1].trim() : '';
                    const gubun = row[2] ? row[2].trim() : '';
                    
                    if (!dayFilter.some(d => dayStr.includes(d))) continue;
                    
                    // 예외처리: 혹시 역명에 불필요한 기호나 공백이 있을 경우 대비
                    stName = stName.replace(/\([^)]*\)/g, '').trim();

                    for (let j = 3; j < row.length; j++) {
                        const timeStr = row[j] ? row[j].trim() : '';
                        const trainId = trainIds[j - 3];
                        if (!timeStr || !trainId || !trainsMap[trainId]) continue;
                        
                        if (!trainsMap[trainId].scheduleMap[stName]) {
                            trainsMap[trainId].scheduleMap[stName] = { arr: null, dep: null };
                        }
                        
                        if (gubun === '도착') {
                            trainsMap[trainId].scheduleMap[stName].arr = timeStr;
                        } else if (gubun === '출발') {
                            trainsMap[trainId].scheduleMap[stName].dep = timeStr;
                        } else {
                            if (!trainsMap[trainId].scheduleMap[stName].arr) {
                                trainsMap[trainId].scheduleMap[stName].arr = timeStr;
                            }
                        }
                    }
                }
                
                for (const trainId in trainsMap) {
                    const tData = trainsMap[trainId];
                    const schedule = [];
                    for (const stName in tData.scheduleMap) {
                        if (!STATIONS[stName]) continue;
                        const times = tData.scheduleMap[stName];
                        let selectedTime = times.arr || times.dep; // 도착시간 우선
                        if (selectedTime) {
                            if (selectedTime.split(':').length === 2) selectedTime += ':00';
                            schedule.push({
                                name: stName,
                                time: selectedTime,
                                sec: timeToSeconds(selectedTime),
                                progress: STATIONS[stName].progress
                            });
                        }
                    }
                    if (schedule.length >= 2) {
                        schedule.sort((a, b) => a.sec - b.sec);
                        
                        const firstProg = schedule[0].progress;
                        const lastProg = schedule[schedule.length - 1].progress;
                        const isUp = lastProg < firstProg; 
                        
                        if (expectedDir === 'up' && !isUp) continue;
                        if (expectedDir === 'down' && isUp) continue;

                        trains.push({ id: tData.id, schedule: schedule });
                    }
                }
                return trains.sort((a, b) => a.schedule[0].sec - b.schedule[0].sec);
            }

            if (headers[0].includes('요일') && headers.includes('역사코드') && headers.includes('방향(상_하행)')) {
                const trains = [];
                let dayFilter = [];
                if (targetDayType === 'weekday') dayFilter = ['평일'];
                else if (targetDayType === 'saturday') dayFilter = ['토요일'];
                else if (targetDayType === 'holiday') dayFilter = ['휴일', '명절', '일요일']; 
                
                let targetDir = expectedDir === 'up' ? '2' : '1'; 
                
                const timeMap = {}; 
                const stCodeIdx = headers.indexOf('역사코드');
                const timeIdx = headers.indexOf('도착시간');
                const dayIdx = headers.indexOf('요일');
                const dirIdx = headers.indexOf('방향(상_하행)');
                
                for(let i=1; i<lines.length; i++) {
                    const row = splitCsvRow(lines[i]);
                    if(row.length <= stCodeIdx) continue;
                    
                    const day = row[dayIdx];
                    const dir = row[dirIdx];
                    const timeStr = row[timeIdx];
                    const stCode = row[stCodeIdx];
                    
                    if (!dayFilter.some(d => day && day.includes(d))) continue;
                    if (dir !== targetDir) continue;
                    
                    const sec = timeToSeconds(timeStr);
                    if (!timeMap[stCode]) timeMap[stCode] = [];
                    timeMap[stCode].push({ sec, time: timeStr, used: false });
                }
                
                for (const key in timeMap) {
                    timeMap[key].sort((a,b) => a.sec - b.sec);
                }
                
                const stCodes = [];
                if (expectedDir === 'up') {
                    for(let i=119; i>=100; i--) stCodes.push(i.toString());
                } else {
                    for(let i=100; i<=119; i++) stCodes.push(i.toString());
                }
                
                const GWANGJU_STATIONS = {
                    "100": "녹동", "101": "소태", "102": "학동 중심사입구", "103": "남광주",
                    "104": "문화전당", "105": "금남로4가", "106": "금남로5가", "107": "양동시장",
                    "108": "돌고개", "109": "농성", "110": "화정", "111": "쌍촌",
                    "112": "운천", "113": "상무", "114": "김대중컨벤션센터", "115": "공항",
                    "116": "송정공원", "117": "광주송정역", "118": "도산", "119": "평동"
                };

                const unnumberedTrains = [];
                for (let c = 0; c < stCodes.length; c++) {
                    const code = stCodes[c];
                    if(!timeMap[code]) continue;
                    
                    for (let t = 0; t < timeMap[code].length; t++) {
                        const startEvent = timeMap[code][t];
                        if (startEvent.used) continue;
                        
                        const schedule = [];
                        const stName = GWANGJU_STATIONS[code];
                        if(stName && STATIONS[stName]) {
                            schedule.push({ name: stName, time: startEvent.time, sec: startEvent.sec, progress: STATIONS[stName].progress });
                            startEvent.used = true;
                            
                            let currentSec = startEvent.sec;
                            for (let nextC = c + 1; nextC < stCodes.length; nextC++) {
                                const nCode = stCodes[nextC];
                                if(!timeMap[nCode]) continue;
                                
                                let foundEvent = null;
                                for (let nt = 0; nt < timeMap[nCode].length; nt++) {
                                    const ne = timeMap[nCode][nt];
                                    if (!ne.used && ne.sec > currentSec && ne.sec - currentSec <= 1200) { 
                                        foundEvent = ne;
                                        break;
                                    }
                                }
                                
                                if (foundEvent) {
                                    const nStName = GWANGJU_STATIONS[nCode];
                                    if(nStName && STATIONS[nStName]) {
                                        schedule.push({ name: nStName, time: foundEvent.time, sec: foundEvent.sec, progress: STATIONS[nStName].progress });
                                        foundEvent.used = true;
                                        currentSec = foundEvent.sec;
                                    }
                                } else {
                                    break;
                                }
                            }
                            
                            if (schedule.length >= 2) {
                                unnumberedTrains.push({ schedule });
                            }
                        }
                    }
                }
                
                unnumberedTrains.sort((a, b) => a.schedule[0].sec - b.schedule[0].sec);
                let trainIdx = expectedDir === 'up' ? 1 : 2;
                
                for (let i = 0; i < unnumberedTrains.length; i++) {
                    trains.push({ id: `#${trainIdx}`, schedule: unnumberedTrains[i].schedule });
                    trainIdx += 2;
                }
                
                return trains;
            }

            if (headers[0].includes('열차번호') && headers.findIndex(h => h.includes('운행구간정거장')) !== -1) {
                const trains = [];
                const stIdx = headers.findIndex(h => h.includes('운행구간정거장'));
                const arrIdx = headers.findIndex(h => h.includes('정거장도착시각'));
                const depIdx = headers.findIndex(h => h.includes('정거장출발시각'));
                const lineNameIdx = headers.findIndex(h => h.includes('노선명'));
                const dayTypeIdx = headers.findIndex(h => h.includes('요일구분'));
                
                const dayMap = { 'weekday': ['평일'], 'saturday': ['토요일', '주말'], 'holiday': ['일요일', '공휴일', '휴일', '주말'] };
                const expectedDays = dayMap[targetDayType] || [];
                
                for (let i = 1; i < lines.length; i++) {
                    const row = splitCsvRow(lines[i]);
                    if (row.length <= stIdx) continue;
                    
                    if (lineNameIdx !== -1 && currentLineId === 'busan_line1') {
                        const rowLine = row[lineNameIdx] || '';
                        if (!rowLine.includes('1호선')) continue;
                    }

                    if (lineNameIdx !== -1 && currentLineId === 'busan_line2') {
                        const rowLine = row[lineNameIdx] || '';
                        if (!rowLine.includes('2호선')) continue;
                    }

                    if (lineNameIdx !== -1 && currentLineId === 'busan_line3') {
                        const rowLine = row[lineNameIdx] || '';
                        if (!rowLine.includes('3호선')) continue;
                    }

                    if (lineNameIdx !== -1 && currentLineId === 'busan_line4') {
                        const rowLine = row[lineNameIdx] || '';
                        if (!rowLine.includes('4호선')) continue;
                    }
                    
                    if (dayTypeIdx !== -1 && expectedDays.length > 0) {
                        const rowDay = row[dayTypeIdx] || '';
                        if (!expectedDays.some(d => rowDay.includes(d))) continue;
                    }
                    
                    const trainId = row[0] ? row[0].trim() : '';
                    const stationsStr = row[stIdx] || '';
                    const arrTimesStr = (arrIdx !== -1) ? (row[arrIdx] || '') : '';
                    const depTimesStr = (depIdx !== -1) ? (row[depIdx] || '') : '';
                    
                    if (!stationsStr) continue;
                    
                    const stTokens = stationsStr.split('+');
                    const stOrder = [];
                    const stMap = {};
                    
                    for (let k = 0; k < stTokens.length; k++) {
                        const parts = stTokens[k].split('-');
                        if (parts.length >= 2) {
                            const stNum = parts[0].trim();
                            let stName = parts.slice(1).join('-').trim();
                            stName = stName.replace(/\([^)]*\)/g, '').trim(); 
                            if (stName === '부산' && STATIONS['부산역']) stName = '부산역';
                            
                            stName = stName.replace(/·/g, ' '); 
                            if (stName.replace(/\s+/g, '') === '경성대부경대') stName = '경성대 부경대';
                            if (stName.replace(/\s+/g, '') === '국제금융센터부산은행') stName = '국제금융센터 부산은행';
                            if (stName === '부산대양산캠퍼스역') stName = '부산대양산캠퍼스';

                            stMap[stNum] = stName;
                            stOrder.push(stNum);
                        }
                    }
                    
                    const arrTokens = arrTimesStr ? arrTimesStr.split('+') : [];
                    const depTokens = depTimesStr ? depTimesStr.split('+') : [];
                    const timeMap = {};
                    
                    for (let k = 0; k < arrTokens.length; k++) {
                        const parts = arrTokens[k].split('-');
                        if (parts.length >= 2) {
                            const stNum = parts[0].trim();
                            const timeVal = parts.slice(1).join('-').trim();
                            if (timeVal && timeVal !== ':') timeMap[stNum] = timeVal;
                        }
                    }
                    
                    for (let k = 0; k < depTokens.length; k++) {
                        const parts = depTokens[k].split('-');
                        if (parts.length >= 2) {
                            const stNum = parts[0].trim();
                            const timeVal = parts.slice(1).join('-').trim();
                            if (!timeMap[stNum] && timeVal && timeVal !== ':') timeMap[stNum] = timeVal;
                        }
                    }
                    
                    const schedule = [];
                    for (let k = 0; k < stOrder.length; k++) {
                        const stNum = stOrder[k];
                        const stName = stMap[stNum];
                        if (!STATIONS[stName]) continue;
                        
                        let timeStr = timeMap[stNum];
                        if (timeStr) {
                            if (timeStr.split(':').length === 2) timeStr += ':00';
                            schedule.push({
                                name: stName,
                                time: timeStr,
                                sec: timeToSeconds(timeStr),
                                progress: STATIONS[stName].progress
                            });
                        }
                    }
                    
                    if (schedule.length >= 2) {
                        schedule.sort((a, b) => a.sec - b.sec);
                        
                        const firstProg = schedule[0].progress;
                        const lastProg = schedule[schedule.length - 1].progress;
                        const isUp = lastProg < firstProg; 
                        
                        if (expectedDir === 'up' && !isUp) continue;
                        if (expectedDir === 'down' && isUp) continue;

                        trains.push({ id: trainId, schedule: schedule });
                    }
                }
                return trains;
            }

            let trainIds = headers.slice(1);
            
            if (headers[0].includes('시발역') && lines.length > 2) {
                const thirdRow = splitCsvRow(lines[2]);
                if (thirdRow[0] && thirdRow[0].includes('열차')) {
                    trainIds = thirdRow.slice(1);
                }
            }
            
            const trains = trainIds.map((id, idx) => {
                let tid = id ? id.trim() : '';
                return { id: tid || `#${idx + 1}`, schedule: [] };
            });
            
            for (let i = 1; i < lines.length; i++) {
                const row = splitCsvRow(lines[i]);
                if (!row[0]) continue;
                let stationName = row[0].trim();
                if (currentLineId === 'daejeon_line1' && stationName === '대전') stationName = '대전역';
                
                if (currentLineId === 'busan_donghae' && !STATIONS[stationName]) {
                    if (stationName === '부교대') {
                        stationName = '교대';
                    } else {
                        let matched = Object.keys(STATIONS).find(k => 
                            (stationName.length >= 3 && k.includes(stationName)) || 
                            (k.length >= 3 && stationName.includes(k))
                        );
                        if (matched) stationName = matched;
                    }
                }

                if (!STATIONS[stationName]) continue;
                for (let j = 1; j < row.length; j++) {
                    if (!row[j]) continue;
                    const timeStr = row[j].trim();
                    if (timeStr && trains[j-1]) trains[j-1].schedule.push({ name: stationName, time: timeStr, sec: timeToSeconds(timeStr), progress: STATIONS[stationName].progress });
                }
            }
            trains.forEach(t => t.schedule.sort((a, b) => a.sec - b.sec));
            return trains.filter(t => t.id && t.schedule.length >= 2);
        };

        const loadLineTimetableData = async (dayType) => {
            const stationTimetableSource = await loadStationTimetableSource(currentLineId);
            if (stationTimetableSource) {
                return {
                    up: parseStationTimetable(stationTimetableSource, currentLineId, dayType, 'up'),
                    down: parseStationTimetable(stationTimetableSource, currentLineId, dayType, 'down')
                };
            }

            const lineFiles = FILE_URLS[currentLineId];
            if (!lineFiles) return { up: [], down: [] };
            const [upText, downText] = await Promise.all([
                safeFetch(lineFiles[dayType + '_up']),
                safeFetch(lineFiles[dayType + '_down'])
            ]);
            return {
                up: parseCsv(upText, 'up', dayType),
                down: parseCsv(downText, 'down', dayType)
            };
        };

        const loadTimetable = async () => {
            const statusDisplay = document.getElementById('data-status-display');
            const statusHome = document.getElementById('data-status-home');

            try {
                const timetableData = await loadLineTimetableData(currentDayType);
                parsedTrainsUp = timetableData.up;
                parsedTrainsDown = timetableData.down;
                timetableLoaded = {
                    up: parsedTrainsUp.length > 0,
                    down: parsedTrainsDown.length > 0
                };
                parsedTrains = currentDirection === 'up' ? parsedTrainsUp : parsedTrainsDown;
                if (!timetableLoaded.up || !timetableLoaded.down) {
                    const noDataLabel = timetableLoaded.up || timetableLoaded.down ? '일부 시간표 없음' : '시간표 없음';
                    if (statusDisplay) {
                        statusDisplay.textContent = noDataLabel;
                        statusDisplay.className = 'text-[10px] font-extrabold text-amber-600';
                        statusDisplay.style.color = '';
                    }
                    if (statusHome) {
                        statusHome.textContent = noDataLabel;
                        statusHome.classList.remove('hidden');
                    }
                } else {
                    if (statusDisplay) {
                        statusDisplay.textContent = '실시간';
                        statusDisplay.className = 'text-[10px] font-bold';
                        statusDisplay.style.color = THEME_COLOR;
                    }
                    if (statusHome) statusHome.classList.add('hidden');
                }
            } catch (e) {
                parsedTrainsUp = [];
                parsedTrainsDown = [];
                parsedTrains = [];
                timetableLoaded = { up: false, down: false };
                if (statusDisplay) {
                    statusDisplay.textContent = '시간표 없음';
                    statusDisplay.className = 'text-[10px] font-extrabold text-amber-600';
                    statusDisplay.style.color = '';
                }
                if (statusHome) statusHome.classList.remove('hidden');

        const persistFavorites = () => {
            localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(favoriteStations));
            if (lastFavoriteKey) localStorage.setItem('subway_last_favorite_v2', lastFavoriteKey);
            else localStorage.removeItem('subway_last_favorite_v2');
        };

        const initializeFavorites = () => {
            let stored = [];
            try {
                const parsed = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || '[]');
                if (Array.isArray(parsed)) stored = parsed;
            } catch (error) { }

            const seen = new Set();
            favoriteStations = stored.filter(item => {
                if (!item || !STATIONS_ALL[item.lineId]?.[item.station]) return false;
                const key = makeFavoriteKey(item.lineId, item.station);
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            }).map(item => ({ lineId: item.lineId, station: item.station }));

            // 기존 단일 즐겨찾기를 새 다중 즐겨찾기 형식으로 한 번만 이전한다.
            const legacyStation = localStorage.getItem('subway_fav_station');
            if (legacyStation) {
                const legacyLine = FAVORITE_LINE_ORDER.find(lineId => STATIONS_ALL[lineId]?.[legacyStation]);
                if (legacyLine && !isFavorite(legacyLine, legacyStation)) {
                    favoriteStations.push({ lineId: legacyLine, station: legacyStation });
                }
                localStorage.removeItem('subway_fav_station');
            }

            if (!favoriteStations.some(item => makeFavoriteKey(item.lineId, item.station) === lastFavoriteKey)) {
                const fallback = favoriteStations[favoriteStations.length - 1];
                lastFavoriteKey = fallback ? makeFavoriteKey(fallback.lineId, fallback.station) : null;
            }
            persistFavorites();
        };

            if (!isFavorite(lineId, station)) return;
            lastFavoriteKey = makeFavoriteKey(lineId, station);

                dom.floatingPanel.classList.remove('hidden'); let target = stationDetailDirection === 'up' ? parsedTrainsUp : parsedTrainsDown;
                let upcoming = target.map(t => { const s = t.schedule.find(st => st.name === selectedStation); return s && s.sec >= currentSec ? { id: t.id, sec: s.sec, time: s.time, dest: t.schedule[t.schedule.length-1].name } : null; }).filter(t => t).sort((a,b) => a.sec-b.sec).slice(0, 4);
                panelHtml = `<div class="bg-white/95 backdrop-blur-md border border-black/5 rounded-[28px] p-4 mx-auto w-full max-w-[320px] shadow-2xl transition-all duration-300"><div class="flex justify-between items-center mb-3 px-1"><div class="flex items-center gap-3"><h3 class="text-[18px] font-extrabold text-[#111827] tracking-tight">${selectedStation}역</h3><div class="flex bg-gray-100 rounded-full p-0.5 border border-black/5"><button onclick="setStationDetailDirection('up')" class="px-3 py-1 rounded-full text-[10px] font-bold transition-all ${stationDetailDirection==='up'?'text-white shadow-sm':'text-gray-400 hover:text-black'}" style="${stationDetailDirection==='up' ? `background-color: ${THEME_COLOR};` : ''}">상행</button><button onclick="setStationDetailDirection('down')" class="px-3 py-1 rounded-full text-[10px] font-bold transition-all ${stationDetailDirection==='down'?'text-white shadow-sm':'text-gray-400 hover:text-black'}" style="${stationDetailDirection==='down' ? `background-color: ${DOWN_COLOR};` : ''}">하행</button></div></div><button onclick="handleStationClick(null)" class="text-gray-400 bg-gray-100 w-7 h-7 rounded-full flex items-center justify-center hover:text-black hover:bg-gray-200 transition-all"><i class="fa-solid fa-xmark text-[11px]"></i></button></div><div class="space-y-1.5 mb-3">${upcoming.length ? upcoming.map(u => `<div class="bg-gray-50 hover:bg-gray-100 transition-colors rounded-[14px] py-2.5 px-3.5 flex justify-between items-center shadow-sm border border-black/5"><span class="text-[#111827] font-bold text-[13px]">${u.time.slice(0,5)} <span class="text-[11px] text-gray-500 ml-1.5 font-medium">${u.dest}행</span></span><span class="font-black text-[13px]" style="${stationDetailDirection==='up'? `color: ${THEME_COLOR};` : `color: ${DOWN_COLOR};`}">${(u.sec-currentSec) < 60 ? (u.sec-currentSec) + '초 후' : Math.ceil((u.sec-currentSec)/60) + '분 후'}</span></div>`).join('') : '<div class="text-center text-gray-400 py-3 text-[12px] font-medium">운행 종료</div>'}</div><button onclick="modalViewMode='all'; window.openModal()" class="w-full py-2.5 bg-gray-100 hover:bg-gray-200 border border-black/5 transition-colors rounded-[14px] font-bold text-gray-700 text-[12px] flex items-center justify-center gap-1.5 shadow-sm"><i class="fa-regular fa-clock text-[11px]"></i> 시간표 보기</button></div>`;
            } else if (selectedData) {
                dom.floatingPanel.classList.remove('hidden'); const pColor = selectedData.direction === 'down' ? DOWN_COLOR : THEME_COLOR;
                // 이전역 ──열차── 다음역 구간 진행 미니뷰
                const sdCurr = selectedData.curr, sdNext = selectedData.next;
                let segFrac = 0;
                if (!selectedData.isStopped && !selectedData.isWaiting) {
                    const denom = sdNext.progress - sdCurr.progress;
                    segFrac = denom !== 0 ? (selectedData.overallProgress - sdCurr.progress) / denom : 0;
                    segFrac = Math.max(0, Math.min(1, segFrac));
                }
                const stNames = Object.keys(STATIONS);
                const curIdx = stNames.indexOf(sdCurr.name);
                const nxtIdx = stNames.indexOf(sdNext.name);
                const isTerm = (i) => i === 0 || i === stNames.length - 1;
                const leftExtends = !isTerm(curIdx);
                const rightExtends = !isTerm(nxtIdx);
                const nodeL = 22, nodeR = 78;
                const tX = +(nodeL + segFrac * (nodeR - nodeL)).toFixed(1);
                const grayStart = leftExtends ? 0 : nodeL;
                const colorEnd = rightExtends ? 100 : nodeR;
                const grayW = (tX - grayStart).toFixed(1);
                const colorW = (colorEnd - tX).toFixed(1);
                // 노선의 전동열차와 동일한 옆모습 SVG (오른쪽=진행 방향)
                const trainSvg = `<svg width="44" height="24" viewBox="-21 -8.5 42 17" style="overflow:visible">
                        <rect x="-19.6" y="-1.2" width="3" height="2.4" rx="0.7" fill="${pColor}"/>
                        <rect x="-17" y="-6.6" width="34" height="13.2" rx="4" fill="${pColor}" stroke="#ffffff" stroke-width="1.1" stroke-linejoin="round"/>
                        <rect x="-15" y="-6" width="30" height="1.5" rx="0.7" fill="#ffffff" opacity="0.3"/>
                        <rect x="-13" y="-3.3" width="18.5" height="3.5" rx="1.2" fill="#ffffff" opacity="0.9"/>
                        <path d="M 8.6 -4 L 14 -4 Q 16 -4 16 -2 L 16 2 Q 16 4 14 4 L 8.6 4 Z" fill="#ffffff" opacity="0.96"/>
                        <line x1="-6" y1="-6.2" x2="-6" y2="6.2" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
                        <line x1="1" y1="-6.2" x2="1" y2="6.2" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
                        <circle cx="14.6" cy="3.6" r="1.1" fill="#FFF6B0"/>
                    </svg>`;
                const segHtml = `<div class="relative h-[74px] mb-2 mx-1">
                    <div class="absolute top-[34px] h-[5px] bg-gray-300 ${leftExtends ? '' : 'rounded-l-full'}" style="left:${grayStart}%; width:${grayW}%"></div>
                    <div class="absolute top-[34px] h-[5px] ${rightExtends ? '' : 'rounded-r-full'}" style="left:${tX}%; width:${colorW}%; background-color:${pColor}"></div>
                    <div class="absolute top-[28px] -translate-x-1/2 w-[17px] h-[17px] rounded-full bg-white border-[3px] border-gray-300 z-10" style="left:${nodeL}%"></div>
                    <div class="absolute top-[28px] -translate-x-1/2 w-[17px] h-[17px] rounded-full bg-white border-[3px] z-10" style="left:${nodeR}%; border-color:${pColor}"></div>
                    <div class="absolute -translate-x-1/2 z-20 transition-all duration-700 flex flex-col items-center" style="left:${tX}%; top:4px;">
                        <span class="text-[10px] font-extrabold text-gray-700 bg-white border border-black/10 rounded-full px-1.5 leading-[16px] shadow-sm mb-[1px]">${selectedData.id}</span>
                        ${trainSvg}
                    </div>
                    <span class="absolute top-[50px] -translate-x-1/2 text-[12px] font-bold text-gray-600 whitespace-nowrap" style="left:${nodeL}%">${sdCurr.name}</span>
                    <span class="absolute top-[50px] -translate-x-1/2 text-[12px] font-bold whitespace-nowrap" style="left:${nodeR}%; color:${pColor}">${sdNext.name}</span>
                </div>`;
                panelHtml = `<div class="bg-white/95 backdrop-blur-md border border-black/5 rounded-[36px] p-4 pt-4 mx-auto w-full max-w-[360px] shadow-2xl flex flex-col justify-center relative overflow-hidden">${segHtml}<div class="border-t border-black/5 pt-3 flex justify-between items-center px-2"><div><div class="flex items-center gap-2 mb-1"><span style="background-color: ${pColor}" class="text-white text-[10px] px-2.5 py-0.5 rounded-full font-bold shadow-sm">${selectedData.id}</span><span class="text-[11px] font-semibold text-gray-500">${selectedData.isWaiting ? '대기중' : selectedData.isStopped ? '도착' : `(${selectedData.curr.name} 출발)`}</span></div><h2 class="text-[18px] font-extrabold text-[#111827] tracking-tight flex items-baseline gap-1.5">${selectedData.isStopped || selectedData.isWaiting ? selectedData.curr.name : selectedData.next.name}역<span class="text-[12px] font-medium text-gray-500">${selectedData.isWaiting ? '출발 예정' : selectedData.isStopped ? '정차중' : '도착 예정'}</span></h2></div>${!selectedData.isStopped && !selectedData.isWaiting ? `<div class="text-right flex items-baseline gap-0.5"><p class="text-[28px] font-black tracking-tighter" style="color: ${pColor}">${selectedData.timeRemaining < 60 ? selectedData.timeRemaining : Math.ceil(selectedData.timeRemaining / 60)}</p><span class="text-[11px] text-gray-500 ml-0.5 font-bold">${selectedData.timeRemaining < 60 ? '초 전' : '분 전'}</span></div>` : (selectedData.isStopped && !selectedData.isWaiting ? `<div class="text-right flex items-baseline gap-0.5"><p class="text-[28px] font-black tracking-tighter" style="color: ${pColor}">${selectedData.stopRemaining}</p><span class="text-[11px] text-gray-500 ml-0.5 font-bold">초 후 출발</span></div>` : '')}</div></div>`;
            } else dom.floatingPanel.classList.add('hidden');
            if(dom.floatingPanel.innerHTML !== panelHtml && activeTab !== 'home') dom.floatingPanel.innerHTML = panelHtml;
        };

        window.onload = async () => {
            initializeFavorites();
            const urlParams = new URLSearchParams(window.location.search);
            const urlRegion = urlParams.get('region');
            const supportedRegions = ['daegu', 'daejeon', 'busan', 'gwangju'];
            const shouldShowCapitalPopup = urlRegion === 'seoul' || urlRegion === 'capital';

            if (urlRegion && supportedRegions.includes(urlRegion)) {
                // URL 파라미터로 넘어온 지역이 있으면 가장 최우선으로 적용
                await window.switchRegion(urlRegion, true);
                if (urlRegion === 'daegu') await window.switchLine('daegyeong', true);
                else if (urlRegion === 'daejeon') await window.switchLine('daejeon_line1', true);
                else if (urlRegion === 'busan') await window.switchLine('busan_line1', true);
                else if (urlRegion === 'gwangju') await window.switchLine('gwangju_line1', true);
            } else {
                // 위치 권한 확인 전에는 마지막 즐겨찾기를 빠른 기본값으로 사용한다.
                const fallbackFavorite = getLastFavorite();
                if (fallbackFavorite) {
                    await window.switchRegion(LINE_REGION[fallbackFavorite.lineId], true);
                    await window.switchLine(fallbackFavorite.lineId, true);
                    homeSelectedStation = fallbackFavorite.station;
                } else {
                    await window.switchRegion('daegu', true);
                    await window.switchLine('daegyeong', true);
                }
            }

            currentDayType = getDayType(new Date());
            await loadTimetable();
            setTimeout(() => {
                window.switchTab('home');
                if (shouldShowCapitalPopup) setTimeout(() => window.showCapitalPopup(), 180);
                else if (!urlRegion) setTimeout(() => window.findNearestStation({ silent: true }), 280);
                setInterval(() => {
                    const now = new Date(); let h = now.getHours(); if(h<4) h+=24;
                    currentSec = h*3600 + now.getMinutes()*60 + now.getSeconds();
                    window.render();
                }, 1000);
            }, 100);
        };
        
        dom.tabHome.onclick = () => window.switchTab('home');
        dom.tabLine.onclick = () => window.switchTab('line');
        dom.directionToggle.addEventListener('change', async (e) => { currentDirection = e.target.value; await loadTimetable(); isAutoScroll = true; window.render(); });
        dom.scrollContainer.addEventListener('touchstart', () => isAutoScroll = false, {passive: true});
        dom.scrollContainer.addEventListener('wheel', () => isAutoScroll = false, {passive: true});
        dom.autoScrollBtn.addEventListener('click', () => { isAutoScroll = true; window.render(); });
        dom.closeModalBtn.addEventListener('click', () => { dom.timetableModal.classList.add('hidden'); modalDayType = null; modalViewMode = 'all'; });

        let capitalLastFocused = null;
        window.showCapitalPopup = () => {
            const modal = document.getElementById('capital-modal');
            const card = modal?.querySelector('.capital-card');
            if (!modal || !card) return;
            capitalLastFocused = document.activeElement;
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
                document.getElementById('capital-confirm-btn')?.focus();
            });
        };

        window.closeCapitalPopup = () => {
            const modal = document.getElementById('capital-modal');
            const card = modal?.querySelector('.capital-card');
            if (!modal || !card || modal.classList.contains('hidden')) return;
            modal.classList.add('opacity-0');
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (capitalLastFocused && typeof capitalLastFocused.focus === 'function') capitalLastFocused.focus();
            }, 220);
        };

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !document.getElementById('capital-modal')?.classList.contains('hidden')) {
                window.closeCapitalPopup();
            }
        });

        window.showPreparingPopup = (name) => {
            const modal = document.getElementById('preparing-modal');
            const icon = document.getElementById('preparing-icon');
            const btn = document.getElementById('preparing-btn');
            const textElem = document.getElementById('preparing-text');
            
            if (textElem && name) {
                if (name === '양산선') {
                    textElem.innerHTML = `<b class="text-[#111827]">${name}</b>은(는)<br>2026년 11월 개통 예정입니다.`;
                } else {
                    textElem.innerHTML = `<b class="text-[#111827]">${name}</b> 서비스는<br>현재 준비 중입니다.`;
                }
            }
            
            if (icon && btn) {
                icon.style.color = THEME_COLOR;
                btn.style.backgroundColor = THEME_COLOR;
            }
            
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            modal.querySelector('div').classList.remove('scale-95');
            modal.querySelector('div').classList.add('scale-100');
        };

        window.closePreparingPopup = () => {
            const modal = document.getElementById('preparing-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.remove('scale-100');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };
    </script>
</body>
</html>
