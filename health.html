<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>엔조이 헬스</title>

  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --surface: #1c1c1e;
      --surface-2: #26262b;
      --surface-3: #2c2c2e;
      --text: #ffffff;
      --text-main: #f2f4f6;
      --text-sub: #a1a1a6;
      --text-muted: #8b95a1;
      --blue: #3182f6;
      --red: #f04452;
      --green: #22c55e;
      --teal: #2dd4bf;
      --line: rgba(255, 255, 255, 0.1);
      --line-soft: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f2f2f7;
        --surface: #ffffff;
        --surface-2: #ffffff;
        --surface-3: #e9e9eb;
        --text: #141414;
        --text-main: #141414;
        --text-sub: #5e6470;
        --text-muted: #8b95a1;
        --line: rgba(0, 0, 0, 0.1);
        --line-soft: rgba(0, 0, 0, 0.06);
        --glass-border: rgba(255, 255, 255, 0.12);
        --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.12);
        --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      touch-action: pan-y;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #app {
      width: 100%;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #app::-webkit-scrollbar,
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .pt-safe {
      padding-top: max(20px, env(safe-area-inset-top));
    }

    .pb-safe {
      padding-bottom: max(110px, calc(92px + env(safe-area-inset-bottom)));
    }

    .screen {
      width: min(100%, 448px);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      padding: 0 20px;
    }

    .screen-header {
      flex: none;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 14px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    @media (prefers-color-scheme: light) {
      .screen-header {
        background: var(--bg);
      }
    }

    .screen-title {
      min-width: 0;
    }

    .screen-title h1 {
      margin: 0;
      color: var(--text-main);
      font-size: 26px;
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .screen-title p {
      margin: 5px 0 0;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .icon-chip {
      flex: 0 0 auto;
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 0 13px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (prefers-color-scheme: light) {
      .icon-chip {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .content-stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-bottom: 18px;
    }

    .section-label {
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .section-label p {
      margin: 0 0 5px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-label h2 {
      margin: 0;
      color: var(--text-main);
      font-size: 20px;
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .glass-card,
    .status-card,
    .setup-card {
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .status-card,
    .setup-card {
      background: var(--surface);
    }

    .card-pad {
      padding: 22px;
    }

    .status-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line-soft);
    }

    .status-kicker {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
    }

    .status-number {
      color: var(--text-main);
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .status-number span {
      margin-left: 3px;
      font-size: 20px;
      font-weight: 800;
    }

    .progress-circle {
      --progress: 0%;
      position: relative;
      width: 82px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 7px solid var(--blue);
      flex: 0 0 auto;
    }

    .progress-circle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--surface);
    }

    .progress-circle strong,
    .progress-circle span {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      white-space: nowrap;
    }

    .progress-circle strong {
      top: 24px;
      color: var(--text-main);
      font-size: 21px;
      font-weight: 900;
      line-height: 1;
    }

    .progress-circle span {
      top: 47px;
      color: var(--text-sub);
      font-size: 10px;
      font-weight: 800;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding-top: 17px;
    }

    .stat-item {
      min-width: 0;
      border-left: 1px solid var(--line-soft);
      padding-left: 12px;
    }

    .stat-item:first-child {
      border-left: 0;
      padding-left: 0;
    }

    .stat-item span {
      display: block;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-item strong {
      display: block;
      margin-top: 5px;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.25;
      word-break: keep-all;
    }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .period-card {
      min-height: 98px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      color: var(--text-main);
      padding: 17px;
      text-align: left;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }

    @media (prefers-color-scheme: light) {
      .period-card {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .period-card:active,
    .day-cell:active,
    .pill-button:active,
    .ghost-button:active,
    .danger-link:active {
      transform: scale(0.96);
    }

    .period-card.is-selected {
      border-color: rgba(49, 130, 246, 0.8);
      background: rgba(49, 130, 246, 0.18);
    }

    .period-card strong {
      color: var(--text-main);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .period-card span {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 700;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 10px;
      margin-top: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .text-input {
      width: 100%;
      min-height: 50px;
      border-radius: 16px;
      border: 1.5px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      padding: 0 15px;
      outline: none;
      font-size: 15px;
      font-weight: 700;
    }

    @media (prefers-color-scheme: light) {
      .text-input {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .text-input:focus {
      border-color: var(--blue);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .pill-button,
    .ghost-button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 900;
      transition: transform 0.15s, opacity 0.15s;
    }

    .pill-button {
      background: #ffffff;
      color: #141414;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.12);
    }

    .pill-button.blue {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(49, 130, 246, 0.28);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid var(--line);
    }

    .pill-button:disabled,
    .ghost-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .danger-link {
      width: fit-content;
      background: transparent;
      color: var(--red);
      padding: 9px 2px;
      font-size: 13px;
      font-weight: 800;
    }

    .photo-card {
      position: relative;
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      background: #050505;
      box-shadow: var(--shadow-card);
      isolation: isolate;
    }

    .photo-preview {
      position: absolute;
      inset: 0;
      background: #111114;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .photo-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .photo-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      z-index: 1;
    }

    .photo-empty i {
      display: block;
      margin-bottom: 10px;
      color: var(--blue);
      font-size: 36px;
    }

    .photo-content {
      position: absolute;
      inset: 22px 22px 20px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .photo-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .day-badge {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #ffffff;
      color: #141414;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    .day-badge strong {
      font-size: 23px;
      font-weight: 900;
      line-height: 1;
    }

    .photo-date {
      text-align: right;
    }

    .photo-date h3 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.16;
    }

    .photo-date p {
      margin: 3px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 700;
    }

    .photo-bottom {
      pointer-events: auto;
    }

    .photo-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .calendar-card {
      padding-top: 20px;
      border-top: 1px solid var(--line-soft);
    }

    .calendar-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .calendar-head h3 {
      margin: 0;
      color: var(--text-main);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.2;
    }

    .calendar-head p {
      margin: 3px 0 0;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 600;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap-y: 8px;
      text-align: center;
    }

    .day-cell {
      height: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-radius: 16px;
      background: transparent;
      color: var(--text-main);
      transition: transform 0.15s;
      padding: 0;
    }

    .day-number {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    @media (prefers-color-scheme: light) {
      .day-number {
        background: rgba(0, 0, 0, 0.05);
      }
    }

    .day-cell.is-selected .day-number {
      background: #ffffff;
      color: #141414;
      box-shadow: 0 2px 12px rgba(255, 255, 255, 0.28);
    }

    @media (prefers-color-scheme: light) {
      .day-cell.is-selected .day-number {
        background: #141414;
        color: #ffffff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
      }
    }

    .day-cell.is-future {
      opacity: 0.42;
    }

    .day-cell img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .day-dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: transparent;
    }

    .day-cell.has-photo .day-dot {
      background: var(--blue);
    }

    .compare-card {
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 22px;
      box-shadow: var(--shadow-soft);
    }

    .compare-empty {
      min-height: 116px;
      display: grid;
      place-items: center;
      color: var(--text-sub);
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      word-break: keep-all;
    }

    .compare-lead {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .compare-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(124px, 38%);
      gap: 10px;
      overflow-x: auto;
      padding: 0 2px 6px;
      scroll-snap-type: x proximity;
    }

    .compare-item {
      margin: 0;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      overflow: hidden;
      scroll-snap-align: start;
    }

    .compare-item img {
      width: 100%;
      aspect-ratio: 4 / 5;
      display: block;
      object-fit: contain;
      background: var(--surface-3);
    }

    .compare-item figcaption {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 9px 10px 10px;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.25;
    }

    .simple-card {
      min-height: 420px;
    }

    .hub-grid,
    .service-grid,
    .metric-row,
    .meal-grid,
    .workout-grid {
      display: grid;
      gap: 10px;
    }

    .hub-grid {
      grid-template-columns: 1.25fr 0.75fr;
    }

    .service-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .service-card,
    .mini-panel,
    .plan-panel,
    .feed-card,
    .meal-card,
    .routine-card,
    .insight-row {
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .service-card {
      min-height: 122px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      padding: 15px;
      color: var(--text-main);
      text-align: left;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .service-card:active,
    .feed-action:active,
    .story-day:active,
    .icon-action:active,
    .meal-card:active,
    .routine-card:active {
      transform: scale(0.96);
    }

    .service-card.is-primary {
      background: rgba(49, 130, 246, 0.16);
      border-color: rgba(49, 130, 246, 0.38);
    }

    .service-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      font-size: 16px;
    }

    @media (prefers-color-scheme: light) {
      .service-icon {
        background: rgba(0, 0, 0, 0.05);
      }
    }

    .service-card strong,
    .mini-panel strong,
    .meal-card strong,
    .routine-card strong {
      color: var(--text-main);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .service-card span,
    .mini-panel span,
    .meal-card span,
    .routine-card span {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.35;
      word-break: keep-all;
    }

    .mini-panel {
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      padding: 16px;
      overflow: hidden;
    }

    .mini-panel .big-number {
      color: var(--text-main);
      font-size: 34px;
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .mini-panel .big-number small {
      font-size: 15px;
      font-weight: 850;
      color: var(--text-sub);
    }

    .progress-line {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme: light) {
      .progress-line {
        background: rgba(0, 0, 0, 0.06);
      }
    }

    .progress-line span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .metric-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric-pill {
      min-height: 72px;
      border-radius: 18px;
      padding: 13px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line-soft);
    }

    @media (prefers-color-scheme: light) {
      .metric-pill {
        background: rgba(0, 0, 0, 0.035);
      }
    }

    .metric-pill span {
      display: block;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .metric-pill strong {
      display: block;
      margin-top: 6px;
      color: var(--text-main);
      font-size: 16px;
      font-weight: 950;
      line-height: 1.15;
      word-break: keep-all;
    }

    .plan-panel {
      border-radius: 24px;
      padding: 20px;
    }

    .plan-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .plan-head h2,

    function todayISO() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      return now.toISOString().slice(0, 10);
    }

    function addDays(dateText, amount) {
      const date = new Date(`${dateText}T00:00:00`);
      date.setDate(date.getDate() + amount);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function daysBetween(from, to) {
      const start = new Date(`${from}T00:00:00`);
      const end = new Date(`${to}T00:00:00`);
      return Math.floor((end - start) / 86400000);
    }

    function formatDate(dateText) {
      const date = new Date(`${dateText}T00:00:00`);
      return new Intl.DateTimeFormat("ko-KR", {
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function dayLabel(dayIndex) {
      return `Day ${dayIndex}`;

      return workoutCatalog.find((item) => item.id === workoutId) || workoutCatalog[0];
    }

    function getWorkoutFields(workout) {
      return workoutFieldProfiles[workout.profile] || workoutFieldProfiles.basic;
    }

    function todaysWorkoutEntries() {
      const today = todayISO();
      return workoutState.entries.filter((entry) => entry.date === today);
    }

    function numberValue(value) {
      const parsed = parseFloat(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function workoutTotal(entries, key) {
      return entries.reduce((sum, entry) => sum + numberValue(entry.values[key]), 0);
    }

    function formatCompactNumber(value) {
      if (!value) return "0";
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function formatWorkoutField(field, value) {
      const number = numberValue(value);
      if (!number && field.key !== "note") return "";
      return `${formatCompactNumber(number)}${field.unit}`;
    }

    function workoutSummaryText(entry) {
      const workout = getWorkout(entry.workoutId);
      return getWorkoutFields(workout)
        .map((field) => formatWorkoutField(field, entry.values[field.key]))
        .filter(Boolean)
        .slice(0, 4)
        .join(" · ");
    }

    function openBodyDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);

        request.onupgradeneeded = () => {
          const db = request.result;
          const store = db.objectStoreNames.contains(STORE_NAME)
            ? request.transaction.objectStore(STORE_NAME)
            : db.createObjectStore(STORE_NAME, { keyPath: "id" });

          if (!store.indexNames.contains("planId")) {
            store.createIndex("planId", "planId", { unique: false });
          }
          if (!store.indexNames.contains("accountId")) {
            store.createIndex("accountId", "accountId", { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function withPhotoStore(mode, callback) {
      return openBodyDb().then((db) => new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, mode);
        const store = transaction.objectStore(STORE_NAME);
        callback(store);

        transaction.oncomplete = () => {
          db.close();
          resolve();
        };

        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      }));
    }

    async function loadPhotos() {
      if (!bodyState.plan) {
        bodyState.photos = [];
        return;
      }

      const db = await openBodyDb();
      bodyState.photos = await new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const request = store.getAll();

        request.onsuccess = () => {
          resolve(request.result
            .filter((photo) => photo.accountId === HEALTH_ACCOUNT_ID && photo.planId === bodyState.plan.id)
            .sort((a, b) => a.dayIndex - b.dayIndex));
        };

        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
    }

    function bodyBackupEnabled() {
      return !!(
        BODY_BACKUP_CLOUDINARY.cloudName &&
        BODY_BACKUP_CLOUDINARY.uploadPreset &&
        window.fetch &&
        window.FormData
      );
    }

    function bodyBackupBase(status) {
      return {
        provider: "cloudinary",
        status,
        cloudName: BODY_BACKUP_CLOUDINARY.cloudName,
        folder: BODY_BACKUP_CLOUDINARY.folder
      };
    }

    function bodyBackupFileName(photo) {
      const rawName = photo.name || `body-day-${photo.dayIndex}.jpg`;
      return rawName.toLowerCase().endsWith(".jpg") || rawName.toLowerCase().endsWith(".jpeg")
        ? rawName
        : `${rawName}.jpg`;
    }

    async function uploadBodyPhotoBackup(photo) {
      if (!bodyBackupEnabled()) {
        throw new Error("Cloudinary 백업 설정이 비어 있어요.");
      }

      const form = new FormData();
      form.append("file", photo.blob, bodyBackupFileName(photo));
      form.append("upload_preset", BODY_BACKUP_CLOUDINARY.uploadPreset);
      form.append("folder", BODY_BACKUP_CLOUDINARY.folder);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${BODY_BACKUP_CLOUDINARY.cloudName}/image/upload`,
        { method: "POST", body: form }
      );
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        const message = data.error && data.error.message ? data.error.message : `Cloudinary ${response.status}`;
        throw new Error(message);
      }

      return {
        ...bodyBackupBase("uploaded"),
        secureUrl: data.secure_url || "",
        publicId: data.public_id || "",
        resourceType: data.resource_type || "image",
        uploadedAt: new Date().toISOString()
      };
    }

    function updateMemoryPhotoBackup(photo, cloudBackup) {
      const current = bodyState.photos.find((item) => item.id === photo.id && item.updatedAt === photo.updatedAt);
      if (current) current.cloudBackup = cloudBackup;
    }

    async function updateStoredPhotoBackup(photo, cloudBackup) {
      const db = await openBodyDb();
      await new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(photo.id);

        request.onsuccess = () => {
          const current = request.result;
          if (!current || current.accountId !== HEALTH_ACCOUNT_ID || current.updatedAt !== photo.updatedAt) return;
          current.cloudBackup = cloudBackup;
          store.put(current);
        };
        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => {
          db.close();
          resolve();
        };
        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
      updateMemoryPhotoBackup(photo, cloudBackup);
    }

    async function runBodyBackup(photo) {
      if (!photo || !photo.blob || !bodyBackupEnabled()) return;
      if (photo.cloudBackup && photo.cloudBackup.status === "uploaded") return;
      if (activeBodyBackups.has(photo.id)) return;

      activeBodyBackups.add(photo.id);
      try {
        const cloudBackup = await uploadBodyPhotoBackup(photo);
        await updateStoredPhotoBackup(photo, cloudBackup);
      } catch (error) {
        await updateStoredPhotoBackup(photo, {
          ...bodyBackupBase("failed"),
          message: error.message || "Cloudinary 백업 실패",
          failedAt: new Date().toISOString()
        }).catch(() => {});
      } finally {
        activeBodyBackups.delete(photo.id);
      }
    }

    function scheduleBodyBackup(photo) {
      runBodyBackup(photo);
    }

    async function schedulePendingBodyBackups() {
      if (bodyBackupQueueRunning) return;
      bodyBackupQueueRunning = true;
      try {
        const candidates = bodyState.photos.filter((photo) => !photo.cloudBackup || photo.cloudBackup.status !== "uploaded");
        for (const photo of candidates) {
          await runBodyBackup(photo);
        }
      } finally {
        bodyBackupQueueRunning = false;
      }
    }

    function fileToImage(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const url = URL.createObjectURL(file);

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("이미지를 불러오지 못했어요."));
        };

        image.src = url;
      });
    }

    async function compressImage(file) {
      if (!file.type.startsWith("image/")) {
        throw new Error("이미지 파일만 올릴 수 있어요.");
      }

      const image = await fileToImage(file);
      const maxSide = 1600;
      const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.width * scale));
      canvas.height = Math.max(1, Math.round(image.height * scale));

      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          resolve(blob || file);
        }, "image/jpeg", 0.86);
      });
    }

    function parseRgb(value) {
      const match = value && value.match(/rgba?\(([^)]+)\)/);
      if (!match) return null;
      const parts = match[1].split(",").map((part) => parseFloat(part));
      if (parts.length < 3 || parts.slice(0, 3).some(Number.isNaN)) return null;
      return {
        r: parts[0],
        g: parts[1],
        b: parts[2],
        a: parts[3] === undefined || Number.isNaN(parts[3]) ? 1 : parts[3]
      };
    }

    function colorBrightness(color) {
      return color ? (0.299 * color.r + 0.587 * color.g + 0.114 * color.b) : null;
    }

    const contrastImageCache = new WeakMap();
    const contrastCanvas = document.createElement("canvas");
    const contrastContext = contrastCanvas.getContext("2d", { willReadFrequently: true });

    function imageSampleData(image) {
      if (contrastImageCache.has(image)) return contrastImageCache.get(image);
      let result = null;

      try {
        if (!image.complete || !image.naturalWidth || !image.naturalHeight || !contrastContext) return null;
        const width = 36;
        const height = 36;
        contrastCanvas.width = width;
        contrastCanvas.height = height;
        contrastContext.clearRect(0, 0, width, height);
        contrastContext.drawImage(image, 0, 0, width, height);
        result = {
          data: contrastContext.getImageData(0, 0, width, height).data,
          width,
          height
        };
      } catch (error) {
        result = null;
      }

      contrastImageCache.set(image, result);
      return result;
    }

    function imageBrightnessAt(image, x, y) {
      const sample = imageSampleData(image);
      if (!sample) return null;

      const rect = image.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;

      const style = getComputedStyle(image);
      const fit = style.objectFit || "fill";
      const scale = fit === "cover"
        ? Math.max(rect.width / image.naturalWidth, rect.height / image.naturalHeight)
        : fit === "contain"
          ? Math.min(rect.width / image.naturalWidth, rect.height / image.naturalHeight)
          : null;
      const drawWidth = scale ? image.naturalWidth * scale : rect.width;
      const drawHeight = scale ? image.naturalHeight * scale : rect.height;
      const left = rect.left - (drawWidth - rect.width) / 2;
      const top = rect.top - (drawHeight - rect.height) / 2;

      if (x < left || x > left + drawWidth || y < top || y > top + drawHeight) return null;

      const sampleX = clamp(Math.floor(((x - left) / drawWidth) * sample.width), 0, sample.width - 1);
      const sampleY = clamp(Math.floor(((y - top) / drawHeight) * sample.height), 0, sample.height - 1);
      let sum = 0;
      let count = 0;

      for (let yy = Math.max(0, sampleY - 1); yy <= Math.min(sample.height - 1, sampleY + 1); yy += 1) {
        for (let xx = Math.max(0, sampleX - 1); xx <= Math.min(sample.width - 1, sampleX + 1); xx += 1) {
          const index = (yy * sample.width + xx) * 4;
          sum += 0.299 * sample.data[index] + 0.587 * sample.data[index + 1] + 0.114 * sample.data[index + 2];
          count += 1;
        }
      }

      return count ? sum / count : null;
    }

    function backgroundBrightnessAt(x, y) {
      const nav = document.querySelector("#bottom-nav");
      const previousEvents = nav ? nav.style.pointerEvents : "";
      if (nav) nav.style.pointerEvents = "none";

      try {
        const elements = document.elementsFromPoint(x, y) || [];
        let base = matchMedia("(prefers-color-scheme: light)").matches ? 242 : 0;
        const layers = [];

        for (const element of elements) {
          if (!element || element === document.documentElement || element === document.body) continue;
          if (nav && nav.contains(element)) continue;

          const style = getComputedStyle(element);
          if (style.display === "none" || style.visibility === "hidden") continue;

          const opacity = Number.isNaN(parseFloat(style.opacity)) ? 1 : parseFloat(style.opacity);
          if (opacity <= 0.01) continue;

          if (element.tagName === "IMG") {
            const value = imageBrightnessAt(element, x, y);
            if (value !== null) {
              if (opacity >= 0.98) {
                base = value;
                break;
              }
              layers.push({ value, alpha: opacity });
              continue;
            }
          }

          const backgroundImageColors = Array.from((style.backgroundImage || "").matchAll(/rgba?\([^)]+\)/g))
            .map((matchItem) => parseRgb(matchItem[0]))
            .filter(Boolean);
          if (backgroundImageColors.length) {
            const value = backgroundImageColors.reduce((sum, color) => sum + colorBrightness(color), 0) / backgroundImageColors.length;
            layers.push({ value, alpha: 0.55 * opacity });
          }

          const color = parseRgb(style.backgroundColor);
          if (color && color.a * opacity > 0.01) {
            const alpha = color.a * opacity;
            const value = colorBrightness(color);
            if (alpha >= 0.98) {
              base = value;
              break;
            }
            layers.push({ value, alpha });
          }
        }

        for (let index = layers.length - 1; index >= 0; index -= 1) {
          const layer = layers[index];
          base = layer.value * layer.alpha + base * (1 - layer.alpha);
        }

        return base;
      } finally {
        if (nav) nav.style.pointerEvents = previousEvents;
      }
    }

    function updateNavContrast() {
      const nav = document.querySelector("#bottom-nav");
      if (!nav) return;
      const rect = nav.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const points = [
        [0.12, 0.5],
        [0.35, 0.5],
        [0.5, 0.5],
        [0.65, 0.5],
        [0.88, 0.5],
        [0.5, 0.25],
        [0.5, 0.75]
      ];
      const values = points.map(([px, py]) => backgroundBrightnessAt(
        rect.left + rect.width * px,
        rect.top + rect.height * py
      )).filter((value) => value !== null && !Number.isNaN(value));

      const average = values.length
        ? values.reduce((sum, value) => sum + value, 0) / values.length
        : (matchMedia("(prefers-color-scheme: light)").matches ? 242 : 0);
      nav.classList.toggle("nav-on-light", average > 154);
    }

    function updatePhotoLabelContrast() {
      document.querySelectorAll(".auto-contrast-label").forEach((label) => {
        label.classList.remove("is-on-light");

        const photoWrap = label.closest(".body-tile, .feed-photo, .compare-item");
        const image = photoWrap ? photoWrap.querySelector("img") : null;
        if (!image || !image.complete || !image.naturalWidth) return;

        const rect = label.getBoundingClientRect();
        const brightness = imageBrightnessAt(image, rect.left + rect.width / 2, rect.top + rect.height / 2);
        label.classList.toggle("is-on-light", brightness !== null && brightness > 156);
      });
    }

      requestAnimationFrame(() => {
        updatePhotoLabelContrast();
        document.querySelectorAll(".body-tile img, .feed-photo img, .compare-item img").forEach((image) => {

                <div>
                  <h2>시작 설정</h2>
                  <p>기간을 고르고 첫 사진부터 남겨요.</p>
                </div>
                <div class="body-setup-mark"><i class="fa-solid fa-person"></i></div>
              </div>
              <div class="body-period-grid">
                ${periodOptions.map((option) => `
                  <button class="body-period-card ${bodyState.selectedPeriod === option.days ? "is-selected" : ""}" type="button" data-period="${option.days}">
                    <strong>${option.title}</strong>
                    <span>${option.note}</span>
                  </button>
                `).join("")}
              </div>
              <div class="body-setup-fields">
                <div class="body-setup-field">
                  <label for="start-date">시작일</label>
                  <input class="body-setup-input" id="start-date" type="date" value="${today}">
                </div>
                <div class="body-setup-field">
                  <label for="custom-days">직접</label>
                  <span class="body-days-wrap">
                    <input class="body-days-input" id="custom-days" type="number" min="1" max="365" inputmode="numeric">
                    <span>일</span>
                  </span>
                </div>
              </div>
              <button class="pill-button blue body-setup-start" type="button" data-action="create-plan">바디 기록 시작</button>
            </section>

            <p class="app-copyright">Copyright © 2026 엔조이. All rights reserved.</p>
          </div>
        </div>
      `;
    }

    function renderStoryRail(plan, todayDay) {
      return Array.from({ length: plan.days }, (_, index) => {
        const dayIndex = index + 1;
        const photo = getPhoto(dayIndex);
        const isFuture = dayIndex > todayDay && !finalReached(plan);
        const classes = [
          "story-day",
          dayIndex === bodyState.selectedDay ? "is-selected" : "",
          photo ? "has-photo" : "",
          isFuture ? "is-future" : ""
        ].filter(Boolean).join(" ");

        return `
          <button class="${classes}" type="button" data-view-day="${dayIndex}" aria-label="${dayIndex}일차 크게 보기">
            <span class="story-ring">
              <span class="story-thumb ${photo ? "has-image" : ""}">
                ${photo ? `<img src="${makePhotoUrl(photo)}" alt="">` : ""}
              </span>
            </span>
            <span class="story-label">${dayLabel(dayIndex)}</span>
          </button>
        `;
      }).join("");
    }

    function renderBodyGallery(plan, todayDay) {
      return Array.from({ length: plan.days }, (_, index) => {
        const dayIndex = index + 1;
        const photo = getPhoto(dayIndex);
        const isFuture = dayIndex > todayDay && !finalReached(plan);
        const classes = [
          "body-tile",
          photo ? "has-photo" : "",
          isFuture ? "is-future" : ""
        ].filter(Boolean).join(" ");

        return `
          <button class="${classes}" type="button" data-view-day="${dayIndex}" aria-label="${dayIndex}일차 크게 보기">
            <span class="body-tile-day auto-contrast-label">${dayLabel(dayIndex)}</span>
            ${photo ? `<img src="${makePhotoUrl(photo)}" alt="${dayIndex}일차 바디 사진">` : `<span class="body-tile-empty"><span>${dayIndex}</span></span>`}
          </button>
        `;
      }).join("");
    }

    function renderBodyViewer(plan) {
      if (!bodyState.viewerDay) return "";

      const dayIndex = clamp(bodyState.viewerDay, 1, plan.days);
      const photo = getPhoto(dayIndex);
      const date = dateForDay(plan, dayIndex);

      return `
        <div class="body-viewer" role="dialog" aria-modal="true" aria-label="${dayIndex}일차 사진 크게 보기">
          <div class="body-viewer-shell">
            <div class="body-viewer-head">
              <div class="body-viewer-title">
                <strong>${dayLabel(dayIndex)}</strong>
                <span>${formatDate(date)} · ${photo ? "기록 완료" : "사진 없음"}</span>
              </div>
              <button class="viewer-close" type="button" data-view-close aria-label="닫기">
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <div class="body-viewer-stage">
              <button class="viewer-nav prev" type="button" data-view-step="-1" aria-label="이전 사진">
                <i class="fa-solid fa-chevron-left"></i>
              </button>
              <div class="body-viewer-frame">
                ${photo ? `<img src="${makePhotoUrl(photo)}" alt="${dayIndex}일차 바디 사진">` : `<div class="viewer-empty"><i class="fa-solid fa-camera"></i><span>${dayLabel(dayIndex)} 사진이 아직 없어요</span></div>`}
              </div>
              <button class="viewer-nav next" type="button" data-view-step="1" aria-label="다음 사진">
                <i class="fa-solid fa-chevron-right"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderDayGrid(plan, todayDay) {
      return Array.from({ length: plan.days }, (_, index) => {
        const dayIndex = index + 1;
        const photo = getPhoto(dayIndex);
        const isFuture = dayIndex > todayDay && !finalReached(plan);
        const classes = [
          "day-cell",
          dayIndex === bodyState.selectedDay ? "is-selected" : "",
          isFuture ? "is-future" : "",
          photo ? "has-photo" : ""
        ].filter(Boolean).join(" ");
        const photoThumb = photo ? `<img src="${makePhotoUrl(photo)}" alt="">` : dayIndex;

        return `
          <button class="${classes}" type="button" data-day="${dayIndex}" aria-label="${dayIndex}일차">
            <span class="day-number">${photoThumb}</span>
            <span class="day-dot"></span>
          </button>
        `;
      }).join("");
    }

    function renderComparePanel(plan) {
      const photos = bodyState.photos.slice().sort((a, b) => a.dayIndex - b.dayIndex);

      if (!finalReached(plan)) {
        const remaining = Math.max(0, daysBetween(todayISO(), planEndDate(plan)));
        return `
          <section>
            <div class="section-heading">
              <div>
                <h2>비교</h2>
                <p>처음과 마지막</p>
              </div>
            </div>
            <div class="insight-row"><span>최종 비교</span><strong>${remaining}일 남음</strong></div>
          </section>
        `;
      }

      if (!photos.length) {
        return `
          <section>
            <div class="section-heading">
              <div>
                <h2>비교</h2>
                <p>처음과 마지막</p>
              </div>
            </div>
            <div class="compare-card compare-empty">아직 사진이 없어요.</div>
          </section>
        `;
      }

      const first = photos[0];
      const last = photos[photos.length - 1];
      const beforeAfter = photos.length > 1 ? `
        <div class="compare-lead">
          ${renderCompareItem(first, "처음")}
          ${renderCompareItem(last, "마지막")}
        </div>
      ` : "";

      return `
        <section>
          <div class="section-heading">
            <div>
              <h2>비교</h2>
              <p>${photos.length}장</p>
            </div>
          </div>
          <div class="compare-card">
            ${beforeAfter}
            <div class="compare-strip scrollbar-hide">
              ${photos.map((photo) => renderCompareItem(photo, dayLabel(photo.dayIndex))).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function renderCompareItem(photo, label) {
      return `
        <figure class="compare-item">
          <img src="${makePhotoUrl(photo)}" alt="${label} 바디 사진">
          <figcaption><span>${label}</span><span>${formatDate(photo.date)}</span></figcaption>
        </figure>
      `;
    }

    app.addEventListener("click", async (event) => {
      const closeViewerButton = event.target.closest("[data-view-close]");
      if (closeViewerButton) {
        haptic();
        bodyState.viewerDay = null;
        render();
        return;
      }

      const viewerStepButton = event.target.closest("[data-view-step]");
      if (viewerStepButton && bodyState.plan) {
        haptic();
        const step = Number(viewerStepButton.dataset.viewStep);
        const current = bodyState.viewerDay || bodyState.selectedDay || 1;
        bodyState.viewerDay = clamp(current + step, 1, bodyState.plan.days);
        bodyState.selectedDay = bodyState.viewerDay;
        render();
        return;
      }

      const viewDayButton = event.target.closest("[data-view-day]");
      if (viewDayButton) {
        haptic();
        bodyState.selectedDay = Number(viewDayButton.dataset.viewDay);
        bodyState.viewerDay = bodyState.selectedDay;
        render();
        return;
      }

      const periodButton = event.target.closest("[data-period]");
      if (periodButton) {
        haptic();
        bodyState.selectedPeriod = Number(periodButton.dataset.period);
        render();
        return;
      }

      const dayButton = event.target.closest("[data-day]");
      if (dayButton) {
        haptic();
        bodyState.selectedDay = Number(dayButton.dataset.day);
        render();
        return;
      }

      const workoutOption = event.target.closest("[data-workout-id]");
      if (workoutOption) {
        haptic();
        workoutState.selectedWorkoutId = workoutOption.dataset.workoutId;
        workoutState.modalMode = "record";
        render();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;

      haptic();
      const action = actionButton.dataset.action;

      if (action === "open-workout-picker") {
        workoutState.modalMode = "pick";
        workoutState.selectedWorkoutId = null;
        render();
        return;
      }

      if (action === "close-workout-modal") {
        workoutState.modalMode = null;
        workoutState.selectedWorkoutId = null;
        render();
        return;
      }

      if (action === "back-workout-picker") {
        workoutState.modalMode = "pick";
        workoutState.selectedWorkoutId = null;
        render();
        return;
      }

      if (action === "save-workout-entry") {
        const workout = getWorkout(workoutState.selectedWorkoutId);
        const values = {};
        document.querySelectorAll("[data-workout-field]").forEach((field) => {
          values[field.dataset.workoutField] = field.value.trim();
        });
        const hasValue = Object.values(values).some((value) => value);
        if (!hasValue) {
          showToast("기록할 값을 입력해 주세요.");
          return;
        }
        workoutState.entries.unshift({
          id: `workout-${Date.now()}`,
          accountId: HEALTH_ACCOUNT_ID,
          date: todayISO(),
          workoutId: workout.id,
          values,
          createdAt: new Date().toISOString()
        });
        saveWorkoutEntries();
        workoutState.modalMode = null;
        workoutState.selectedWorkoutId = null;
        render();
        showToast(`${workout.name} 기록을 저장했어요.`);
        return;
      }

      if (action === "create-plan") {
        const startDate = document.querySelector("#start-date").value || todayISO();
        const customDays = Number(document.querySelector("#custom-days").value);
        const days = clamp(customDays || bodyState.selectedPeriod, 1, 365);
        bodyState.plan = {
          id: `plan-${Date.now()}`,
          accountId: HEALTH_ACCOUNT_ID,
          startDate,
          days,
          createdAt: new Date().toISOString()
        };
        bodyState.selectedDay = currentDayIndex(bodyState.plan);
        bodyState.viewerDay = null;
        savePlan(bodyState.plan);
        await loadPhotos();
        render();
        scrollAppTop();
        showToast(`${days}일 바디 기록을 시작했어요.`);
        return;
      }

      if (action === "open-camera") {
        document.querySelector("#camera-input").click();
        return;
      }

      if (action === "open-gallery") {
        document.querySelector("#gallery-input").click();
        return;
      }

      if (action === "delete-photo") {
        await deleteSelectedPhoto();
        return;
      }

      if (action === "reset-plan") {
        await clearCurrentPlan();
      }
    });

    app.addEventListener("change", (event) => {
      if (event.target.matches("#camera-input, #gallery-input")) {
        handlePhotoFile(event.target.files[0]);
        event.target.value = "";
      }
    });

    app.addEventListener("input", (event) => {
      if (event.target.matches("[data-workout-search]")) {
        filterWorkoutCatalog(event.target.value);
      }
    });

    window.addEventListener("hashchange", () => {
      haptic();
      scrollAppTop();
      render();
    });

    app.addEventListener("scroll", () => requestAnimationFrame(updateNavContrast), { passive: true });

    window.addEventListener("resize", () => {
      updateNav(getRoute());
      schedulePhotoLabelContrast();
      requestAnimationFrame(updateNavContrast);
    });
    window.addEventListener("orientationchange", () => {
      schedulePhotoLabelContrast();
      requestAnimationFrame(updateNavContrast);
    });
    window.addEventListener("load", () => requestAnimationFrame(updateNavContrast));

    loadPhotos()
      .then(() => schedulePendingBodyBackups())
      .catch(() => showToast("사진 저장소를 열지 못했어요."))
      .finally(() => render());
  </script>
</body>
</html>
