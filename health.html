<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>엔조이 헬스</title>

  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" href="icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --surface: #1c1c1e;
      --surface-2: #26262b;
      --surface-3: #2c2c2e;
      --text: #ffffff;
      --text-main: #f2f4f6;
      --text-sub: #a1a1a6;
      --text-muted: #8b95a1;
      --blue: #3182f6;
      --red: #f04452;
      --green: #22c55e;
      --teal: #2dd4bf;
      --line: rgba(255, 255, 255, 0.1);
      --line-soft: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    @media (prefers-color-scheme: light) {
      :root {
        color-scheme: light;
        --bg: #f2f2f7;
        --surface: #ffffff;
        --surface-2: #ffffff;
        --surface-3: #e9e9eb;
        --text: #141414;
        --text-main: #141414;
        --text-sub: #5e6470;
        --text-muted: #8b95a1;
        --line: rgba(0, 0, 0, 0.1);
        --line-soft: rgba(0, 0, 0, 0.06);
        --glass-border: rgba(255, 255, 255, 0.12);
        --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.12);
        --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
      touch-action: pan-y;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    #app {
      width: 100%;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--bg);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    #app::-webkit-scrollbar,
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .pt-safe {
      padding-top: max(20px, env(safe-area-inset-top));
    }

    .pb-safe {
      padding-bottom: max(110px, calc(92px + env(safe-area-inset-bottom)));
    }

    .screen {
      width: min(100%, 448px);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      padding: 0 20px;
    }

    .screen-header {
      flex: none;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 14px;
      background: linear-gradient(180deg, var(--bg) 72%, rgba(0, 0, 0, 0));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    @media (prefers-color-scheme: light) {
      .screen-header {
        background: linear-gradient(180deg, var(--bg) 72%, rgba(242, 242, 247, 0));
      }
    }

    .screen-title {
      min-width: 0;
    }

    .screen-title h1 {
      margin: 0;
      color: var(--text-main);
      font-size: 26px;
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .screen-title p {
      margin: 5px 0 0;
      color: var(--text-sub);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.45;
      letter-spacing: 0;
    }

    .icon-chip {
      flex: 0 0 auto;
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 0 13px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--line);
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    @media (prefers-color-scheme: light) {
      .icon-chip {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .content-stack {
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-bottom: 18px;
    }

    .section-label {
      padding: 0 4px;
      margin-bottom: 10px;
    }

    .section-label p {
      margin: 0 0 5px;
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-label h2 {
      margin: 0;
      color: var(--text-main);
      font-size: 20px;
      font-weight: 800;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .glass-card,
    .status-card,
    .setup-card {
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .status-card,
    .setup-card {
      background: var(--surface);
    }

    .card-pad {
      padding: 22px;
    }

    .status-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line-soft);
    }

    .status-kicker {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
      color: var(--text-sub);
      font-size: 13px;
      font-weight: 700;
    }

    .status-number {
      color: var(--text-main);
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .status-number span {
      margin-left: 3px;
      font-size: 20px;
      font-weight: 800;
    }

    .progress-circle {
      --progress: 0%;
      position: relative;
      width: 82px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--blue) var(--progress), rgba(255, 255, 255, 0.12) 0);
      flex: 0 0 auto;
    }

    .progress-circle::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: var(--surface);
    }

    .progress-circle strong,
    .progress-circle span {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      white-space: nowrap;
    }

    .progress-circle strong {
      top: 24px;
      color: var(--text-main);
      font-size: 21px;
      font-weight: 900;
      line-height: 1;
    }

    .progress-circle span {
      top: 47px;
      color: var(--text-sub);
      font-size: 10px;
      font-weight: 800;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding-top: 17px;
    }

    .stat-item {
      min-width: 0;
      border-left: 1px solid var(--line-soft);
      padding-left: 12px;
    }

    .stat-item:first-child {
      border-left: 0;
      padding-left: 0;
    }

    .stat-item span {
      display: block;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .stat-item strong {
      display: block;
      margin-top: 5px;
      color: var(--text-main);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.25;
      word-break: keep-all;
    }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .period-card {
      min-height: 98px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      color: var(--text-main);
      padding: 17px;
      text-align: left;
      transition: transform 0.15s, background 0.15s, border-color 0.15s;
    }

    @media (prefers-color-scheme: light) {
      .period-card {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .period-card:active,
    .day-cell:active,
    .pill-button:active,
    .ghost-button:active,
    .danger-link:active {
      transform: scale(0.96);
    }

    .period-card.is-selected {
      border-color: rgba(49, 130, 246, 0.8);
      background: rgba(49, 130, 246, 0.18);
    }

    .period-card strong {
      color: var(--text-main);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .period-card span {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 700;
    }

    .field-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 10px;
      margin-top: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .text-input {
      width: 100%;
      min-height: 50px;
      border-radius: 16px;
      border: 1.5px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      padding: 0 15px;
      outline: none;
      font-size: 15px;
      font-weight: 700;
    }

    @media (prefers-color-scheme: light) {
      .text-input {
        background: rgba(0, 0, 0, 0.04);
      }
    }

    .text-input:focus {
      border-color: var(--blue);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .pill-button,
    .ghost-button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 900;
      transition: transform 0.15s, opacity 0.15s;
    }

    .pill-button {
      background: #ffffff;
      color: #141414;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.12);
    }

    .pill-button.blue {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(49, 130, 246, 0.28);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid var(--line);
    }

    .pill-button:disabled,
    .ghost-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .danger-link {
      width: fit-content;
      background: transparent;
      color: var(--red);
      padding: 9px 2px;
      font-size: 13px;
      font-weight: 800;
    }

    .photo-card {
      position: relative;
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      background: #050505;
      box-shadow: var(--shadow-card);
      isolation: isolate;
    }

    .photo-preview {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 65% 34%, rgba(49, 130, 246, 0.26), transparent 34%), #111114;
    }

    .photo-preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .photo-preview::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.68), transparent 30%, rgba(0, 0, 0, 0.88));
    }

    .photo-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      z-index: 1;
    }

    .photo-empty i {
      display: block;
      margin-bottom: 10px;
      color: var(--blue);
      font-size: 36px;
    }

    .photo-content {
      position: absolute;
      inset: 22px 22px 20px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .photo-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .day-badge {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: #ffffff;
      color: #141414;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    .day-badge strong {
      font-size: 23px;
      font-weight: 900;
      line-height: 1;
    }

    .photo-date {
      text-align: right;
    }

    .photo-date h3 {
      margin: 0;
      color: #ffffff;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.16;
    }

    .photo-date p {
      margin: 3px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      font-weight: 700;
    }

    .photo-bottom {
      pointer-events: auto;
    }

    .photo-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .calendar-card {
      padding-top: 20px;
      border-top: 1px solid var(--line-soft);
    }

    .calendar-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .calendar-head h3 {
      margin: 0;
      color: var(--text-main);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.2;
    }

    .calendar-head p {
      margin: 3px 0 0;
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 600;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap-y: 8px;
      text-align: center;
    }

    .day-cell {
      height: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-radius: 16px;
      background: transparent;
      color: var(--text-main);
      transition: transform 0.15s;
      padding: 0;
    }

    .day-number {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.06);
    }

    @media (prefers-color-scheme: light) {
      .day-number {
        background: rgba(0, 0, 0, 0.05);
      }
    }

    .day-cell.is-selected .day-number {
      background: #ffffff;
      color: #141414;
      box-shadow: 0 2px 12px rgba(255, 255, 255, 0.28);
    }

    @media (prefers-color-scheme: light) {
      .day-cell.is-selected .day-number {
        background: #141414;
        color: #ffffff;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
      }
    }

    .day-cell.is-future {
      opacity: 0.42;
    }

    .day-cell img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .day-dot {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: transparent;
    }

    .day-cell.has-photo .day-dot {
      background: var(--blue);
    }

    .compare-card {
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 22px;
      box-shadow: var(--shadow-soft);
    }

    .compare-empty {
      min-height: 116px;
      display: grid;
      place-items: center;
      color: var(--text-sub);
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      word-break: keep-all;
    }

    .compare-lead {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .compare-strip {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(124px, 38%);
      gap: 10px;
      overflow-x: auto;
      padding: 0 2px 6px;
      scroll-snap-type: x proximity;
    }

    .compare-item {
      margin: 0;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      overflow: hidden;
      scroll-snap-align: start;
    }

    .compare-item img {
      width: 100%;
      aspect-ratio: 4 / 5;
      display: block;
      object-fit: cover;
      background: var(--surface-3);
    }

    .compare-item figcaption {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      padding: 9px 10px 10px;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.25;
    }

    .simple-card {
      min-height: 420px;
    }

    .hub-grid,
    .service-grid,
    .metric-row,
    .meal-grid,
    .workout-grid {
      display: grid;
      gap: 10px;
    }

    .hub-grid {
      grid-template-columns: 1.25fr 0.75fr;
    }

    .service-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .service-card,
    .mini-panel,
    .plan-panel,
    .feed-card,
    .meal-card,
    .routine-card,
    .insight-row {
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow-soft);
    }

    .service-card {
      min-height: 122px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      padding: 15px;
      color: var(--text-main);
      text-align: left;
      transition: transform 0.15s, border-color 0.15s, background 0.15s;
    }

    .service-card:active,
    .feed-action:active,
    .story-day:active,
    .icon-action:active,
    .meal-card:active,
    .routine-card:active {
      transform: scale(0.96);
    }

    .service-card.is-primary {
      background:
        linear-gradient(135deg, rgba(49, 130, 246, 0.28), rgba(34, 197, 94, 0.12)),
        var(--surface);
      border-color: rgba(49, 130, 246, 0.38);
    }

    .service-icon {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      font-size: 16px;
    }

    @media (prefers-color-scheme: light) {
      .service-icon {
        background: rgba(0, 0, 0, 0.05);
      }
    }

    .service-card strong,
    .mini-panel strong,
    .meal-card strong,
    .routine-card strong {
      color: var(--text-main);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .service-card span,
    .mini-panel span,
    .meal-card span,
    .routine-card span {
      color: var(--text-sub);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.35;
      word-break: keep-all;
    }

    .mini-panel {
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 22px;
      padding: 16px;
      overflow: hidden;
    }

    .mini-panel .big-number {
      color: var(--text-main);
      font-size: 34px;
      font-weight: 950;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .mini-panel .big-number small {
      font-size: 15px;
      font-weight: 850;
      color: var(--text-sub);
    }

    .progress-line {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    @media (prefers-color-scheme: light) {
      .progress-line {
        background: rgba(0, 0, 0, 0.06);
      }
    }

    .progress-line span {
      display: block;
      width: var(--progress, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .metric-row {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .metric-pill {
      min-height: 72px;
      border-radius: 18px;
      padding: 13px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line-soft);
    }

    @media (prefers-color-scheme: light) {
      .metric-pill {
        background: rgba(0, 0, 0, 0.035);
      }
    }

    .metric-pill span {
      display: block;
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
    }

    .metric-pill strong {
      display: block;
      margin-top: 6px;
      color: var(--text-main);
      font-size: 16px;

<body ontouchstart="">
  <main id="app"></main>

  <nav id="bottom-nav" aria-label="하단 메뉴">
    <div class="bottom-nav-inner liquid-glass">
      <div class="nav-indicator" aria-hidden="true"></div>

      <button type="button" class="nav-item" onclick="goBack()" aria-label="뒤로가기">
        <i class="fa-solid fa-chevron-left"></i>
        <span>뒤로</span>
      </button>

      <a class="nav-item is-active" href="#home" aria-label="홈" data-route="home" aria-current="page">
        <i class="fa-solid fa-house"></i>
        <span>홈</span>
      </a>

      <a class="nav-item" href="#body" aria-label="바디" data-route="body">
        <i class="fa-solid fa-person"></i>
        <span>바디</span>
      </a>

      <a class="nav-item" href="#food" aria-label="푸드" data-route="food">
        <i class="fa-solid fa-utensils"></i>
        <span>푸드</span>
      </a>

      <a class="nav-item" href="#workout" aria-label="운동" data-route="workout">
        <i class="fa-solid fa-dumbbell"></i>
        <span>운동</span>
      </a>
    </div>
  </nav>

  <script>
    const PLAN_KEY = "enjoy.body.plan.v2";
    const DB_NAME = "enjoy-body-photos";
    const STORE_NAME = "photos";
    const app = document.querySelector("#app");
    const objectUrls = new Set();

    const bodyState = {
      plan: loadPlan(),
      photos: [],
      selectedDay: 1,
      selectedPeriod: 30,
      busy: false
    };

    const periodOptions = [
      { days: 14, title: "2주", note: "14일 기록" },
      { days: 30, title: "1개월", note: "30일 기록" },
      { days: 60, title: "2개월", note: "60일 기록" },
      { days: 90, title: "3개월", note: "90일 기록" }
    ];

    function haptic() {
      if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(8);
    }

    function goBack() {
      haptic();
      window.location.href = "index.html";
    }

    function loadPlan() {
      try {
        const saved = localStorage.getItem(PLAN_KEY) || localStorage.getItem("enjoy.body.plan.v1");
        return saved ? JSON.parse(saved) : null;
      } catch (error) {
        return null;
      }
    }

    function savePlan(plan) {
      localStorage.setItem(PLAN_KEY, JSON.stringify(plan));
    }

    function todayISO() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      return now.toISOString().slice(0, 10);
    }

    function addDays(dateText, amount) {
      const date = new Date(`${dateText}T00:00:00`);
      date.setDate(date.getDate() + amount);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function daysBetween(from, to) {
      const start = new Date(`${from}T00:00:00`);
      const end = new Date(`${to}T00:00:00`);
      return Math.floor((end - start) / 86400000);
    }

    function formatDate(dateText) {
      const date = new Date(`${dateText}T00:00:00`);
      return new Intl.DateTimeFormat("ko-KR", {
        month: "long",
        day: "numeric"
      }).format(date);
    }

    function clamp(number, min, max) {
      return Math.min(Math.max(number, min), max);
    }

    function getRoute() {
      return (window.location.hash || "#home").replace("#", "") || "home";
    }

    function currentDayIndex(plan) {
      return clamp(daysBetween(plan.startDate, todayISO()) + 1, 1, plan.days);
    }

    function planEndDate(plan) {
      return addDays(plan.startDate, plan.days - 1);
    }

    function dateForDay(plan, dayIndex) {
      return addDays(plan.startDate, dayIndex - 1);
    }

    function finalReached(plan) {
      return daysBetween(planEndDate(plan), todayISO()) >= 0;
    }

    function getPhoto(dayIndex) {
      return bodyState.photos.find((photo) => photo.dayIndex === dayIndex);
    }

    function makePhotoUrl(photo) {
      const url = URL.createObjectURL(photo.blob);
      objectUrls.add(url);
      return url;
    }

    function revokePhotoUrls() {
      objectUrls.forEach((url) => URL.revokeObjectURL(url));
      objectUrls.clear();
    }

    function openBodyDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);

        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            const store = db.createObjectStore(STORE_NAME, { keyPath: "id" });
            store.createIndex("planId", "planId", { unique: false });
          }
        };

        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    function withPhotoStore(mode, callback) {
      return openBodyDb().then((db) => new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, mode);
        const store = transaction.objectStore(STORE_NAME);
        callback(store);

        transaction.oncomplete = () => {
          db.close();
          resolve();
        };

        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      }));
    }

    async function loadPhotos() {
      if (!bodyState.plan) {
        bodyState.photos = [];
        return;
      }

      const db = await openBodyDb();
      bodyState.photos = await new Promise((resolve, reject) => {
        const transaction = db.transaction(STORE_NAME, "readonly");
        const store = transaction.objectStore(STORE_NAME);
        const request = store.getAll();

        request.onsuccess = () => {
          resolve(request.result
            .filter((photo) => photo.planId === bodyState.plan.id)
            .sort((a, b) => a.dayIndex - b.dayIndex));
        };

        request.onerror = () => reject(request.error);
        transaction.oncomplete = () => db.close();
        transaction.onerror = () => {
          db.close();
          reject(transaction.error);
        };
      });
    }

    async function savePhoto(blob, file) {
      const plan = bodyState.plan;
      const dayIndex = bodyState.selectedDay;
      const item = {
        id: `${plan.id}:${dayIndex}`,
        planId: plan.id,
        dayIndex,
        date: dateForDay(plan, dayIndex),
        blob,
        name: file.name || `day-${dayIndex}.jpg`,
        type: blob.type || file.type || "image/jpeg",
        updatedAt: new Date().toISOString()
      };

      await withPhotoStore("readwrite", (store) => store.put(item));
      await loadPhotos();
      render();
      showToast(`${dayIndex}일차 사진을 저장했어요.`);
    }

    async function deleteSelectedPhoto() {
      const photo = getPhoto(bodyState.selectedDay);
      if (!photo) return;
      await withPhotoStore("readwrite", (store) => store.delete(photo.id));
      await loadPhotos();
      render();
      showToast(`${bodyState.selectedDay}일차 사진을 삭제했어요.`);
    }

    async function clearCurrentPlan() {
      if (!bodyState.plan) return;
      const confirmed = window.confirm("바디 사진 기록을 모두 삭제할까요?");
      if (!confirmed) return;

      const planId = bodyState.plan.id;
      await withPhotoStore("readwrite", (store) => {
        bodyState.photos
          .filter((photo) => photo.planId === planId)
          .forEach((photo) => store.delete(photo.id));
      });

      localStorage.removeItem(PLAN_KEY);
      localStorage.removeItem("enjoy.body.plan.v1");
      bodyState.plan = null;
      bodyState.photos = [];
      bodyState.selectedDay = 1;
      render();
      scrollAppTop();
      showToast("바디 기록을 초기화했어요.");
    }

    function fileToImage(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const url = URL.createObjectURL(file);

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("이미지를 불러오지 못했어요."));
        };

        image.src = url;
      });
    }

    async function compressImage(file) {
      if (!file.type.startsWith("image/")) {
        throw new Error("이미지 파일만 올릴 수 있어요.");
      }

      const image = await fileToImage(file);
      const maxSide = 1600;
      const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.max(1, Math.round(image.width * scale));
      canvas.height = Math.max(1, Math.round(image.height * scale));

      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          resolve(blob || file);
        }, "image/jpeg", 0.86);
      });
    }

    async function handlePhotoFile(file) {
      if (!file || bodyState.busy || !bodyState.plan) return;

      try {
        bodyState.busy = true;
        render();
        const blob = await compressImage(file);
        await savePhoto(blob, file);
      } catch (error) {
        showToast(error.message || "사진 저장에 실패했어요.");
      } finally {
        bodyState.busy = false;
        render();
      }
    }

    function scrollAppTop() {
      app.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      const oldToast = document.querySelector(".toast");
      if (oldToast) oldToast.remove();

      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      document.body.appendChild(toast);
      window.setTimeout(() => toast.remove(), 2300);
    }

    function render() {
      revokePhotoUrls();
      const route = getRoute();
      updateNav(route);

      if (route === "body") {
        renderBody();
      } else {
        renderSimpleScreen(route);
      }

      requestAnimationFrame(updateNavContrast);
    }

    function updateNav(route) {
      document.querySelectorAll("[data-route]").forEach((item) => {
        const isActive = item.dataset.route === route;

        indicator.style.transform = `translateX(${Math.round(activeRect.left - innerRect.left - 6)}px)`;
      });

    function parseRgb(value) {
      const match = value && value.match(/rgba?\(([^)]+)\)/);
      if (!match) return null;
      const parts = match[1].split(",").map((part) => parseFloat(part));
      if (parts.length < 3 || parts.slice(0, 3).some(Number.isNaN)) return null;
      return {
        r: parts[0],
        g: parts[1],
        b: parts[2],
        a: parts[3] === undefined || Number.isNaN(parts[3]) ? 1 : parts[3]
      };
    }

    function colorBrightness(color) {
      return color ? (0.299 * color.r + 0.587 * color.g + 0.114 * color.b) : null;
    }

    const contrastImageCache = new WeakMap();
    const contrastCanvas = document.createElement("canvas");
    const contrastContext = contrastCanvas.getContext("2d", { willReadFrequently: true });

    function imageSampleData(image) {
      if (contrastImageCache.has(image)) return contrastImageCache.get(image);
      let result = null;

      try {
        if (!image.complete || !image.naturalWidth || !image.naturalHeight || !contrastContext) return null;
        const width = 36;
        const height = 36;
        contrastCanvas.width = width;
        contrastCanvas.height = height;
        contrastContext.clearRect(0, 0, width, height);
        contrastContext.drawImage(image, 0, 0, width, height);
        result = {
          data: contrastContext.getImageData(0, 0, width, height).data,
          width,
          height
        };
      } catch (error) {
        result = null;
      }

      contrastImageCache.set(image, result);
      return result;
    }

    function imageBrightnessAt(image, x, y) {
      const sample = imageSampleData(image);
      if (!sample) return null;

      const rect = image.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;

      const style = getComputedStyle(image);
      const fit = style.objectFit || "fill";
      const scale = fit === "cover"
        ? Math.max(rect.width / image.naturalWidth, rect.height / image.naturalHeight)
        : fit === "contain"
          ? Math.min(rect.width / image.naturalWidth, rect.height / image.naturalHeight)
          : null;
      const drawWidth = scale ? image.naturalWidth * scale : rect.width;
      const drawHeight = scale ? image.naturalHeight * scale : rect.height;
      const left = rect.left - (drawWidth - rect.width) / 2;
      const top = rect.top - (drawHeight - rect.height) / 2;

      if (x < left || x > left + drawWidth || y < top || y > top + drawHeight) return null;

      const sampleX = clamp(Math.floor(((x - left) / drawWidth) * sample.width), 0, sample.width - 1);
      const sampleY = clamp(Math.floor(((y - top) / drawHeight) * sample.height), 0, sample.height - 1);
      let sum = 0;
      let count = 0;

      for (let yy = Math.max(0, sampleY - 1); yy <= Math.min(sample.height - 1, sampleY + 1); yy += 1) {
        for (let xx = Math.max(0, sampleX - 1); xx <= Math.min(sample.width - 1, sampleX + 1); xx += 1) {
          const index = (yy * sample.width + xx) * 4;
          sum += 0.299 * sample.data[index] + 0.587 * sample.data[index + 1] + 0.114 * sample.data[index + 2];
          count += 1;
        }
      }

      return count ? sum / count : null;
    }

    function backgroundBrightnessAt(x, y) {
      const nav = document.querySelector("#bottom-nav");
      const previousEvents = nav ? nav.style.pointerEvents : "";
      if (nav) nav.style.pointerEvents = "none";

      try {
        const elements = document.elementsFromPoint(x, y) || [];
        let base = matchMedia("(prefers-color-scheme: light)").matches ? 242 : 0;
        const layers = [];

        for (const element of elements) {
          if (!element || element === document.documentElement || element === document.body) continue;
          if (nav && nav.contains(element)) continue;

          const style = getComputedStyle(element);
          if (style.display === "none" || style.visibility === "hidden") continue;

          const opacity = Number.isNaN(parseFloat(style.opacity)) ? 1 : parseFloat(style.opacity);
          if (opacity <= 0.01) continue;

          if (element.tagName === "IMG") {
            const value = imageBrightnessAt(element, x, y);
            if (value !== null) {
              if (opacity >= 0.98) {
                base = value;
                break;
              }
              layers.push({ value, alpha: opacity });
              continue;
            }
          }

          const gradientColors = Array.from((style.backgroundImage || "").matchAll(/rgba?\([^)]+\)/g))
            .map((matchItem) => parseRgb(matchItem[0]))
            .filter(Boolean);
          if (gradientColors.length) {
            const value = gradientColors.reduce((sum, color) => sum + colorBrightness(color), 0) / gradientColors.length;
            layers.push({ value, alpha: 0.55 * opacity });
          }

          const color = parseRgb(style.backgroundColor);
          if (color && color.a * opacity > 0.01) {
            const alpha = color.a * opacity;
            const value = colorBrightness(color);
            if (alpha >= 0.98) {
              base = value;
              break;
            }
            layers.push({ value, alpha });
          }
        }

        for (let index = layers.length - 1; index >= 0; index -= 1) {
          const layer = layers[index];
          base = layer.value * layer.alpha + base * (1 - layer.alpha);
        }

        return base;
      } finally {
        if (nav) nav.style.pointerEvents = previousEvents;
      }
    }

    function updateNavContrast() {
      const nav = document.querySelector("#bottom-nav");
      if (!nav) return;
      const rect = nav.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      const points = [
        [0.12, 0.5],
        [0.35, 0.5],
        [0.5, 0.5],
        [0.65, 0.5],
        [0.88, 0.5],
        [0.5, 0.25],
        [0.5, 0.75]
      ];
      const values = points.map(([px, py]) => backgroundBrightnessAt(
        rect.left + rect.width * px,
        rect.top + rect.height * py
      )).filter((value) => value !== null && !Number.isNaN(value));

      const average = values.length
        ? values.reduce((sum, value) => sum + value, 0) / values.length
        : (matchMedia("(prefers-color-scheme: light)").matches ? 242 : 0);
      nav.classList.toggle("nav-on-light", average > 154);
    }

          id: `plan-${Date.now()}`,
          startDate,
          days,
          createdAt: new Date().toISOString()
        };
        bodyState.selectedDay = currentDayIndex(bodyState.plan);
        savePlan(bodyState.plan);
        await loadPhotos();
        render();
        scrollAppTop();
        showToast(`${days}일 바디 기록을 시작했어요.`);
        return;
      }

      if (action === "open-camera") {
        document.querySelector("#camera-input").click();
        return;
      }

      if (action === "open-gallery") {
        document.querySelector("#gallery-input").click();
        return;
      }

      if (action === "delete-photo") {
        await deleteSelectedPhoto();
        return;
      }

      if (action === "reset-plan") {
        await clearCurrentPlan();
      }
    });

    app.addEventListener("change", (event) => {
      if (event.target.matches("#camera-input, #gallery-input")) {
        handlePhotoFile(event.target.files[0]);
        event.target.value = "";
      }
    });

    window.addEventListener("hashchange", () => {
      haptic();
      scrollAppTop();
      render();
    });

    app.addEventListener("scroll", () => requestAnimationFrame(updateNavContrast), { passive: true });

    window.addEventListener("resize", () => {
      updateNav(getRoute());
      requestAnimationFrame(updateNavContrast);
    });
    window.addEventListener("orientationchange", () => requestAnimationFrame(updateNavContrast));
    window.addEventListener("load", () => requestAnimationFrame(updateNavContrast));

    loadPhotos()
      .catch(() => showToast("사진 저장소를 열지 못했어요."))
      .finally(() => render());
  </script>
</body>
</html>
